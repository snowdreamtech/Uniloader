---
name: CI (Rocky)

"on":
  push:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  pull_request:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  workflow_dispatch:

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          # [Required] Access token with `workflow` scope.
          token: ${{ secrets.WORKFLOW_SECRET }}

      - name: Set env variables
        run: |
          {
            echo "BRANCH=${GITHUB_REF##*/}"
            echo "http_proxy=${http_proxy}"
            echo "no_proxy=${no_proxy}"
          } >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      # Re-use our own virtual environment script
      - name: Setup Virtual Environment
        run: |
          source ./scripts/setup_venv.sh

      - name: Start Docker Container for rocky
        run: |
          # Try to pull and run the image, if it fails, the workflow just fails (which is expected for unsupported ones natively)
          docker run -d --name uls_rocky --privileged rocky sleep 86400 || echo "WARNING: Image rocky not found or failed to start."

          # Create a dynamic inventory file for this run
          cat << 'INV' > inventory/dynamic_docker.yml
          all:
            vars:
              become_enabled: false
            hosts:
              rocky:
                ansible_host: uls_rocky
                ansible_connection: "docker"
                node_tags: ["open", "container", "docker_container"]
          INV

      - name: Run ansible-playbook test
        run: |
          source .venv/bin/activate
          ansible-playbook -i inventory/dynamic_docker.yml playbooks/test.yml

      - name: Cleanup Docker Containers
        if: always()
        run: |
          docker rm -f uls_rocky || true
