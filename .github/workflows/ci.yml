---
name: CI

"on":
  workflow_dispatch: # Disabled: manual trigger only

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          # [Required] Access token with `workflow` scope.
          token: ${{ secrets.WORKFLOW_SECRET }}

      - name: Set env variables
        run: |
          {
            echo "BRANCH=${GITHUB_REF##*/}"
            echo "http_proxy=${http_proxy}"
            echo "no_proxy=${no_proxy}"
          } >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      # Re-use our own virtual environment script
      - name: Setup Virtual Environment
        run: |
          source ./scripts/setup_venv.sh

      - name: Start Docker Containers
        run: |
          docker compose up -d

      # Run integration tests against Docker containers using the Docker connection plugin
      - name: Run ansible-playbook test
        run: |
          source .venv/bin/activate
          ansible-playbook -i inventory/docker.yml playbooks/test.yml

      - name: Cleanup Docker Containers
        if: always()
        run: |
          docker compose down
