- name: "Matrix: Deploy pnpm (Conditional)"
  ansible.builtin.include_role:
    name: "app"
  vars:
    app_name: "pnpm"
    app_delivery_mode: "native"
  when:
    - is_pnpm_node | default(false, true) | bool or is_dev | default(false, true) | bool
