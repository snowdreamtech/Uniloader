---
# =====================================================================
# roles/security/tasks/main.yml
#
# Purpose:
#   Primary entry point for the security role.
#   Orchestrates firewall, fail2ban, and auditd configurations.
#
# =====================================================================

- name: "Configure Firewall"
  ansible.builtin.include_tasks: "firewall.yml"
  when: "security_firewall_enabled | bool"

- name: "Configure Fail2ban"
  ansible.builtin.include_tasks: "fail2ban.yml"
  when: "security_fail2ban_enabled | bool"

- name: "Configure System Audit (Auditd)"
  ansible.builtin.include_tasks: "auditd.yml"
  when: "security_auditd_enabled | bool"
