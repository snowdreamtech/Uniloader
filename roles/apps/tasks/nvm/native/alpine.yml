---
# =====================================================================
# roles/apps/tasks/nvm/native/alpine.yml
# =====================================================================

# Alpine + nvm installer (single file version)
# All preparation tasks have changed_when: false

# Note:
# Alpine 3.5 can only install NodeJS versions up to v6.9.5,
# Alpine 3.6 can only install versions up to v6.10.3,
# Alpine 3.7 installs versions up to v8.9.3,
# Alpine 3.8 installs versions up to v8.14.0,
# Alpine 3.9 installs versions up to v10.19.0,
# Alpine 3.10 installs versions up to v10.24.1,
# Alpine 3.11 installs versions up to v12.22.6,
# Alpine 3.12 installs versions up to v12.22.12,
# Alpine 3.13 & 3.14 install versions up to v14.20.0,
# Alpine 3.15 & 3.16 install versions up to v16.16.0 (These are all versions on the main branch).
# Alpine 3.5 - 3.12 required the package python2 to build NodeJS, as they are older versions to build.
# Alpine 3.13+ requires python3 to successfully build newer NodeJS versions, but you can use python2 with Alpine 3.13+ if you need to build versions of node supported in Alpine 3.5 - 3.15, you just need to specify what version of NodeJS you need to install in the package install script.

- name: Read Alpine version
  command: cat /etc/alpine-release
  register: alpine_version_raw
  changed_when: false

- name: Extract Alpine major.minor version
  set_fact:
    alpine_major_minor: "{{ alpine_version_raw.stdout.split('.')[0] }}.{{ alpine_version_raw.stdout.split('.')[1] }}"
  changed_when: false

# -----------------------------
# Install dependencies
# -----------------------------

- name: Install nvm dependencies for Alpine 3.13+
  apk:
    name:
      - curl
      - bash
      - ca-certificates
      - openssl
      - ncurses
      - coreutils
      - python3
      - make
      - gcc
      - g++
      - libgcc
      - linux-headers
      - grep
      - util-linux
      - binutils
      - findutils
    state: present
    update_cache: true
  become: "{{ become_enabled }}"
  changed_when: false
  when:
    - ansible_os_family == "Alpine"
    - alpine_major_minor is version('3.13', '>=')
    - app_state | default('present', true) == 'present'

- name: Install nvm dependencies for Alpine 3.5 - 3.12
  apk:
    name:
      - curl
      - bash
      - ca-certificates
      - openssl
      - ncurses
      - coreutils
      - python2
      - make
      - gcc
      - g++
      - libgcc
      - linux-headers
      - grep
      - util-linux
      - binutils
      - findutils
    state: present
    update_cache: true
  become: "{{ become_enabled }}"
  changed_when: false
  when:
    - ansible_os_family == "Alpine"
    - alpine_major_minor is version('3.5', '>=')
    - alpine_major_minor is version('3.13', '<')
    - app_state | default('present', true) == 'present'

# ---------------------------------------------------------------------
# Installation: Execute default nvm installation
# ---------------------------------------------------------------------

# WHY: We first need to install nvm using the default installation logic,
# then apply Alpine-specific configuration.
- ansible.builtin.include_tasks: default.yml

# WHY: On Alpine, we create a global profile script to make nvm available
# to all users. This script dynamically detects each user's home directory
# and loads nvm if it exists.
- name: "nvm (Alpine): Create global nvm profile script {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.copy:
    dest: "/etc/profile.d/nvm.sh"
    mode: "0755"
    owner: "root"
    group: "root"
    content: |
      # Detect current user's home directory
      NVM_DIR="$HOME/.nvm"

      # Only load nvm if the directory exists
      if [ -d "$NVM_DIR" ]; then
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
          # [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"  # This loads nvm bash_completion
      fi
  become: "{{ become_enabled }}"
  when: app_state | default('present', true) == 'present'

# ---------------------------------------------------------------------
# Removal: Uninstall nvm and clean up configuration
# ---------------------------------------------------------------------

# WHY: When uninstalling nvm, we need to remove the global profile script
# that we created during installation to avoid loading non-existent nvm.
- name: "nvm (Alpine): Remove global nvm profile script {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.file:
    path: "/etc/profile.d/nvm.sh"
    state: absent
  become: "{{ become_enabled }}"
  when: app_state | default('present', true) == 'absent'
