---
# =====================================================================
# roles/apps/tasks/antigravity_tools/native/debian.yml
# =====================================================================

# ---------------------------------------------------------------------
# Validation
# ---------------------------------------------------------------------

- name: "antigravity_tools (Debian): Validate requirements"
  ansible.builtin.include_tasks: "validate_requirements.yml"
  when: app_state | default('present', true) == 'present'

# ---------------------------------------------------------------------
# Detection: Check Installation Status
# ---------------------------------------------------------------------

- name: "antigravity_tools (Debian): Check if package is already installed {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "dpkg-query -W -f='${Status}' {{ antigravity_tools_package_name }}"
  register: _ag_package_status
  failed_when: false
  changed_when: false
  check_mode: false

- name: "antigravity_tools (Debian): Set installation status fact {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    antigravity_tools_is_installed: "{{ 'install ok installed' in _ag_package_status.stdout }}"

# ---------------------------------------------------------------------
# Installation: Download and Install DEB
# ---------------------------------------------------------------------

- name: "antigravity_tools (Debian): Manage installation"
  when:
    - app_state | default('present', true) == 'present'
    - not antigravity_tools_is_installed or (antigravity_tools_force_install | default(false) | bool)
  block:
    - name: "antigravity_tools (Debian): Create temporary directory for download {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.tempfile:
        state: directory
        suffix: agtools
      register: _ag_temp_dir

    - name: "antigravity_tools (Debian): Download DEB artifact {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.get_url:
        url: "{{ antigravity_tools_download_url_base }}/{{ antigravity_tools_artifacts.debian }}"
        dest: "{{ _ag_temp_dir.path }}/{{ antigravity_tools_artifacts.debian }}"
        mode: "0644"
      register: _download_result
      until: _download_result is succeeded
      retries: "{{ antigravity_tools_download_retries | default(5) }}"
      delay: "{{ antigravity_tools_download_delay | default(10) }}"

    - name: "antigravity_tools (Debian): Install DEB package {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.apt:
        deb: "{{ _ag_temp_dir.path }}/{{ antigravity_tools_artifacts.debian }}"
        state: present
      become: "{{ become_enabled }}"
      register: _install_result

  always:
    - name: "antigravity_tools (Debian): Clean up temporary directory {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.file:
        path: "{{ _ag_temp_dir.path }}"
        state: absent
      when: _ag_temp_dir.path is defined

# ---------------------------------------------------------------------
# Uninstallation: Remove Package
# ---------------------------------------------------------------------

- name: "antigravity_tools (Debian): Remove package {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.apt:
    name: "{{ antigravity_tools_package_name }}"
    state: absent
  become: "{{ become_enabled }}"
  when:
    - app_state | default('present', true) == 'absent'
    - antigravity_tools_is_installed
