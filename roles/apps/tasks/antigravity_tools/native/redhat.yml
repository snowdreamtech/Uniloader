---
# =====================================================================
# roles/apps/tasks/antigravity_tools/native/redhat.yml
# =====================================================================

# ---------------------------------------------------------------------
# Validation
# ---------------------------------------------------------------------

- name: "antigravity_tools (RedHat): Validate requirements"
  ansible.builtin.include_tasks: "validate_requirements.yml"
  when: app_state | default('present', true) == 'present'

# ---------------------------------------------------------------------
# Detection: Check Installation Status
# ---------------------------------------------------------------------

- name: "antigravity_tools (RedHat): Check if package is already installed {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "rpm -q {{ antigravity_tools_package_name }}"
  register: _ag_package_status
  failed_when: false
  changed_when: false
  check_mode: false

- name: "antigravity_tools (RedHat): Set installation status fact {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    antigravity_tools_is_installed: "{{ _ag_package_status.rc == 0 }}"

# ---------------------------------------------------------------------
# Installation: Download and Install RPM
# ---------------------------------------------------------------------

- name: "antigravity_tools (RedHat): Manage installation"
  when:
    - app_state | default('present', true) == 'present'
    - not antigravity_tools_is_installed or (antigravity_tools_force_install | default(false) | bool)
  block:
    - name: "antigravity_tools (RedHat): Create temporary directory for download {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.tempfile:
        state: directory
        suffix: agtools
      register: _ag_temp_dir

    - name: "antigravity_tools (RedHat): Download RPM artifact {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.get_url:
        url: "{{ antigravity_tools_download_url_base }}/{{ antigravity_tools_artifacts.redhat }}"
        dest: "{{ _ag_temp_dir.path }}/{{ antigravity_tools_artifacts.redhat }}"
        mode: "0644"
      register: _download_result
      until: _download_result is succeeded
      retries: "{{ antigravity_tools_download_retries | default(5) }}"
      delay: "{{ antigravity_tools_download_delay | default(10) }}"

    - name: "antigravity_tools (RedHat): Install RPM package {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.dnf:
        name: "{{ _ag_temp_dir.path }}/{{ antigravity_tools_artifacts.redhat }}"
        state: present
        disable_gpg_check: true
      become: "{{ become_enabled }}"
      register: _install_result

  always:
    - name: "antigravity_tools (RedHat): Clean up temporary directory {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.file:
        path: "{{ _ag_temp_dir.path }}"
        state: absent
      when: _ag_temp_dir.path is defined

# ---------------------------------------------------------------------
# Uninstallation: Remove Package
# ---------------------------------------------------------------------

- name: "antigravity_tools (RedHat): Remove package {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.dnf:
    name: "{{ antigravity_tools_package_name }}"
    state: absent
  become: "{{ become_enabled }}"
  when:
    - app_state | default('present', true) == 'absent'
    - antigravity_tools_is_installed
