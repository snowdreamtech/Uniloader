---
# =====================================================================
# roles/apps/vars/antigravity/native/debian.yml
# =====================================================================

# Repository configuration
# WHY: Official Google Artifact Registry provides automatic updates
antigravity_debian_repo_key_url: "https://us-central1-apt.pkg.dev/doc/repo-signing-key.gpg"
antigravity_debian_repo_line: "deb [signed-by=/etc/apt/keyrings/antigravity-repo-key.gpg] https://us-central1-apt.pkg.dev/projects/antigravity-auto-updater-dev/ antigravity-debian main"

# Package name
antigravity_debian_package: "antigravity"
