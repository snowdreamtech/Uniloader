---
# =====================================================================
# roles/apps/vars/vscode/native/default.yml
# =====================================================================

# ---------------------------------------------------------------------
# Default variables for vscode
# ---------------------------------------------------------------------
vscode_defaults:
  # WHY: Most Linux distros use Microsoft repositories with 'code' package
  app_packages: ["code"]
  app_desc: "Visual Studio Code - Code Editing. Redefined."
  app_version: "latest"
  app_homepage: "https://code.visualstudio.com"
  app_license: "MIT"
  app_state: "present"

# Global VS Code settings
# Common extensions for all architectures
vscode_extensions_common:
  - "MS-CEINTL.vscode-language-pack-zh-hans"
  - "MS-CEINTL.vscode-language-pack-zh-hant"
  - "ms-vscode.remote-server"
  - "ms-vscode-remote.remote-ssh"
  - "ms-vscode.remote-explorer"
  - "ms-vscode-remote.remote-ssh-edit"
  - "ms-vscode-remote.vscode-remote-extensionpack"
  - "ms-vscode.remote-repositories"
  - "mhutchie.git-graph"
  - "GitHub.github-vscode-theme"
  - "GitHub.vscode-github-actions"
  - "GitHub.codespaces"
  - "GitHub.copilot"
  - "GitHub.copilot-chat"
  - "GitHub.remotehub"
  - "GitHub.vscode-pull-request-github"
  - "ms-python.python"
  - "ms-python.vscode-pylance"
  - "ms-toolsai.jupyter"
  - "ms-azuretools.vscode-docker"
  - "ms-kubernetes-tools.vscode-kubernetes-tools"
  - "ms-vscode-remote.remote-containers"
  - "ms-vscode.PowerShell"
  - "docker.docker"
  - "golang.go"
  - "rust-lang.rust-analyzer"
  - "ms-vscode.cpptools"
  - "ms-vscode.cpptools-extension-pack"
  - "vscjava.vscode-java-pack"
  - "redhat.java"
  - "redhat.ansible"
  - "redhat.vscode-yaml"
  - "timonwong.shellcheck"
  - "Dart-Code.dart-code"
  - "Dart-Code.flutter"
  - "Shopify.ruby-lsp"
  - "bmewburn.vscode-intelephense-client"
  - "Vue.volar"
  - "dsznajder.es7-react-js-snippets"
  - "dbaeumer.vscode-eslint"
  - "esbenp.prettier-vscode"
  - "msjsdiag.vscode-react-native"
  - "shd101wyy.markdown-preview-enhanced"
  - "continue.continue"
  - "anthropic.claude-code"

# Extensions supported ONLY on x86_64/amd64
# WHY: DEVSENSE PHP extensions currently lack ARM64 support
vscode_extensions_x64:
  - "DEVSENSE.phptools-vscode"
  - "DEVSENSE.profiler-php-vscode"
  - "DEVSENSE.intelli-php-vscode"
  - "DEVSENSE.composer-php-vscode"

# Combined extensions list based on architecture
vscode_extensions: "{{ vscode_extensions_common + (vscode_extensions_x64 if vscode_arch == 'x64' else []) }}"

vscode_channel: "stable" # stable or insiders

# Architecture mapping
# WHY: VS Code uses specific architecture labels in URLs
_vscode_arch_map:
  x86_64: "x64"
  aarch64: "arm64"
  armv7l: "armhf"

# Derived architecture
vscode_arch: "{{ _vscode_arch_map[ansible_architecture] | default(ansible_architecture, true) }}"

# Check if architecture is supported
# WHY: Early failure for unsupported architectures as requested.
vscode_is_supported_arch: "{{ vscode_arch in ['x64', 'arm64', 'armhf'] }}"

# Download URLs base
vscode_download_url_base: "https://update.code.visualstudio.com/latest"
