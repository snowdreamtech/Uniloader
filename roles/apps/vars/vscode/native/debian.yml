---
# =====================================================================
# roles/apps/vars/vscode/native/debian.yml
# =====================================================================

# Repository configuration
vscode_linux_repo_key_url: "https://packages.microsoft.com/keys/microsoft.asc"

# Debian/Ubuntu specific
vscode_debian_repo_url: "https://packages.microsoft.com/repos/code"
vscode_debian_repo_line: "deb [arch=amd64,arm64,armhf signed-by=/etc/apt/keyrings/packages.microsoft.gpg] {{ vscode_debian_repo_url }} stable main"

# Direct download fallback
vscode_linux_download_type: "linux-deb-"
vscode_linux_download_url: "{{ vscode_download_url_base }}/{{ vscode_linux_download_type }}{{ vscode_arch }}/{{ vscode_channel }}"
