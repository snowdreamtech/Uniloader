---
# =====================================================================
# roles/apps/vars/vscode/native/redhat.yml
# =====================================================================

# Repository configuration
vscode_linux_repo_key_url: "https://packages.microsoft.com/keys/microsoft.asc"

# RHEL/CentOS specific
vscode_rhel_repo_url: "https://packages.microsoft.com/yumrepos/vscode"
vscode_rhel_repo_content: |
  [code]
  name=Visual Studio Code
  baseurl={{ vscode_rhel_repo_url }}
  enabled=1
  gpgcheck=1
  gpgkey={{ vscode_linux_repo_key_url }}

# Direct download fallback
vscode_linux_download_type: "linux-rpm-"
vscode_linux_download_url: "{{ vscode_download_url_base }}/{{ vscode_linux_download_type }}{{ vscode_arch }}/{{ vscode_channel }}"
