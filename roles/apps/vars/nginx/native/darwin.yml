---
# =====================================================================
# roles/apps/vars/nginx/native/darwin.yml
# =====================================================================

nginx_overrides:
  # WHY: Both Homebrew and MacPorts use 'nginx' as package name
  app_packages: ["nginx"]
  app_service: "nginx"
  # WHY: macOS uses launchd for service management
  app_init_system: "launchd"
