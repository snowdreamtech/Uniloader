---
# =====================================================================
# roles/apps/vars/cc_switch/native/debian.yml
# =====================================================================

# Debian package naming patterns
cc_switch_debian_package: "CC-Switch-v{{ cc_switch_version }}-Linux.deb"

# DEB download URL
cc_switch_debian_deb_url: >-
  {{
    github_proxy +
    cc_switch_github_url + '/releases/download/v' +
    cc_switch_version + '/' + cc_switch_debian_package
  }}

# Temporary download path
cc_switch_debian_download_path: "/tmp/{{ cc_switch_debian_package }}"
