# =====================================================================
# roles/common/bootstrap/tasks/main.yml
#
# Purpose:
#   Bootstrap entry point.
#   - Windows hosts: skip bootstrap entirely (no Python required)
#   - POSIX hosts (Linux/macOS): run bootstrap_posix.yml
#
# Philosophy:
#   The entry file must contain *only* routing logic.
# ---------------------------------------------------------------------
# Discovery: Primitive OS detection without Python.
# WHY: On bare-metal or freshly provisioned hosts, gather_facts is usually
#      false. We must detect OS type using raw commands to route correctly.
# ---------------------------------------------------------------------
- name: "Discovery: Detect OS type (raw probe)"
  ansible.builtin.raw: "uname"
  register: raw_uname_probe
  ignore_errors: true
  changed_when: false
  tags: ["always"]

- name: "Set discovery facts: is_posix_system"
  ansible.builtin.set_fact:
    is_posix_system: "{{ (raw_uname_probe.rc | default(0)) == 0 }}"
    is_windows_system: "{{ (raw_uname_probe.rc | default(0)) != 0 }}"
  tags: ["always"]

# =====================================================================
#  WINDOWS: SKIP BOOTSTRAP
# =====================================================================

# WHY: Windows uses PowerShell modules via WinRM and does not require Python.
- name: "Skip bootstrap on Windows (no Python required)"
  ansible.builtin.debug:
    msg: "Windows host detected — bootstrap role skipped."
  when: is_windows_system | bool
  tags: ["always"]

# =====================================================================
#  POSIX (LINUX / MACOS): RUN BOOTSTRAP
# =====================================================================

# WHY: Run bootstrap logic for Linux/macOS.
- name: "Run POSIX bootstrap"
  ansible.builtin.include_tasks: "bootstrap_posix.yml"
  when: is_posix_system | bool
