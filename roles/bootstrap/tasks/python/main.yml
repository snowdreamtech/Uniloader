# =====================================================================
# roles/common/bootstrap/tasks/python/main.yml
#
# Purpose:
#   Main orchestrator for Python environment provisioning.
#   Routes the execution to node-specific tasks (Control vs Managed) 
#   based on the assigned node tags and performs final node-wide 
#   initialization.
#
# Simple Usage:
#   - import_tasks: "python/main.yml"
#
# Comprehensive Usage:
#   - import_tasks: "python/main.yml"
#     vars:
#       node_tags: ["control"]
#
# =====================================================================
- ansible.builtin.include_role:
    name: "native"
    tasks_from: "os_loader"
  vars:
    module_name: "python"