---
# =====================================================================
# roles/bootstrap/tasks/python/python_installer_loader.yml
#
# Purpose:
#   Raw bootstrap loader for Python installation.
#   Uses the 'raw' module to execute shell commands directly on hosts
#   where Python is not yet available. Supports a wide range of
#   Linux distributions and package managers.
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: bootstrap
#       tasks_from: python_installer_loader
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: bootstrap
#       tasks_from: python_installer_loader
#     vars:
#       become_enabled: true
#
# =====================================================================

# ---------------------------------------------------------------------
# Execution: Use raw shell script to detect and use the local package
# manager to install Python 3 and Pip.
# ---------------------------------------------------------------------
- name: "Install Python runtime and pip (raw, no Python required) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.raw: |
    set -eu

    echo "[PYTHON_INSTALLER_LOADER] Detecting package manager..."

    # Detect package manager
    if PATH="{{ os_paths }}" command -v apk >/dev/null 2>&1; then
      PM="apk"
    elif PATH="{{ os_paths }}" command -v apt-get >/dev/null 2>&1; then
      PM="apt"
    elif PATH="{{ os_paths }}" command -v microdnf >/dev/null 2>&1; then
      PM="microdnf"
    elif PATH="{{ os_paths }}" command -v dnf >/dev/null 2>&1; then
      PM="dnf"
    elif PATH="{{ os_paths }}" command -v yum >/dev/null 2>&1; then
      PM="yum"
    elif PATH="{{ os_paths }}" command -v pacman >/dev/null 2>&1; then
      PM="pacman"
    elif PATH="{{ os_paths }}" command -v zypper >/dev/null 2>&1; then
      PM="zypper"
    elif PATH="{{ os_paths }}" command -v xbps-install >/dev/null 2>&1; then
      PM="xbps"
    elif PATH="{{ os_paths }}" command -v emerge >/dev/null 2>&1; then
      PM="emerge"
    elif PATH="{{ os_paths }}" command -v pkg >/dev/null 2>&1; then
      PM="freebsd"
    elif PATH="{{ os_paths }}" command -v brew >/dev/null 2>&1; then
      PM="homebrew"
    elif PATH="{{ os_paths }}" command -v port >/dev/null 2>&1; then
      PM="macports"
    elif PATH="{{ os_paths }}" command -v urpmi >/dev/null 2>&1; then
      PM="urpmi"
    elif PATH="{{ os_paths }}" command -v eopkg >/dev/null 2>&1; then
      PM="eopkg"
    elif PATH="{{ os_paths }}" command -v opkg >/dev/null 2>&1; then
      PM="opkg"
    elif PATH="{{ os_paths }}" command -v pkg_add >/dev/null 2>&1; then
      PM="pkg_add"
    elif PATH="{{ os_paths }}" command -v pkgin >/dev/null 2>&1; then
      PM="pkgin"
    elif PATH="{{ os_paths }}" command -v installp >/dev/null 2>&1; then
      PM="installp"
    elif PATH="{{ os_paths }}" command -v swinstall >/dev/null 2>&1; then
      PM="swinstall"
    elif PATH="{{ os_paths }}" command -v nix-env >/dev/null 2>&1; then
      PM="nix-env"
    else
      echo "[PYTHON_INSTALLER_LOADER] ERROR: Unsupported OS (no known package manager found)"
      exit 1
    fi

    echo "[PYTHON_INSTALLER_LOADER] Detected package manager: $PM"
    echo "[PYTHON_INSTALLER_LOADER] Installing Python..."

    case "$PM" in
      apk)
        apk update || true
        apk add --no-cache python3 py3-pip
        apk add --no-cache python3-venv >/dev/null 2>&1 || apk add --no-cache py3-venv >/dev/null 2>&1 || true
        ;;

      apt)
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -y
        apt-get install -y python3 python3-pip

        # Install Python ecosystem components
        apt-get install -y python3-venv >/dev/null 2>&1 || true
        apt-get install -y python3-distutils >/dev/null 2>&1 || true
        apt-get install -y python3-setuptools >/dev/null 2>&1 || true
        apt-get install -y python3-wheel >/dev/null 2>&1 || true
        ;;

      microdnf)
        microdnf install -y python3 python3-pip || microdnf install -y python3
        microdnf install -y python3-venv >/dev/null 2>&1 || true
        ;;

      dnf)
        dnf install -y python3 python3-pip \
          || dnf install -y python3 python3-pip-wheel \
          || dnf install -y python3 python3-wheel python3-pip
        dnf install -y python3-venv >/dev/null 2>&1 || true
        ;;

      yum)
        yum install -y python3 python3-pip \
          || yum install -y python3 python3-pip-wheel \
          || yum install -y python3 python3-wheel python3-pip
        yum install -y python3-venv >/dev/null 2>&1 || true
        ;;

      pacman)
        pacman -Sy --noconfirm python python-pip
        pacman -Sy --noconfirm python-venv >/dev/null 2>&1 || true
        ;;

      zypper)
        zypper --non-interactive install python311 python311-pip || zypper --non-interactive install python3 python3-pip
        zypper --non-interactive install python311-venv >/dev/null 2>&1 || zypper --non-interactive install python3-venv >/dev/null 2>&1 || true
        ;;

      xbps)
        xbps-install -Sy python3 python3-pip
        xbps-install -Sy python3-venv >/dev/null 2>&1 || true
        ;;

      emerge)
        emerge -q dev-lang/python dev-python/pip || emerge -q dev-lang/python
        ;;

      freebsd)
        pkg install -y python3 py39-pip || pkg install -y python3 py38-pip
        ;;

      homebrew)
        brew install python3
        ;;

      macports)
        port selfupdate || true
        port install python311 || port install python310 || port install python3
        ;;

      urpmi)
        urpmi --auto python3 python3-pip
        urpmi --auto python3-venv >/dev/null 2>&1 || true
        ;;

      eopkg)
        eopkg install -y python3
        eopkg install -y python3-venv >/dev/null 2>&1 || true
        ;;

      opkg)
        opkg update
        opkg install python3 python3-pip
        opkg install python3-venv >/dev/null 2>&1 || true
        ;;

      pkg_add)
        pkg_add -I python%3
        ;;

      pkgin)
        pkgin -y install python311 || pkgin -y install python310 || pkgin -y install python3
        ;;

      installp)
        # AIX relies on RPMs from the AIX Toolbox for modern Python
        rpm -Uvh --replacepkgs python3 python3-pip || echo "[PYTHON_INSTALLER_LOADER] Manual RPM installation required for AIX"
        ;;

      swinstall)
        # HP-UX relies on depots, generic fallback warning
        echo "[PYTHON_INSTALLER_LOADER] swinstall requires pre-downloaded python depots. Ensure python is in PATH."
        ;;

      nix-env)
        nix-env -iA nixpkgs.python3 nixpkgs.python3Packages.pip
        ;;
    esac

    echo "[PYTHON_INSTALLER_LOADER] Python installation complete"
    echo "[PYTHON_INSTALLER_LOADER] Validating Python..."

    # Validate python
    # Detect modern python first
    if PATH="{{ os_paths }}" command -v python3.14 >/dev/null 2>&1; then
      PY=python3.14
    elif PATH="{{ os_paths }}" command -v python3.13 >/dev/null 2>&1; then
      PY=python3.13
    elif PATH="{{ os_paths }}" command -v python3.12 >/dev/null 2>&1; then
      PY=python3.12
    elif PATH="{{ os_paths }}" command -v python3.11 >/dev/null 2>&1; then
      PY=python3.11
    elif PATH="{{ os_paths }}" command -v python3.10 >/dev/null 2>&1; then
      PY=python3.10
    elif PATH="{{ os_paths }}" command -v python3.9 >/dev/null 2>&1; then
      PY=python3.9
    elif PATH="{{ os_paths }}" command -v python3.8 >/dev/null 2>&1; then
      PY=python3.8
    elif PATH="{{ os_paths }}" command -v python3.7 >/dev/null 2>&1; then
      PY=python3.7
    elif PATH="{{ os_paths }}" command -v python3.6 >/dev/null 2>&1; then
      PY=python3.6
    elif PATH="{{ os_paths }}" command -v python3.5 >/dev/null 2>&1; then
      PY=python3.5
    elif PATH="{{ os_paths }}" command -v python3 >/dev/null 2>&1; then
      PY=python3
    elif PATH="{{ os_paths }}" command -v python >/dev/null 2>&1; then
      PY=python
    else
      echo "[PYTHON_INSTALLER_LOADER] ERROR: Python installation failed"
      exit 1
    fi

    $PY --version || true

    # Ensure standard symlinks exist
    PY_BIN_PATH=$(PATH="{{ os_paths }}" command -v "$PY")
    if [ -n "$PY_BIN_PATH" ]; then
      if [ ! -e /usr/bin/python3 ]; then
        echo "[PYTHON_INSTALLER_LOADER] Creating /usr/bin/python3 symlink to $PY_BIN_PATH"
        ln -sf "$PY_BIN_PATH" /usr/bin/python3 || true
      fi
      if [ ! -e /usr/bin/python ]; then
        echo "[PYTHON_INSTALLER_LOADER] Creating /usr/bin/python symlink to $PY_BIN_PATH"
        ln -sf "$PY_BIN_PATH" /usr/bin/python || true
      fi
    fi

    # Validate pip
    if ! PATH="{{ os_paths }}" command -v pip3 >/dev/null 2>&1 && ! PATH="{{ os_paths }}" command -v pip >/dev/null 2>&1; then
      echo "[PYTHON_INSTALLER_LOADER] pip not found, attempting fallback installation..."
      $PY -m ensurepip --default-pip || true
    fi

    echo "[PYTHON_INSTALLER_LOADER] Python bootstrap completed successfully"
  become: "{{ become_enabled | default(true) }}"
  changed_when: false
  args:
    executable: "/bin/sh"
