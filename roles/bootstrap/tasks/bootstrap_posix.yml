---
# =====================================================================
# roles/bootstrap/tasks/bootstrap_posix.yml
#
# Purpose:
#   POSIX-only bootstrap logic (Linux + macOS).
#   Ensures a working Python environment (venv) exists so that Ansible
#   can run Python-based modules reliably.
#
# Lifecycle:
#   - force=true → delete flag + venv → re-bootstrap
#   - flag exists → skip bootstrap
#   - flag missing → run bootstrap
# =====================================================================

# =====================================================================
#  OS DETECTION (RAW)
# =====================================================================

# WHY: We need to know if we are on Darwin or Linux to set paths correctly,
#      but Python (and thus Facts) may not be available yet.
- name: "Detection: Get POSIX system name (raw) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.raw: "uname -s"
  register: raw_os_name_probe
  changed_when: false
  tags: ["always"]
- name: "Set Internal Context: current_os_name {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    current_os_name: "{{ raw_os_name_probe.stdout | trim if (raw_os_name_probe.rc | default(1) == 0) else (ansible_system | default('Linux', true)) }}"
  tags: ["always"]

- name: "Discovery: Dynamically group hosts by OS name {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.group_by:
    key: "{{ current_os_name | lower }}"
  changed_when: false
  tags: ["always"]

- name: "Discovery: Check for platform-specific group variables {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.stat:
    path: "{{ inventory_dir }}/group_vars/{{ current_os_name | lower }}.yml"
  register: _platform_vars_stat
  delegate_to: localhost
  tags: ["always"]

- name: "Discovery: Explicitly load platform-specific group variables {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.include_vars:
    file: "{{ inventory_dir }}/group_vars/{{ current_os_name | lower }}.yml"
  when: _platform_vars_stat.stat.exists
  tags: ["always"]

# =====================================================================
#  SET PATHS
# =====================================================================

# WHY: Determine bootstrap flag path for POSIX systems.
# Unified /opt path strategy (aligns with Docker volumes at /opt/data)
# macOS/Linux → /opt (FHS standard for optional software)
- name: "Set bootstrap flag path {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    bootstrap_flag_path: "/opt/.ansible_bootstrap_done"
  tags: ["always"]

# WHY: Determine Python venv path for POSIX systems.
- name: "Set python venv path {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    python_venv_path: "/opt/venv/ansible"
  tags: ["always"]

# WHY: Remove bootstrap flag when force override is requested (raw).
- name: "Force override: remove bootstrap flag {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.raw: "rm -f {{ bootstrap_flag_path }}"
  when: force | default(false, true) | bool
  become: "{{ become_enabled | default(true) }}"

# WHY: Remove python venv when force override is requested (raw).
- name: "Force override: remove python venv {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.raw: "rm -rf {{ python_venv_path }}"
  when: force | default(false, true) | bool
  become: "{{ become_enabled | default(true) }}"

# =====================================================================
#  CHECK FLAG + VENV STATUS
# =====================================================================

# WHY: Check bootstrap flag existence using raw module (no python required).
- name: "Check bootstrap flag {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.raw: "test -f {{ bootstrap_flag_path }}"
  register: bootstrap_flag_raw
  ignore_errors: true
  changed_when: false
  become: "{{ become_enabled | default(true) }}"
  tags: ["always"]

# WHY: Check python venv existence using raw module (no python required).
- name: "Check python venv {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.raw: "test -d {{ python_venv_path }}"
  register: python_venv_flag_raw
  ignore_errors: true
  changed_when: false
  become: "{{ become_enabled | default(true) }}"
  tags: ["always"]

# WHY: Set results of raw probes into normalized facts.
- name: "Set bootstrap probe results {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    bootstrap_flag_exists: "{{ (bootstrap_flag_raw.rc | default(1)) == 0 }}"
    python_venv_exists: "{{ (python_venv_flag_raw.rc | default(1)) == 0 }}"
  tags: ["always"]

# =====================================================================
#  EXECUTE BOOTSTRAP LOGIC
# =====================================================================

# WHY: Run python bootstrap if flag is missing.
- name: "Run Python bootstrap {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.include_tasks: "python/main.yml"
  when:
    - not bootstrap_flag_exists | bool

# =====================================================================
#  CREATE FLAG AFTER SUCCESSFUL BOOTSTRAP
# =====================================================================

# WHY: Mark bootstrap as completed (raw).
- name: "Mark bootstrap as done {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.raw: "touch {{ bootstrap_flag_path }}"
  when:
    - not bootstrap_flag_exists | bool
  become: "{{ become_enabled | default(true) }}"

# =====================================================================
#  ALWAYS ACTIVATE PYTHON INTERPRETER
# =====================================================================

# WHY: Ensure Ansible uses the venv Python for all subsequent tasks.
- name: "Activate Python venv interpreter {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    ansible_python_interpreter: "{{ python_venv_path }}/bin/python3"
    ansible_docker_python_interpreter: "{{ python_venv_path }}/bin/python3"
  changed_when: false
  tags: ["always"]
