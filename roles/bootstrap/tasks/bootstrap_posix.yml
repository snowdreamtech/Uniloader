# =====================================================================
# roles/common/bootstrap/tasks/bootstrap_posix.yml
#
# Purpose:
#   POSIX-only bootstrap logic (Linux + macOS).
#   Ensures a working Python environment (venv) exists so that Ansible
#   can run Python-based modules reliably.
#
# Lifecycle:
#   - force=true → delete flag + venv → re-bootstrap
#   - flag exists → skip bootstrap
#   - flag missing → run bootstrap
# =====================================================================

# =====================================================================
#  OS DETECTION (RAW)
# =====================================================================

# WHY: We need to know if we are on Darwin or Linux to set paths correctly,
#      but Python (and thus Facts) may not be available yet.
- name: "Detection: Get POSIX system name (raw)"
  ansible.builtin.raw: "uname -s"
  register: raw_os_name_probe
  changed_when: false
  tags: ["always"]
- name: "Set Internal Context: current_os_name"
  ansible.builtin.set_fact:
    current_os_name: "{{ raw_os_name_probe.stdout | trim if raw_os_name_probe.stdout is defined else (ansible_system | default('Linux', true)) }}"
  tags: ["always"]

- name: "Discovery: Dynamically group hosts by OS name"
  ansible.builtin.group_by:
    key: "{{ current_os_name | lower }}"
  changed_when: false
  tags: ["always"]

- name: "Discovery: Check for platform-specific group variables"
  ansible.builtin.stat:
    path: "{{ inventory_dir }}/group_vars/{{ current_os_name | lower }}.yml"
  register: _platform_vars_stat
  delegate_to: localhost
  tags: ["always"]

- name: "Discovery: Explicitly load platform-specific group variables"
  ansible.builtin.include_vars:
    file: "{{ inventory_dir }}/group_vars/{{ current_os_name | lower }}.yml"
  when: _platform_vars_stat.stat.exists
  tags: ["always"]

# =====================================================================
#  SET PATHS
# =====================================================================

# WHY: Determine bootstrap flag path for POSIX systems.
# Unified /opt path strategy (aligns with Docker volumes at /opt/data)
# macOS/Linux → /opt (FHS standard for optional software)
- name: "Set bootstrap flag path"
  ansible.builtin.set_fact:
    bootstrap_flag_path: "/opt/.ansible_bootstrap_done"
  tags: ["always"]

# WHY: Determine Python venv path for POSIX systems.
- name: "Set python venv path"
  ansible.builtin.set_fact:
    python_venv_path: "/opt/venv/ansible"
  tags: ["always"]

# =====================================================================
#  FORCE OVERRIDE (force=true)
# =====================================================================

# WHY: Remove bootstrap flag when force override is requested.
- name: "Force override: remove bootstrap flag"
  ansible.builtin.file:
    path: "{{ bootstrap_flag_path }}"
    state: absent
  when: force | default(false, true) | bool
  become: true

# WHY: Remove python venv when force override is requested.
- name: "Force override: remove python venv"
  ansible.builtin.file:
    path: "{{ python_venv_path }}"
    state: absent
  when: force | default(false, true) | bool
  become: true

# =====================================================================
#  CHECK FLAG + VENV STATUS
# =====================================================================

# WHY: Check bootstrap flag existence.
- name: "Check bootstrap flag"
  ansible.builtin.stat:
    path: "{{ bootstrap_flag_path }}"
  register: bootstrap_flag
  become: true
  tags: ["always"]

# WHY: Check python venv existence.
- name: "Check python venv"
  ansible.builtin.stat:
    path: "{{ python_venv_path }}"
  register: python_venv_flag
  become: true
  tags: ["always"]

# # WHY: Log status for audit/debug.
# - name: "DEBUG: bootstrap_flag"
#   ansible.builtin.debug:
#     msg: "{{ bootstrap_flag | to_nice_yaml(indent=2) }}"
#   tags: ["always"]

# - name: "DEBUG: python_venv_flag"
#   ansible.builtin.debug:
#     msg: "{{ python_venv_flag | to_nice_yaml(indent=2) }}"
#   tags: ["always"]

# =====================================================================
#  RUN BOOTSTRAP (ONLY WHEN FLAG DOES NOT EXIST)
# =====================================================================

# WHY: Run Python initialization only when bootstrap flag is missing.
- name: "Run Python bootstrap"
  ansible.builtin.include_tasks: "python/main.yml"
  when:
    - bootstrap_flag.stat is defined
    - not bootstrap_flag.stat.exists

# =====================================================================
#  CREATE FLAG AFTER SUCCESSFUL BOOTSTRAP
# =====================================================================

# WHY: Mark bootstrap as completed.
- name: "Mark bootstrap as done"
  ansible.builtin.file:
    path: "{{ bootstrap_flag_path }}"
    state: touch
  when:
    - bootstrap_flag.stat is defined
    - not bootstrap_flag.stat.exists
  become: true

# =====================================================================
#  ALWAYS ACTIVATE PYTHON INTERPRETER
# =====================================================================

# WHY: Ensure Ansible uses the venv Python for all subsequent tasks.
- name: "Activate Python venv interpreter"
  ansible.builtin.set_fact:
    ansible_python_interpreter: "{{ python_venv_path }}/bin/python3"
    ansible_docker_python_interpreter: "{{ python_venv_path }}/bin/python3"
  changed_when: false
  tags: ["always"]
