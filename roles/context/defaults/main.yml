# =====================================================================
# roles/context/defaults/main.yml
#
# Purpose:
#   Global default variables for the native infrastructure layer.
#   Contains the enterprise-grade node_tags_map for deriving boolean 
#   architectural facts, and repository management command templates 
#   for RedHat-family distributions.
#
# Simple Usage:
#   These defaults are automatically loaded when the 'native' role 
#   is included or referenced.
#
# Comprehensive Usage:
#   Override specific repo commands or tag mappings in group_vars 
#   to customize infrastructure behavior per-environment.
#
# =====================================================================

# =====================================================================
# Tag Metadata (for validation and documentation)
# =====================================================================
tag_metadata:
  version: "2.1"
  total_tags: 286        # ← Added kubespray_host
  categories: 16

  
  # Mutually exclusive tag groups
  conflicts:
    - [prod, dev, test, stage]  # Environment conflicts
    - [ipv4_only, ipv6_only]    # IP protocol conflicts
    - [stateful, stateless]     # State conflicts
    - [immutable, mutable]      # Mutability conflicts
    - [ephemeral, long_running] # Lifecycle conflicts
  
  # Deprecated tags (will be removed in future versions)
  deprecated:
    db_master: "Use db_primary instead (deprecated since v2.0)"
    db_slave: "Use db_replica instead (deprecated since v2.0)"
    k8s_master: "Use k8s_control_plane instead (deprecated since v2.0)"
  
  # Required combinations
  requires:
    k8s_worker: [k8s_node]           # k8s_worker requires k8s_node
    k8s_control_plane: [k8s_node]    # k8s_control_plane requires k8s_node
    db_replica: [db]                 # db_replica requires db
  
  # Recommended combinations
  recommends:
    prod: [monitored, backup_enabled, ha]
    db: [backup_enabled]
    public_ip: [ddos_protected, waf_protected]

