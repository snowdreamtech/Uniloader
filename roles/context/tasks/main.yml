---
# =====================================================================
# roles/context/tasks/main.yml
#
# Purpose:
#   Unified facts loader (snake_case version).
#   Orchestrates the loading of system facts through modular sub-tasks.
#
# Structure:
#   1. facts_os.yml        : Core setup, snake_case OS vars, Fingerprint
#   2. facts_context.yml   : User Identity, Permissions (Become), Node Tags
#   3. detect_system.yml   : System capabilities (Init, WSL, Cgroup, Localhost)
#   4. detect_container.yml: Container Runtime Engine (Docker/Podman/K8s)
#
# Author: Native AI Team
#
# Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: facts_loader
# =====================================================================

# ---------------------------------------------------------------------
# Stage 1: Core OS Facts & Fingerprint
# ---------------------------------------------------------------------
- ansible.builtin.import_tasks: facts_os.yml

# ---------------------------------------------------------------------
# Stage 2: Context (Identity, Permissions, Tags)
# ---------------------------------------------------------------------
- ansible.builtin.import_tasks: facts_context.yml

# ---------------------------------------------------------------------
# Stage 3: System Capabilities (Init, WSL, Localhost)
# ---------------------------------------------------------------------
- ansible.builtin.import_tasks: detect_system.yml

# ---------------------------------------------------------------------
# Stage 4: Container Runtime Detection
# ---------------------------------------------------------------------
- ansible.builtin.import_tasks: detect_container.yml
