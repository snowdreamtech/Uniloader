---
# =====================================================================
# roles/context/tasks/facts_os.yml
#
# Purpose:
#   Core OS fact gathering and normalization.
#   - Runs ansible.builtin.setup
#   - Standardizes OS variables to snake_case
#   - Builds the os_fingerprint
# =====================================================================

# ---------------------------------------------------------------------
# Collection: Refresh system facts
# ---------------------------------------------------------------------
- name: "Refresh system facts {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.setup:
  become: false
  register: facts_result
  retries: 3
  delay: 2
  until: facts_result is succeeded
  tags: ["always"]

# ---------------------------------------------------------------------
# OS Information: Extract and normalize into snake_case
# ---------------------------------------------------------------------
- name: "Build OS fact variables {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    # Basic classification
    os_family: "{{ ansible_facts.os_family | lower }}"
    os_distribution: "{{ ansible_facts.distribution | lower }}"
    os_system: "{{ ansible_facts.system | lower }}"

    # Virtualization and Container Detection (Basic)
    is_container: >-
      {{
        ansible_facts.virtualization_type | default('', true) in ['docker', 'lxc', 'container', 'containerd', 'podman', 'proot']
        or (ansible_facts.os_release.id | default('', true) == 'alpine' and lookup('file', '/proc/1/cgroup', errors='ignore') is search('docker|lxc|container'))
      }}
    virtualization_type: "{{ ansible_facts.virtualization_type | default('phys', true) }}"
    virtualization_role: "{{ ansible_facts.virtualization_role | default('host', true) }}"

    # Architecture
    os_architecture: "{{ ansible_facts.architecture }}"

    # Version info
    os_version_major: "{{ ansible_facts.distribution_version.split('.')[0] | default('0', true) | int }}"
    os_version_minor: "{{ ansible_facts.distribution_version.split('.')[1] | default('0', true) | int }}"
    os_version_full: "{{ ansible_facts.distribution_version }}"

    # Codename
    os_codename: "{{ (ansible_facts.distribution_release | default(ansible_facts.lsb.codename | default('unknown', true), true)) | lower }}"

    # Package and Service Manager
    os_pkg_mgr: "{{ ansible_facts.pkg_mgr | default('unknown', true) }}"
    os_service_mgr: "{{ ansible_facts.service_mgr | default('sysvinit', true) }}"

    # Time and Uptime
    os_local_time: "{{ ansible_facts.date_time.iso8601 }}"
    os_uptime_seconds: "{{ ansible_facts.uptime_seconds | default(0, true) }}"
  tags: ["always"]

# ---------------------------------------------------------------------
# Package Manager Refinement (Darwin)
# ---------------------------------------------------------------------
# ---------------------------------------------------------------------
# Package Manager Refinement (Darwin)
# ---------------------------------------------------------------------
- name: "Refine os_pkg_mgr for macOS (Priority: Homebrew > MacPorts > Default) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  when: os_family == 'darwin'
  block:
    - name: "Check for Homebrew {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.shell: "PATH={{ os_paths }} command -v brew"
      register: _check_brew
      failed_when: false
      changed_when: false

    - name: "Check for MacPorts {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.shell: "PATH={{ os_paths }} command -v port"
      register: _check_port
      failed_when: false
      changed_when: false

    - name: "Override os_pkg_mgr to homebrew (User Preference 1) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.set_fact:
        os_pkg_mgr: "homebrew"
      when: _check_brew.rc == 0

    - name: "Override os_pkg_mgr to macports (User Preference 2) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.set_fact:
        os_pkg_mgr: "macports"
      when:
        - _check_brew.rc != 0
        - _check_port.rc == 0
  tags: ["always"]

# ---------------------------------------------------------------------
# Architecture Normalization
# ---------------------------------------------------------------------
- name: "Normalize architecture map {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    architecture_map: >-
      {{
        {
          'x86_64': 'amd64',
          'aarch64': 'arm64',
          'armv7l': 'armv7',
          'armv6l': 'armv6',
          'ppc64le': 'ppc64le',
          'ppc64': 'ppc64',
          'riscv64': 'riscv64',
          's390x': 's390x',
          'loongarch64': 'loongarch64',
          'mips64': 'mips64',
          'mips': 'mips'
        }
        | combine(architecture_map | default({}, true))
      }}
  tags: ["always"]

- name: "Set normalized architecture (OCI/Docker/Go style) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    os_architecture_oci: >-
      {{
        architecture_map[os_architecture]
        | default(os_architecture, true)
      }}
  tags: ["always"]

# ---------------------------------------------------------------------
# Global Fingerprint
# ---------------------------------------------------------------------
- name: "Build os_fingerprint {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    os_fingerprint: >-
      {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}
      ({{ ansible_facts.architecture }}) @ {{ inventory_hostname }}
      [{{ ansible_facts.os_family }}]
  tags: ["always"]

# ---------------------------------------------------------------------
# Structured Information (os_info)
# ---------------------------------------------------------------------
- name: "Build Combined OS dictionary (os_info) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    os_info:
      family: "{{ os_family }}"
      distribution: "{{ os_distribution }}"
      codename: "{{ os_codename }}"
      arch: "{{ os_architecture }}"
      architecture_oci: "{{ os_architecture_oci }}"
      system: "{{ os_system }}"
      pkg_mgr: "{{ os_pkg_mgr }}"
      service_mgr: "{{ os_service_mgr }}"
      version:
        full: "{{ os_version_full }}"
        major: "{{ os_version_major }}"
        minor: "{{ os_version_minor }}"
      time: "{{ os_local_time }}"
      uptime: "{{ os_uptime_seconds }}"
      virtualization:
        type: "{{ virtualization_type }}"
        role: "{{ virtualization_role }}"
        is_container: "{{ is_container }}"
  tags: ["always"]
