---
# =====================================================================
# roles/context/tasks/facts_context.yml
#
# Purpose:
#   Derive context variables: Tags, User Identity, and Permissions.
#   - Initializes node_tags
#   - Auto-derives boolean flags from tags
#   - Determines is_root_user and become_enabled
# =====================================================================

# ---------------------------------------------------------------------
# Validation: Tag Map Structure
# ---------------------------------------------------------------------
- name: "Validate tag_map structure {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that:
      - tag_map is defined
      - tag_map is mapping
      - tag_map | length > 0
    fail_msg: "tag_map must be defined as a non-empty dictionary. Current type: {{ tag_map | default('undefined') | type_debug }}"
    success_msg: "tag_map structure validated successfully ({{ tag_map | length }} tags)"
  tags: ["always"]

# ---------------------------------------------------------------------
# Node Tags: Normalization and Mapping
# ---------------------------------------------------------------------
- name: "Ensure node_tags exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    node_tags: "{{ node_tags | default([], true) }}"
  tags: ["always"]

# ---------------------------------------------------------------------
# Validation: Node Tags Type Check
# ---------------------------------------------------------------------
- name: "Validate node_tags is a list {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that:
      - node_tags is sequence
      - node_tags is not string
      - node_tags is not mapping
    fail_msg: "node_tags must be a list, got: {{ node_tags | type_debug }}. Example: node_tags: [prod, web, docker_host]"
    success_msg: "node_tags type validated ({{ node_tags | length }} tags)"
  when: node_tags is defined and node_tags | length > 0
  tags: ["always"]

- name: "Initialize all tag variables to false {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    "{{ tag_item.value }}": false
  loop: "{{ tag_map | dict2items }}"
  loop_control:
    loop_var: tag_item
    label: "{{ tag_item.key }}"
  tags: ["always"]

# ---------------------------------------------------------------------
# Warning: Deprecated Tags Detection
# ---------------------------------------------------------------------
- name: "Warn about deprecated tags {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.debug:
    msg: "WARNING: Tag '{{ deprecated_tag }}' is deprecated. {{ tag_metadata.deprecated[deprecated_tag] }}"
  loop: "{{ node_tags }}"
  loop_control:
    loop_var: deprecated_tag
  when:
    - tag_metadata is defined
    - tag_metadata.deprecated is defined
    - deprecated_tag in tag_metadata.deprecated
  tags: ["always"]

# ---------------------------------------------------------------------
# Derivation: Auto-derive boolean variables from tags
# ---------------------------------------------------------------------
- name: "Auto-derive tag variables {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    "{{ tag_map[active_tag] }}": true
  loop: "{{ node_tags }}"
  loop_control:
    loop_var: active_tag
  when: active_tag in tag_map
  tags: ["always"]

- name: "Default to managed node when no control tag is present {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    is_managed_node: true
  when:
    - not (is_control_node | default(false, true))
  tags: ["always"]

# ---------------------------------------------------------------------
# Identity Detection
# ---------------------------------------------------------------------
- name: "Build is_root_user {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    is_root_user: "{{ (ansible_user_name | default(ansible_env.USER | default('root', true), true)) == 'root' }}"
  tags: ["always"]

- name: "Derive user home directory path {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    ansible_user_home: >-
      {%- set ansible_user = ansible_user_name | default(ansible_env.USER | default('ansible', true), true) -%}
      {%- set base_path = '/Users' if os_family == 'darwin' else '/home' -%}
      {%- set root_path = '/var/root' if os_family == 'darwin' else '/root' -%}
      {{- root_path if is_root_user else base_path ~ '/' ~ ansible_user -}}
  tags: ["always"]

- name: "Scan for canonical binary directories {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.stat:
    path: "{{ scanning_dir }}"
  loop_control:
    loop_var: scanning_dir
  loop:
    # 1. Version Managers (Should have high priority)
    - "{{ ansible_user_home }}/.pyenv/bin"
    - "{{ ansible_user_home }}/.rbenv/bin"
    - "{{ ansible_user_home }}/.nodenv/bin"
    - "{{ ansible_user_home }}/.ghcup/bin"

    # 2. User-level & Modern Language Ecosystems
    - "{{ ansible_user_home }}/.local/bin"
    - "{{ ansible_user_home }}/go/bin"
    - "{{ ansible_user_home }}/.cargo/bin"
    - "{{ ansible_user_home }}/.bun/bin"
    - "{{ ansible_user_home }}/.deno/bin"
    - "{{ ansible_user_home }}/.npm-global/bin"
    - "{{ ansible_user_home }}/.yarn/bin"
    - "{{ ansible_user_home }}/.pnpm-bin"
    - "{{ ansible_user_home }}/.krew/bin"
    - "{{ ansible_user_home }}/.composer/vendor/bin"
    - "{{ ansible_user_home }}/.config/composer/vendor/bin"
    - "{{ ansible_user_home }}/.dotnet/tools"
    - "{{ ansible_user_home }}/.cabal/bin"

    # 3. macOS Specific (Homebrew / MacPorts)
    - "/opt/homebrew/bin"
    - "/opt/homebrew/sbin"
    - "/opt/local/bin"
    - "/opt/local/sbin"

    # 4. Standard Unix / Linux (Baseline)
    - "/usr/local/bin"
    - "/usr/local/sbin"
    - "/usr/local/go/bin"
    - "/usr/bin"
    - "/usr/sbin"
    - "/bin"
    - "/sbin"
  register: _path_discovery
  changed_when: false
  tags: ["always"]




- name: "Build canonical os_paths fact {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    os_paths: "{{ _path_discovery.results | selectattr('stat.exists') | map(attribute='scanning_dir') | join(':') }}"
  tags: ["always"]





# ---------------------------------------------------------------------
# Permission Strategy
# ---------------------------------------------------------------------
- name: "Build become_enabled {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    become_enabled: >-
      {{
        (not (is_container | default(false, true)))
        and (not (is_root_user | default(false, true)))
      }}
  tags: ["always"]
