---
# roles/base/os_loader/tasks/main.yml
- name: Evaluate execution context privilege permissions based on node_tags
  ansible.builtin.set_fact:
    can_escalate_privilege: "{{ 'container' not in node_tags or 'restricted' not in node_tags }}"

- name: Enforce basic base utilities
  ansible.builtin.command: "{{ item.cmd }}"
  loop:
    - { os: alpine, cmd: "apk update" }
    - { os: debian, cmd: "apt-get update -y" }
  when: unified_os_family == item.os and can_escalate_privilege
  changed_when: false
  # Note: Idempotence enforced via changed_when: false since it's an update mechanism.
