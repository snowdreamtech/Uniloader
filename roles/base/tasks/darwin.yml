---
# =====================================================================
# roles/base/tasks/darwin.yml
#
# Purpose:
#   macOS-specific baseline configuration tasks.
#   Installs Homebrew and MacPorts (package managers), mas (Mac App Store CLI),
#   base system packages, VIM configuration, and global Git settings.
#
# Simple Usage:
#   - role: base
#
# Comprehensive Usage:
#   - role: base
#     vars:
#       become_enabled: true
#
# =====================================================================

# ---------------------------------------------------------------------
# Pre-flight Check: Avoid redundant GPG installation if GPGTools
# is present (e.g. system-wide GPG Suite).
# ---------------------------------------------------------------------
- name: "Check if GPG is already installed system-wide"
  ansible.builtin.command: "which gpg"
  register: gpg_installed_check
  failed_when: false
  changed_when: false
  check_mode: false
  tags: ["always"]

- name: "Exclude gnupg from base packages if already present"
  ansible.builtin.set_fact:
    base_packages: "{{ base_packages | reject('search', 'gnupg') | list }}"
  when: gpg_installed_check.rc == 0
  tags: ["always"]

# ---------------------------------------------------------------------
# macOS: Install Homebrew (Package Manager)
# ---------------------------------------------------------------------
# WHY: Homebrew must be installed before any packages
# Provides the primary package management system for macOS
- ansible.builtin.include_tasks: "homebrew.yml"

# ---------------------------------------------------------------------
# macOS: Install MacPorts (Alternative Package Manager)
# ---------------------------------------------------------------------
# WHY: MacPorts serves as fallback when Homebrew is not available
# Supports older macOS versions (10.5+) better than Homebrew
- ansible.builtin.include_tasks: "macports.yml"

# ---------------------------------------------------------------------
# macOS: Install mas (Mac App Store CLI) with version compatibility
# ---------------------------------------------------------------------
# WHY: mas is required for package_loader to support mas: prefix
# Must be installed after package managers (Homebrew/MacPorts) are ready
- ansible.builtin.include_tasks: "mas.yml"

# ---------------------------------------------------------------------
# Execution: Install the baseline utilities defined in the base role
# defaults (e.g., zip, jq, vim, procps).
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "app"
  vars:
    app_delivery_mode: "native"
    app_name: "base"
    app_desc: "Base system packages"
    app_packages: "{{ base_packages }}"
    app_state: "present"

# ---------------------------------------------------------------------
# Configuration: Apply global VIM preferences.
# ---------------------------------------------------------------------
- name: "Set VIM configuration path fact {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    vim_config_root: >-
      {%- if os_family != 'darwin' -%}
        /etc/vim
      {%- elif os_pkg_mgr == 'homebrew' -%}
        {{ '/opt/homebrew/etc/vim' if os_architecture == 'arm64' else '/usr/local/etc/vim' }}
      {%- elif os_pkg_mgr == 'macports' -%}
        /opt/local/etc/vim
      {%- else -%}
        /usr/local/etc/vim
      {%- endif -%}
  tags: ["always"]

- name: "Ensure vim config directory exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.file:
    path: "{{ vim_config_root }}"
    state: "directory"
    mode: "0755"
  become: "{{ become_enabled }}"
  when: not (is_container | default(false, true))

- ansible.builtin.include_role:
    name: "native"
    tasks_from: "copy_loader"
  vars:
    src: "vimrc.local"
    dest: "{{ vim_config_root }}/vimrc.local"
    owner: "{{ 'root' if os_family != 'darwin' else ansible_user_name }}"
    group: "{{ 'root' if os_family != 'darwin' else 'wheel' }}"
    mode: "0644"
  when: not (is_container | default(false, true))

# ---------------------------------------------------------------------
# Lifecycle: Execute the git_config shell script to apply global
# identity and performance settings.
# ---------------------------------------------------------------------
- name: "Configure system-wide Git settings {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.script: "git_config.sh"
  environment:
    GIT_USER_NAME: "{{ git_user_name | default('', true) }}"
    GIT_USER_EMAIL: "{{ git_user_email | default('', true) }}"
    GIT_EDITOR: "{{ git_editor | default('vim', true) }}"
    GIT_SIGNING_KEY: "{{ git_signing_key | default('', true) }}"
    GIT_SIGNING: "{{ git_signing | default(false, true) }}"
  become: "{{ become_enabled }}"
  changed_when: false
