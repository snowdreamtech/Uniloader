---
# =====================================================================
# podman_config_loader.yml
#
# Enterprise-grade loader for configuring Podman system-level settings
# including registries.conf, storage.conf, policy.json, and CNI network.
#
# Features:
# - Configure registry mirrors (single or multiple)
# - Configure insecure registries
# - Configure storage driver (overlay)
# - Configure policy.json (pull policy)
# - Ensure Podman CNI network exists
# - All optional parameters default to omit
# - Fully idempotent and safe for CI/CD and production automation
# Audit log recorded via ansible.builtin.debug
#
# Example usage:
#
#   - name: "Configure Podman system {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
#     ansible.builtin.include_role:
#       name: container
#       tasks_from: podman_config_loader
#     vars:
#       podman_registry_mirrors:
#         - "https://mirror1.example.com"
#         - "https://mirror2.example.com"
#       podman_insecure_registries:
#         - "harbor.local:5000"
#
# =====================================================================

# ---------------------------------------------------------------------
# Normalize variables
# ---------------------------------------------------------------------

- name: "Normalize Podman config variables {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    podman_registry_mirrors_list: >-
      {{
        podman_registry_mirrors
        if podman_registry_mirrors is iterable and podman_registry_mirrors is not string
        else [podman_registry_mirrors]
      }}
    podman_insecure_registries_list: >-
      {{
        podman_insecure_registries
        if podman_insecure_registries is iterable and podman_insecure_registries is not string
        else [podman_insecure_registries]
      }}
    podman_registry_mirrors: "{{ podman_registry_mirrors | default([], true) }}"
    podman_insecure_registries: "{{ podman_insecure_registries | default([], true) }}"

# ---------------------------------------------------------------------
# Ensure /etc/containers exists
# ---------------------------------------------------------------------

- name: "Ensure /etc/containers exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.file:
    path: /etc/containers
    state: directory
    mode: "0755"

# ---------------------------------------------------------------------
# Configure registries.conf
# ---------------------------------------------------------------------

- name: "Configure Podman registries.conf {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.copy:
    dest: /etc/containers/registries.conf
    mode: "0644"
    content: |
      unqualified-search-registries = ["docker.io"]

      [[registry]]
      prefix = "docker.io"
      location = "docker.io"

      {% for m in podman_registry_mirrors_list %}
      [[registry.mirror]]
      location = "{{ m }}"
      {% endfor %}

      {% for ir in podman_insecure_registries_list %}
      [[registry]]
      prefix = "{{ ir }}"
      insecure = true
      location = "{{ ir }}"
      {% endfor %}
  register: podman_registries_write

# ---------------------------------------------------------------------
# Configure storage.conf
# ---------------------------------------------------------------------

- name: "Ensure Podman storage driver is overlay {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.lineinfile:
    path: /etc/containers/storage.conf
    regexp: "^driver ="
    line: 'driver = "overlay"'
  register: podman_storage_write

# ---------------------------------------------------------------------
# Configure policy.json
# ---------------------------------------------------------------------

- name: "Configure Podman policy.json {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.copy:
    dest: /etc/containers/policy.json
    mode: "0644"
    content: |
      {
        "default": [
          {
            "type": "insecureAcceptAnything"
          }
        ]
      }
  register: podman_policy_write

# ---------------------------------------------------------------------
# Ensure CNI network exists
# ---------------------------------------------------------------------

- name: "Ensure Podman CNI network exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.copy:
    dest: /etc/cni/net.d/87-podman-bridge.conflist
    mode: "0644"
    content: |
      {
        "cniVersion": "0.4.0",
        "name": "podman",
        "plugins": [
          {
            "type": "bridge",
            "bridge": "cni-podman0",
            "isGateway": true,
            "ipMasq": true,
            "ipam": {
              "type": "host-local",
              "subnet": "10.88.0.0/16"
            }
          }
        ]
      }
  register: podman_cni_write
