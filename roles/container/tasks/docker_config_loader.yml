---
# =====================================================================
# roles/container/tasks/docker_config_loader.yml
# =====================================================================

---
# =====================================================================
# docker_config_loader.yml
#
# Enterprise-grade loader for configuring Docker daemon.json with full
# audit logging and cross-distro consistency.
#
# Features:
# - Configure registry mirrors (single or multiple)
# - Configure insecure registries
# - Configure log-driver and log-opts
# - Configure cgroupdriver (systemd)
# - Configure storage-driver (overlay2)
# - Configure live-restore
# - Fully idempotent and safe for CI/CD and production automation
# Audit log recorded via ansible.builtin.debug
#
# Example usage:
#
#   - name: "Configure Docker system {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
#     ansible.builtin.include_role:
#       name: container
#       tasks_from: docker_config_loader
#     vars:
#       docker_registry_mirrors:
#         - "https://mirror1.example.com"
#       docker_insecure_registries:
#         - "harbor.local:5000"
#
# =====================================================================

# ---------------------------------------------------------------------
# Normalize variables
# ---------------------------------------------------------------------

- name: "Normalize Docker config variables {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    docker_registry_mirrors_list: >-
      {{
        docker_registry_mirrors
        if docker_registry_mirrors is iterable and docker_registry_mirrors is not string
        else [docker_registry_mirrors]
      }}
    docker_insecure_registries_list: >-
      {{
        docker_insecure_registries
        if docker_insecure_registries is iterable and docker_insecure_registries is not string
        else [docker_insecure_registries]
      }}
    docker_registry_mirrors: "{{ docker_registry_mirrors | default([], true) }}"
    docker_insecure_registries: "{{ docker_insecure_registries | default([], true) }}"

# ---------------------------------------------------------------------
# Ensure /etc/docker exists
# ---------------------------------------------------------------------

- name: "Ensure /etc/docker exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

# ---------------------------------------------------------------------
# Write daemon.json
# ---------------------------------------------------------------------

- name: "Configure Docker daemon.json {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: "0644"
    content: |
      {
        "registry-mirrors": [
        {% for m in docker_registry_mirrors_list %}
          "{{ m }}"{% if not loop.last %},{% endif %}
        {% endfor %}
        ],
        "insecure-registries": [
        {% for ir in docker_insecure_registries_list %}
          "{{ ir }}"{% if not loop.last %},{% endif %}
        {% endfor %}
        ],
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "100m",
          "max-file": "3"
        },
        "exec-opts": ["native.cgroupdriver=systemd"],
        "storage-driver": "overlay2",
        "live-restore": true
      }
  register: docker_daemon_write

# ---------------------------------------------------------------------
# Restart Docker only when changed
# ---------------------------------------------------------------------

- name: "Restart Docker if config changed {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.service:
    name: "docker"
    state: restarted
  when: docker_daemon_write.changed
