# =====================================================================
# roles/container/tasks/detect_image_id.yml
# =====================================================================

---
# =====================================================================
# roles/container/tasks/detect_image_id.yml
#
# Purpose:
#   Zero-Config Detection of image UID/GID.
#   Supports: Docker, Podman, and other OCI-compatible runtimes
#
#   Strategy (Multi-Tier Priority):
#     0. Detect container runtime and load knowledge database
#     1. Check for explicit skip flag
#     2. Try 'inspect' (Metadata) - Fast, no container run
#     3. Query knowledge database - Pre-defined mappings for common images
#     4. Fallback to 'run id' (Probing) - Accurate for string names
#        4a. --entrypoint sh (safe method, doesn't break image initialization)
#        4b. --entrypoint /bin/sh (fallback for compatibility)
#        4c. Legacy method (last resort for backward compatibility)
#     5. Final fallback to root (0:0)
#
# Internal Variables (set by this task file):
#   _container_runtime: Detected container runtime (docker/podman/nerdctl)
#   _runtime_supported: Whether the runtime supports UID/GID detection (boolean)
#   _detection_method: Detection method used (for debugging)
#
# Input Variables (optional):
#   container_skip_uid_detection: Set to true to skip detection entirely
#   container_skip_uid_detection_fallback_uid: UID to use when skipping (default: 0)
#   container_skip_uid_detection_fallback_gid: GID to use when skipping (default: 0)
#   container_debug_mode: Set to true to see detection summary
#
# Output Variables (set by this task file):
#   container_app_volume_owner: Detected UID (or fallback value)
#   container_app_volume_group: Detected GID (or fallback value)
# =====================================================================

# =====================================================================
# Stage -1: Detect Container Runtime (New)
# =====================================================================

- name: "Detection: Determine container runtime {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    _container_runtime: "{{ detected_engine | default(container_engine | default('docker', true), true) }}"
    _runtime_supported: "{{ (detected_engine | default(container_engine | default('docker', true), true)) in ['docker', 'podman', 'nerdctl'] }}"
  when:
    - container_app_volume_owner is not defined or container_app_volume_owner | length == 0

- name: "Detection: Skip unsupported runtime ({{ _container_runtime | default('unknown') }}) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.debug:
    msg: |
      UID/GID detection skipped for runtime: {{ _container_runtime | default('unknown') }}
      Supported runtimes: docker, podman, nerdctl
      Note: This is expected for LXC/CRI-O containers.
      Using default ownership settings (0:0 or configured defaults).

      For more information, see:
      https://github.com/snowdreamtech/ansible/blob/dev/roles/container/README#supported-container-runtimes
  when:
    - _container_runtime is defined
    - not (_runtime_supported | default(false) | bool)

- name: "Detection: Confirm runtime compatibility {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.debug:
    msg: "Container runtime detected: {{ _container_runtime }}"
  when:
    - _container_runtime is defined
    - _runtime_supported | default(false) | bool

# =====================================================================
# Stage 0: Load Knowledge Database
# =====================================================================

- name: "Detection: Load image UID/GID knowledge database {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.include_vars:
    file: "{{ role_path }}/vars/image_uid_gid_database.yml"
  when:
    - _runtime_supported | default(false) | bool
    - container_app_volume_owner is not defined or container_app_volume_owner | length == 0

# =====================================================================
# Stage 1: Check for Explicit Skip Flag
# =====================================================================

- name: "Detection: Skip if explicitly requested {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    container_app_volume_owner: "{{ container_skip_uid_detection_fallback_uid | default('0') }}"
    container_app_volume_group: "{{ container_skip_uid_detection_fallback_gid | default('0') }}"
    _detection_method: "skip_requested"
  when:
    - _runtime_supported | default(false) | bool
    - container_skip_uid_detection | default(false) | bool

# =====================================================================
# Stage 2: Docker Inspect (Metadata - Fast Method)
# =====================================================================

- name: "Detection: Pull image if missing for {{ container_app_image }} {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command:
    cmd: "{{ _container_runtime }} pull {{ container_app_image }}"
  register: _image_pull_result
  changed_when: "'Downloaded' in _image_pull_result.stdout or 'Pulling' in _image_pull_result.stdout"
  become: "{{ become_enabled }}"
  when:
    - _runtime_supported | default(false) | bool
    - container_app_volume_owner is not defined or container_app_volume_owner | length == 0

- name: "Detection: Try extracting ID from metadata via inspect {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command:
    cmd: "{{ _container_runtime }} inspect -f '{{ '{{' }}.Config.User{{ '}}' }}' {{ container_app_image }}"
  register: _inspect_user
  changed_when: false
  become: "{{ become_enabled }}"
  when:
    - _runtime_supported | default(false) | bool
    - container_app_volume_owner is not defined or container_app_volume_owner | length == 0

- name: "Detection: Parse metadata if numeric {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    container_app_volume_owner: "{{ (_inspect_user.stdout.split(':')[0]) | trim }}"
    container_app_volume_group: "{{ (_inspect_user.stdout.split(':')[1] | default(_inspect_user.stdout.split(':')[0])) | trim }}"
    _detection_method: "{{ _container_runtime }}_inspect"
  when:
    - _runtime_supported | default(false) | bool
    - _inspect_user.stdout is defined
    - (_inspect_user.stdout | regex_search('^[0-9]+(:[0-9]+)?$')) is not none

- name: "Detection: Default to root if metadata is empty {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    container_app_volume_owner: "0"
    container_app_volume_group: "0"
    _detection_method: "{{ _container_runtime }}_inspect_empty"
  when:
    - _runtime_supported | default(false) | bool
    - container_app_volume_owner is not defined or container_app_volume_owner | length == 0
    - _inspect_user.stdout is defined
    - _inspect_user.stdout | trim | length == 0

# =====================================================================
# Stage 3: Knowledge Database Query (New - Efficient & Safe)
# =====================================================================

- name: "Detection: Query knowledge database for exact match {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    _kb_match: "{{ image_uid_gid_exact_match[container_app_image] | default(none) }}"
  when:
    - _runtime_supported | default(false) | bool
    - container_app_volume_owner is not defined or container_app_volume_owner | length == 0
    - image_uid_gid_exact_match is defined

- name: "Detection: Apply knowledge database exact match {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    container_app_volume_owner: "{{ _kb_match.uid }}"
    container_app_volume_group: "{{ _kb_match.gid }}"
    _detection_method: "knowledge_database_exact"
  when:
    - _runtime_supported | default(false) | bool
    - _kb_match is defined
    - _kb_match is not none

- name: "Detection: Query knowledge database for pattern match {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    _kb_pattern_match: "{{ item }}"
  loop: "{{ image_uid_gid_patterns | default([]) }}"
  when:
    - _runtime_supported | default(false) | bool
    - container_app_volume_owner is not defined or container_app_volume_owner | length == 0
    - _kb_match is not defined or _kb_match is none
    - container_app_image | regex_search(item.regex)
  loop_control:
    label: "{{ item.description }}"

- name: "Detection: Apply knowledge database pattern match {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    container_app_volume_owner: "{{ _kb_pattern_match.uid }}"
    container_app_volume_group: "{{ _kb_pattern_match.gid }}"
    _detection_method: "knowledge_database_pattern"
  when:
    - _runtime_supported | default(false) | bool
    - _kb_pattern_match is defined

# =====================================================================
# Stage 4: Container Probing (Improved - Safe Methods First)
# =====================================================================

- name: "Detection: Try container probing if metadata and knowledge database failed {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  when:
    - _runtime_supported | default(false) | bool
    - container_app_volume_owner is not defined or container_app_volume_owner | length == 0
  block:
    # Method A: --entrypoint sh (Safest - doesn't override CMD)
    - name: "Detection: Probe via --entrypoint sh (safe method) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.command:
        cmd: "{{ _container_runtime }} run --rm --entrypoint sh {{ container_app_image }} -c 'id -u && id -g'"
      register: _entrypoint_probe
      changed_when: false
      failed_when: false
      become: "{{ become_enabled }}"

    - name: "Detection: Apply entrypoint probe results {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.set_fact:
        container_app_volume_owner: "{{ _entrypoint_probe.stdout_lines[0] | trim }}"
        container_app_volume_group: "{{ _entrypoint_probe.stdout_lines[1] | trim }}"
        _detection_method: "entrypoint_probe_sh"
      when:
        - _runtime_supported | default(false) | bool
        - _entrypoint_probe.rc == 0
        - _entrypoint_probe.stdout_lines | length >= 2
        - _entrypoint_probe.stdout_lines[0] | trim | regex_search('^[0-9]+$')

    # Method B: --entrypoint /bin/sh (Compatibility fallback)
    - name: "Detection: Probe via --entrypoint /bin/sh (fallback method) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.command:
        cmd: "{{ _container_runtime }} run --rm --entrypoint /bin/sh {{ container_app_image }} -c 'id -u && id -g'"
      register: _binsh_probe
      changed_when: false
      failed_when: false
      become: "{{ become_enabled }}"
      when:
        - container_app_volume_owner is not defined or container_app_volume_owner | length == 0

    - name: "Detection: Apply /bin/sh probe results {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.set_fact:
        container_app_volume_owner: "{{ _binsh_probe.stdout_lines[0] | trim }}"
        container_app_volume_group: "{{ _binsh_probe.stdout_lines[1] | trim }}"
        _detection_method: "entrypoint_probe_binsh"
      when:
        - _runtime_supported | default(false) | bool
        - _binsh_probe is defined
        - _binsh_probe.rc == 0
        - _binsh_probe.stdout_lines | length >= 2
        - _binsh_probe.stdout_lines[0] | trim | regex_search('^[0-9]+$')

    # Method C: Legacy method (Last resort for backward compatibility)
    - name: "Detection: Probe via legacy method (last resort) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.command:
        cmd: "{{ _container_runtime }} run --rm {{ container_app_image }} sh -c 'id -u && id -g'"
      register: _legacy_probe
      changed_when: false
      failed_when: false
      become: "{{ become_enabled }}"
      when:
        - container_app_volume_owner is not defined or container_app_volume_owner | length == 0

    - name: "Detection: Apply legacy probe results {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.set_fact:
        container_app_volume_owner: "{{ _legacy_probe.stdout_lines[0] | trim }}"
        container_app_volume_group: "{{ _legacy_probe.stdout_lines[1] | trim }}"
        _detection_method: "legacy_probe"
      when:
        - _runtime_supported | default(false) | bool
        - _legacy_probe is defined
        - _legacy_probe.rc == 0
        - _legacy_probe.stdout_lines | length >= 2
        - _legacy_probe.stdout_lines[0] | trim | regex_search('^[0-9]+$')

# =====================================================================
# Stage 5: Final Fallback to Root
# =====================================================================

- name: "Detection: Fallback to root if all methods failed {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    container_app_volume_owner: "0"
    container_app_volume_group: "0"
    _detection_method: "fallback_root"
  when:
    - container_app_volume_owner is not defined or container_app_volume_owner | length == 0

# =====================================================================
# Stage 6: Log Detection Results (Debug Mode)
# =====================================================================

- name: "Detection: Log detection method and result {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════════
      Image UID/GID Detection Summary
      ═══════════════════════════════════════════════════════════════
      Runtime: {{ _container_runtime | default('N/A') }}
      Image:   {{ container_app_image }}
      Method:  {{ _detection_method | default('pre_configured') }}
      UID:     {{ container_app_volume_owner }}
      GID:     {{ container_app_volume_group }}
      ═══════════════════════════════════════════════════════════════
  when: container_debug_mode | default(false) | bool
