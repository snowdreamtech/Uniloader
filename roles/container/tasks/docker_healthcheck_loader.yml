---
# =====================================================================
# docker_healthcheck_loader.yml
#
# Enterprise-grade loader for performing Docker health checks with full
# audit logging and cross-distro consistency.
#
# Features:
# - docker info
# - docker system df
# - docker ps
# - Check overlay2 health
# - Check daemon.json validity
# - Check registry mirror reachability (enhanced)
# - Fully idempotent and safe for CI/CD and production automation
# - Full audit logging
#
# =====================================================================

# ---------------------------------------------------------------------
# docker info
# ---------------------------------------------------------------------

- name: "Check Docker info {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "docker info --format '{{ '{{json .}}' }}'"
  register: docker_info_check
  changed_when: false
  failed_when: false

# ---------------------------------------------------------------------
# docker system df
# ---------------------------------------------------------------------

- name: "Check Docker disk usage {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "docker system df --format '{{ '{{json .}}' }}'"
  register: docker_df_check
  changed_when: false
  failed_when: false

# ---------------------------------------------------------------------
# docker ps
# ---------------------------------------------------------------------

- name: "Check Docker running containers {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "docker ps --format '{{ '{{json .}}' }}'"
  register: docker_ps_check
  changed_when: false
  failed_when: false

# ---------------------------------------------------------------------
# Check overlay2
# ---------------------------------------------------------------------

- name: "Check Docker overlay2 health {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "ls /var/lib/docker/overlay2"
  register: docker_overlay_check
  changed_when: false
  failed_when: false

# ---------------------------------------------------------------------
# Check daemon.json
# ---------------------------------------------------------------------

- name: "Check Docker daemon.json validity {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "cat /etc/docker/daemon.json"
  register: docker_daemon_check
  changed_when: false
  failed_when: false

# ---------------------------------------------------------------------
# Check registry mirror reachability
# ---------------------------------------------------------------------

- name: "Check Docker registry mirror reachability {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: >
    sh -c '
    jq -r ".registry-mirrors[]" /etc/docker/daemon.json 2>/dev/null |
    xargs -I{} sh -c "curl -s -o /dev/null -w \"%{http_code}\" {}/v2/ || true"
    '
  register: docker_mirror_check
  changed_when: false
  failed_when: false
