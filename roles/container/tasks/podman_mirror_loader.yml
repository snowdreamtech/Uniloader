---
# =====================================================================
# podman_mirror_loader.yml
#
# Enterprise-grade loader for configuring Podman registry mirrors with
# full audit logging and cross-distro consistency.
#
# Features:
# - Supports single or multiple registry mirrors
# - Automatically normalizes string → list
# - Writes /etc/containers/registries.conf
# - Sets docker.io as default unqualified registry
# - Fully idempotent and safe for CI/CD and production automation
# Audit log recorded via ansible.builtin.debug
#
# Example usage:
#
#   - name: "Configure Podman mirrors {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
#     ansible.builtin.include_role:
#       name: container
#       tasks_from: podman_mirror_loader
#     vars:
#       podman_registry_mirrors:
#         - "https://mirror1.example.com"
#         - "https://mirror2.example.com"
#
#   - name: "Configure Podman with single mirror"
#     ansible.builtin.include_role:
#       name: container
#       tasks_from: podman_mirror_loader
#     vars:
#       podman_registry_mirrors: "https://mirror1.example.com"
#
# =====================================================================

# ---------------------------------------------------------------------
# Validate required variables
# ---------------------------------------------------------------------

- ansible.builtin.assert:
    that:
      - podman_registry_mirrors is defined
    fail_msg: |
      podman_mirror_loader validation failed:

      Required parameter 'podman_registry_mirrors' must be defined.

      Received:
        - Type: {{ podman_registry_mirrors | default('UNDEFINED') | type_debug }}
        - Value: {{ podman_registry_mirrors | default('UNDEFINED') }}
    success_msg: "podman_mirror_loader: podman_registry_mirrors validated"

# ---------------------------------------------------------------------
# Normalize mirrors (string → list)
# ---------------------------------------------------------------------

- name: "Normalize Podman registry mirrors {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    podman_registry_mirrors_list: >-
      {{
        podman_registry_mirrors
        if podman_registry_mirrors is iterable and podman_registry_mirrors is not string
        else [podman_registry_mirrors]
      }}

# ---------------------------------------------------------------------
# Ensure /etc/containers exists
# ---------------------------------------------------------------------

- name: "Ensure /etc/containers exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.file:
    path: /etc/containers
    state: directory
    mode: "0755"

# ---------------------------------------------------------------------
# Write registries.conf
# ---------------------------------------------------------------------

- name: "Configure Podman registry mirrors {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.copy:
    dest: /etc/containers/registries.conf
    mode: "0644"
    content: |
      unqualified-search-registries = ["docker.io"]

      [[registry]]
      prefix = "docker.io"
      location = "docker.io"

      {% for m in podman_registry_mirrors_list %}
      [[registry.mirror]]
      location = "{{ m }}"
      {% endfor %}
  register: podman_mirror_write
