---
# =====================================================================
# roles/container/tasks/crio_mirror_loader.yml
# =====================================================================

---
# =====================================================================
# crio_mirror_loader.yml
#
# Enterprise-grade loader for configuring CRI-O registry mirrors with
# full audit logging and cross-distro consistency.
#
# Features:
# - Supports single or multiple registry mirrors
# - Automatically normalizes string → list
# - Writes /etc/containers/registries.conf
# - Fully idempotent and safe for CI/CD and production automation
# Audit log recorded via ansible.builtin.debug
#
# =====================================================================

# ---------------------------------------------------------------------
# Validate required variables
# ---------------------------------------------------------------------

- ansible.builtin.assert:
    that:
      - crio_registry_mirrors is defined
    fail_msg: |
      crio_mirror_loader validation failed:

      Required parameter 'crio_registry_mirrors' must be defined.

      Received:
        - Type: {{ crio_registry_mirrors | default('UNDEFINED') | type_debug }}
        - Value: {{ crio_registry_mirrors | default('UNDEFINED') }}
    success_msg: "crio_mirror_loader: crio_registry_mirrors validated"

# ---------------------------------------------------------------------
# Normalize mirrors (string → list)
# ---------------------------------------------------------------------

- name: "Normalize CRI-O registry mirrors {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    crio_registry_mirrors_list: >-
      {{
        crio_registry_mirrors
        if crio_registry_mirrors is iterable and crio_registry_mirrors is not string
        else [crio_registry_mirrors]
      }}

# ---------------------------------------------------------------------
# Ensure /etc/containers exists
# ---------------------------------------------------------------------

- name: "Ensure /etc/containers exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.file:
    path: /etc/containers
    state: directory
    mode: "0755"

# ---------------------------------------------------------------------
# Write registries.conf
# ---------------------------------------------------------------------

- name: "Configure CRI-O registry mirrors {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.copy:
    dest: /etc/containers/registries.conf
    mode: "0644"
    content: |
      unqualified-search-registries = ["docker.io"]

      [[registry]]
      prefix = "docker.io"
      location = "docker.io"

      {% for m in crio_registry_mirrors_list %}
      [[registry.mirror]]
      location = "{{ m }}"
      {% endfor %}
  register: crio_mirror_write
