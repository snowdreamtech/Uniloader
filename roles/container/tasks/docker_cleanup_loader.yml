---
# =====================================================================
# roles/container/tasks/docker_cleanup_loader.yml
# =====================================================================

---
# =====================================================================
# docker_cleanup_loader.yml
#
# Enterprise-grade loader for cleaning Docker unused resources with full
# audit logging and cross-distro consistency.
#
# Features:
# - Clean exited containers
# - Clean dangling images
# - Clean unused volumes
# - Clean unused networks
# - Clean build cache
# - Clean overlay2 orphan layers
# - Fully idempotent and safe for CI/CD and production automation
# - Full audit logging
#
# =====================================================================

# ---------------------------------------------------------------------
# Cleanup exited containers
# ---------------------------------------------------------------------

- name: "Cleanup Docker exited containers {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "docker ps -a -q -f status=exited | xargs -r docker rm"
  register: docker_cleanup_containers
  changed_when: "'Deleted' in docker_cleanup_containers.stdout"
  failed_when: false

# ---------------------------------------------------------------------
# Cleanup dangling images
# ---------------------------------------------------------------------

- name: "Cleanup Docker dangling images {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "docker images -f dangling=true -q | xargs -r docker rmi"
  register: docker_cleanup_images
  changed_when: "'Deleted' in docker_cleanup_images.stdout"
  failed_when: false

# ---------------------------------------------------------------------
# Cleanup unused volumes
# ---------------------------------------------------------------------

- name: "Cleanup Docker unused volumes {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "docker volume prune -f"
  register: docker_cleanup_volumes
  changed_when: "'Reclaimed' in docker_cleanup_volumes.stdout"
  failed_when: false

# ---------------------------------------------------------------------
# Cleanup unused networks
# ---------------------------------------------------------------------

- name: "Cleanup Docker unused networks {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "docker network prune -f"
  register: docker_cleanup_networks
  changed_when: "'Reclaimed' in docker_cleanup_networks.stdout"
  failed_when: false

# ---------------------------------------------------------------------
# Cleanup build cache
# ---------------------------------------------------------------------

- name: "Cleanup Docker build cache {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "docker builder prune -f"
  register: docker_cleanup_build
  changed_when: "'Reclaimed' in docker_cleanup_build.stdout"
  failed_when: false
