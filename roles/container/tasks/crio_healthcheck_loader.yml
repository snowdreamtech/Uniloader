---
# =====================================================================
# roles/container/tasks/crio_healthcheck_loader.yml
# =====================================================================

---
# =====================================================================
# crio_healthcheck_loader.yml
#
# Enterprise-grade loader for performing CRI-O health checks with full
# audit logging and cross-distro consistency.
#
# Features:
# - Check crio service status
# - Check crictl connectivity
# - Check runtime (runc/crun)
# - Check pause image availability
# - Check CNI network
# - Fully idempotent and safe for CI/CD and production automation
# Audit log recorded via ansible.builtin.debug
#
# =====================================================================

# ---------------------------------------------------------------------
# Check CRI-O service
# ---------------------------------------------------------------------

- name: "Check CRI-O service status {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "systemctl is-active crio"
  register: crio_service_status
  changed_when: false
  failed_when: false

# ---------------------------------------------------------------------
# Check crictl info
# ---------------------------------------------------------------------

- name: "Check crictl info {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "crictl info"
  register: crio_info_check
  changed_when: false
  failed_when: false

# ---------------------------------------------------------------------
# Check runtime
# ---------------------------------------------------------------------

- name: "Check CRI-O runtime {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "crio status"
  register: crio_runtime_check
  changed_when: false
  failed_when: false

# ---------------------------------------------------------------------
# Check CNI network
# ---------------------------------------------------------------------

- name: "Check CRI-O CNI network {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "ls /etc/cni/net.d"
  register: crio_cni_check
  changed_when: false
  failed_when: false
