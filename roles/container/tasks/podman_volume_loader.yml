---
# =====================================================================
# roles/container/tasks/podman_volume_loader.yml
# =====================================================================

---
# =====================================================================
# podman_volume_loader.yml
#
# Enterprise-grade loader for managing Podman volumes with full audit
# logging, complete parameter coverage, and cross-distro consistency.
#
# Features:
# - Create or remove Podman volumes
# - Supports driver, driver options, labels
# - Validates required variables
# - All optional parameters default to omit to prevent undefined errors
# - Fully idempotent and safe for CI/CD and production automation
# Audit log recorded via ansible.builtin.debug
#
# Example usage:
#
#   - name: "Create backend volume {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
#     ansible.builtin.include_role:
#       name: container
#       tasks_from: podman_volume_loader
#     vars:
#       volume_name: "backend-data"
#       volume_state: "present"       # present | absent
#       volume_driver: "local"
#       volume_options:
#         type: "none"
#         device: "/data/backend"
#         o: "bind"
#       volume_labels:
#         role: "backend"
#
# Directory structure example:
#
#   /data/backend/
#     ├── logs/
#     └── storage/
#
# =====================================================================

# ---------------------------------------------------------------------
# Validate required variables (assert tasks must NOT have task names)
# ---------------------------------------------------------------------

- ansible.builtin.assert:
    that:
      - volume_name is defined
      - volume_name is string
      - (volume_name | length) > 0
    fail_msg: |
      podman_volume_loader validation failed:

      Required parameter 'volume_name' must be a non-empty string.

      Received:
        - Type: {{ volume_name | default('UNDEFINED') | type_debug }}
        - Value: {{ volume_name | default('UNDEFINED') }}
    success_msg: "podman_volume_loader: volume_name validated ({{ volume_name }})"

- ansible.builtin.assert:
    that:
      - volume_state in ['present', 'absent']
    fail_msg: |
      podman_volume_loader validation failed:

      Parameter 'volume_state' must be one of: present, absent.

      Received:
        - Value: {{ volume_state | default('present') }}
    success_msg: "podman_volume_loader: volume_state validated ({{ volume_state }})"

# ---------------------------------------------------------------------
# Normalize optional variables (ensure all parameters are defined)
# ---------------------------------------------------------------------

- name: "Normalize Podman volume variables {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    volume_driver: "{{ volume_driver | default('local', true) }}"
    volume_options: "{{ volume_options | default(omit) }}"
    volume_labels: "{{ volume_labels | default(omit) }}"

# ---------------------------------------------------------------------
# Manage Podman volume lifecycle
# ---------------------------------------------------------------------

- name: "Manage Podman volume {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  containers.podman.podman_volume:
    name: "{{ volume_name }}"
    state: "{{ volume_state }}"
    driver: "{{ volume_driver }}"
    options: "{{ volume_options }}"
    labels: "{{ volume_labels }}"
  register: volume_result
  become: "{{ become_enabled }}"
