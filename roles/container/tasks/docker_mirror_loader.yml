---
# =====================================================================
# roles/container/tasks/docker_mirror_loader.yml
# =====================================================================

---
# =====================================================================
# docker_mirror_loader.yml
#
# Enterprise-grade loader for configuring Docker registry mirrors with
# full audit logging and cross-distro consistency.
#
# Features:
# - Supports single or multiple registry mirrors
# - Automatically normalizes string → list
# - Writes /etc/docker/daemon.json
# - Restarts Docker only when configuration changes
# - Fully idempotent and safe for CI/CD and production automation
# Audit log recorded via ansible.builtin.debug
#
# Example usage:
#
#   - name: "Configure Docker mirrors {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
#     ansible.builtin.include_role:
#       name: container
#       tasks_from: docker_mirror_loader
#     vars:
#       docker_registry_mirrors:
#         - "https://mirror1.example.com"
#         - "https://mirror2.example.com"
#
#   - name: "Configure Docker with single mirror"
#     ansible.builtin.include_role:
#       name: container
#       tasks_from: docker_mirror_loader
#     vars:
#       docker_registry_mirrors: "https://mirror1.example.com"
#
# =====================================================================

# ---------------------------------------------------------------------
# Validate required variables
# ---------------------------------------------------------------------

- ansible.builtin.assert:
    that:
      - docker_registry_mirrors is defined
    fail_msg: |
      docker_mirror_loader validation failed:

      Required parameter 'docker_registry_mirrors' must be defined.

      Received:
        - Type: {{ docker_registry_mirrors | default('UNDEFINED') | type_debug }}
        - Value: {{ docker_registry_mirrors | default('UNDEFINED') }}
    success_msg: "docker_mirror_loader: docker_registry_mirrors validated"

# ---------------------------------------------------------------------
# Normalize mirrors (string → list)
# ---------------------------------------------------------------------

- name: "Normalize Docker registry mirrors {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    docker_registry_mirrors_list: >-
      {{
        docker_registry_mirrors
        if docker_registry_mirrors is iterable and docker_registry_mirrors is not string
        else [docker_registry_mirrors]
      }}

# ---------------------------------------------------------------------
# Ensure /etc/docker exists
# ---------------------------------------------------------------------

- name: "Ensure /etc/docker exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

# ---------------------------------------------------------------------
# Write daemon.json
# ---------------------------------------------------------------------

- name: "Configure Docker registry mirrors {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: "0644"
    content: |
      {
        "registry-mirrors": [
        {% for m in docker_registry_mirrors_list %}
          "{{ m }}"{% if not loop.last %},{% endif %}
        {% endfor %}
        ]
      }
  register: docker_mirror_write

# ---------------------------------------------------------------------
# Restart Docker only when changed
# ---------------------------------------------------------------------

- name: "Restart Docker if mirror changed {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}" # noqa: no-handler
  become: "{{ become_enabled }}"
  ansible.builtin.service:
    name: "docker"
    state: restarted
  when: docker_mirror_write.changed
