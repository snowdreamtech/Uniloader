---
# =====================================================================
# roles/container/tasks/crio_system_loader.yml
# =====================================================================

---
# =====================================================================
# crio_system_loader.yml
#
# Enterprise-grade loader for managing CRI-O system-level operations
# with full audit logging, complete parameter coverage, and cross-distro
# consistency.
#
# Features:
# - crictl info (CRI-O runtime info)
# - crictl stats (resource usage snapshot)
# - crictl image prune (safe or aggressive, best-effort)
# - All optional parameters default to omit to prevent undefined errors
# - Fully idempotent and safe for CI/CD and production automation
# Audit log recorded via ansible.builtin.debug
#
# Example usage:
#
#   - name: "Run CRI-O system maintenance {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
#     ansible.builtin.include_role:
#       name: container
#       tasks_from: crio_system_loader
#     vars:
#       crio_sys_action: "prune"    # info | stats | prune
#       crio_prune_all: false       # true = aggressive prune
#
# Directory structure example:
#
#   (CRI-O system operations do not require filesystem layout)
#
# =====================================================================

# ---------------------------------------------------------------------
# Validate required variables (assert tasks must NOT have task names)
# ---------------------------------------------------------------------

- ansible.builtin.assert:
    that:
      - crio_sys_action in ['info', 'stats', 'prune']
    fail_msg: |
      crio_system_loader validation failed:

      Parameter 'crio_sys_action' must be one of: info, stats, prune.

      Received:
        - Value: {{ crio_sys_action | default('UNDEFINED') }}
    success_msg: "crio_system_loader: crio_sys_action validated ({{ crio_sys_action }})"

# ---------------------------------------------------------------------
# Normalize optional variables (ensure all parameters are defined)
# ---------------------------------------------------------------------

- name: "Normalize CRI-O system variables {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    crio_prune_all: "{{ crio_prune_all | default(false, true) }}"

# ---------------------------------------------------------------------
# CRI-O info
# ---------------------------------------------------------------------

- name: "Gather CRI-O/crictl runtime info {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "crictl info"
  when: crio_sys_action == 'info'
  register: crio_info_result
  changed_when: false

# ---------------------------------------------------------------------
# CRI-O stats (resource usage)
# ---------------------------------------------------------------------

- name: "Gather CRI-O/crictl resource stats {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "crictl stats --all"
  when: crio_sys_action == 'stats'
  register: crio_stats_result
  changed_when: false

# ---------------------------------------------------------------------
# CRI-O prune (best-effort image prune)
# ---------------------------------------------------------------------

- name: "Prune CRI-O images via crictl {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: >
    crictl image prune -f
    {{ '--all' if crio_prune_all else '' }}
  when: crio_sys_action == 'prune'
  register: crio_prune_result
  changed_when: >
    'Deleted' in crio_prune_result.stdout
    or 'deleted' in crio_prune_result.stdout
    or 'Freed space' in crio_prune_result.stdout
