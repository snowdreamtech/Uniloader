---
# =====================================================================
# roles/container/tasks/podman_cleanup_loader.yml
# =====================================================================

---
# =====================================================================
# podman_cleanup_loader.yml
#
# Enterprise-grade loader for cleaning Podman unused resources with full
# audit logging and cross-distro consistency.
#
# Features:
# - Clean exited containers
# - Clean unused images
# - Clean unused volumes
# - Clean unused pods
# - Clean CNI leftovers
# - Fully idempotent and safe for CI/CD and production automation
# - Full audit logging
#
# =====================================================================

# ---------------------------------------------------------------------
# Cleanup exited containers
# ---------------------------------------------------------------------

- name: "Cleanup Podman exited containers {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "podman ps -a -q -f status=exited | xargs -r podman rm"
  register: podman_cleanup_containers
  changed_when: podman_cleanup_containers.stdout | trim | length > 0
  failed_when: false

# ---------------------------------------------------------------------
# Cleanup unused images
# ---------------------------------------------------------------------

- name: "Cleanup Podman unused images {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "podman images -q | xargs -r podman rmi"
  register: podman_cleanup_images
  changed_when: podman_cleanup_images.stdout | trim | length > 0
  failed_when: false

# ---------------------------------------------------------------------
# Cleanup unused volumes
# ---------------------------------------------------------------------

- name: "Cleanup Podman unused volumes {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "podman volume prune -f"
  register: podman_cleanup_volumes
  changed_when: "'Total reclaimed space:' in podman_cleanup_volumes.stdout and 'Total reclaimed space: 0B' not in podman_cleanup_volumes.stdout"
  failed_when: false

# ---------------------------------------------------------------------
# Cleanup unused pods
# ---------------------------------------------------------------------

- name: "Cleanup Podman unused pods {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "podman pod prune -f"
  register: podman_cleanup_pods
  changed_when: "'Total reclaimed space:' in podman_cleanup_pods.stdout and 'Total reclaimed space: 0B' not in podman_cleanup_pods.stdout"
  failed_when: false

# ---------------------------------------------------------------------
# Cleanup CNI leftovers
# ---------------------------------------------------------------------

- name: "Cleanup Podman CNI leftovers {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "find /var/lib/cni -type f -print -delete"
  register: podman_cleanup_cni
  changed_when: podman_cleanup_cni.stdout | trim | length > 0
  failed_when: false
