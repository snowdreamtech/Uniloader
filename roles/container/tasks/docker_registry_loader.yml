---
# =====================================================================
# roles/container/tasks/docker_registry_loader.yml
# =====================================================================

---
# =====================================================================
# docker_registry_loader.yml
#
# Enterprise-grade loader for managing Docker registry authentication
# with full audit logging, complete parameter coverage, and cross-distro
# consistency.
#
# Features:
# - Login to Docker registry
# - Logout from Docker registry
# - Supports username/password authentication
# - Supports custom registry URLs
# - Validates required variables
# - All optional parameters default to omit to prevent undefined errors
# - Fully idempotent and safe for CI/CD and production automation
# Audit log recorded via ansible.builtin.debug
#
# Example usage:
#
#   - name: "Login to private registry {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
#     ansible.builtin.include_role:
#       name: container
#       tasks_from: docker_registry_loader
#     vars:
#       registry_state: "login"          # login | logout
#       registry_url: "registry.mycorp.com"
#       registry_username: "admin"
#       registry_password: "SuperSecret"
#
# Directory structure example:
#
#   (Registry authentication does not require filesystem layout)
#
# =====================================================================

# ---------------------------------------------------------------------
# Validate required variables (assert tasks must NOT have task names)
# ---------------------------------------------------------------------

- ansible.builtin.assert:
    that:
      - registry_state in ['login', 'logout']
    fail_msg: |
      docker_registry_loader validation failed:

      Parameter 'registry_state' must be one of: login, logout.

      Received:
        - Value: {{ registry_state | default('UNDEFINED') }}
    success_msg: "docker_registry_loader: registry_state validated ({{ registry_state }})"

# ---------------------------------------------------------------------
# Normalize optional variables (ensure all parameters are defined)
# ---------------------------------------------------------------------

- name: "Normalize Docker registry variables {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    registry_url: "{{ registry_url | default(omit) }}"
    registry_username: "{{ registry_username | default(omit) }}"
    registry_password: "{{ registry_password | default(omit) }}"

# ---------------------------------------------------------------------
# Login to Docker registry
# ---------------------------------------------------------------------

- name: "Login to Docker registry {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.docker.docker_login:
    registry_url: "{{ registry_url }}"
    username: "{{ registry_username }}"
    password: "{{ registry_password }}"
  when: registry_state == 'login'
  register: registry_login_result
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Logout from Docker registry
# ---------------------------------------------------------------------

- name: "Logout from Docker registry {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.docker.docker_logout:
    registry_url: "{{ registry_url }}"
  when: registry_state == 'logout'
  register: registry_logout_result
  become: "{{ become_enabled }}"
