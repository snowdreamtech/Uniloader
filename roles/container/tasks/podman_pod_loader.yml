---
# =====================================================================
# roles/container/tasks/podman_pod_loader.yml
# =====================================================================

---
# =====================================================================
# podman_pod_loader.yml
#
# Enterprise-grade loader for managing Podman pods with full audit
# logging, complete parameter coverage, and cross-distro consistency.
#
# Features:
# - Create, start, stop, and remove pods
# - Supports pod-level networking, ports, labels, infra options
# - Supports rootless and rootful Podman
# - Validates required variables
# - All optional parameters default to omit to prevent undefined errors
# - Fully idempotent and safe for CI/CD and production automation
# Audit log recorded via ansible.builtin.debug
#
# Example usage:
#
#   - name: "Create backend pod {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
#     ansible.builtin.include_role:
#       name: container
#       tasks_from: podman_pod_loader
#     vars:
#       pod_name: "backend-pod"
#       pod_state: "present"       # present | absent | started | stopped
#       pod_network: "backend-net"
#       pod_ports:
#         - "8080:8080"
#       pod_labels:
#         role: "backend"
#       pod_infra: true
#       pod_infra_image: "k8s.gcr.io/pause:3.5"
#
# Directory structure example:
#
#   (Pods are virtual constructs and do not require filesystem layout)
#
# =====================================================================

# ---------------------------------------------------------------------
# Validate required variables (assert tasks must NOT have task names)
# ---------------------------------------------------------------------

- ansible.builtin.assert:
    that:
      - pod_name is defined
      - pod_name is string
      - (pod_name | length) > 0
    fail_msg: |
      podman_pod_loader validation failed:

      Required parameter 'pod_name' must be a non-empty string.

      Received:
        - Type: {{ pod_name | default('UNDEFINED') | type_debug }}
        - Value: {{ pod_name | default('UNDEFINED') }}
    success_msg: "podman_pod_loader: pod_name validated ({{ pod_name }})"

- ansible.builtin.assert:
    that:
      - pod_state in ['present', 'absent', 'started', 'stopped']
    fail_msg: |
      podman_pod_loader validation failed:

      Parameter 'pod_state' must be one of: present, absent, started, stopped.

      Received:
        - Value: {{ pod_state | default('present') }}
    success_msg: "podman_pod_loader: pod_state validated ({{ pod_state }})"

# ---------------------------------------------------------------------
# Normalize optional variables (ensure all parameters are defined)
# ---------------------------------------------------------------------

- name: "Normalize Podman pod variables {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    pod_network: "{{ pod_network | default(omit) }}"
    pod_ports: "{{ pod_ports | default(omit) }}"
    pod_labels: "{{ pod_labels | default(omit) }}"
    pod_infra: "{{ pod_infra | default(true, true) }}"
    pod_infra_image: "{{ pod_infra_image | default(omit) }}"

# ---------------------------------------------------------------------
# Manage Podman pod lifecycle
# ---------------------------------------------------------------------

- name: "Manage Podman pod {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  containers.podman.podman_pod:
    name: "{{ pod_name }}"
    state: "{{ pod_state }}"
    network: "{{ pod_network }}"
    publish: "{{ pod_ports }}"
    label: "{{ pod_labels }}"
    infra: "{{ pod_infra }}"
    infra_image: "{{ pod_infra_image }}"
  register: pod_result
  become: "{{ become_enabled }}"
