---
# =====================================================================
# roles/template/tasks/debian.yml
#
# Purpose:
#   Handles application deployment specifically for Debian-family systems.
#   Installs required packages, deploys configurations, and manages scripts.
#
# Simple Usage:
#   - ansible.builtin.include_tasks:
#       file: "debian.yml"
#     vars:
#       package_list: ["curl"]
#       config_path: "/etc/myapp.conf"
#       script_path: "/usr/bin/run.sh"
#
# Comprehensive Usage:
#   - ansible.builtin.include_tasks:
#       file: "debian.yml"
#     vars:
#       package_list: ["nginx", "curl", "git"]
#       package_state: "latest"
#       config_path: "/etc/nginx/nginx.conf"
#       script_path: "/usr/local/bin/deploy.sh"
#
# =====================================================================

# ---------------------------------------------------------------------
# Install required packages using the native package manager (apt)
# ---------------------------------------------------------------------
- name: "Install packages (Debian) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.apt:
    name: "{{ package_list }}"
    state: "{{ package_state }}"
    update_cache: true
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Deploy the configuration file from a Jinja2 template
# ---------------------------------------------------------------------
- name: "Deploy config {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.template:
    src: "example.conf.j2"
    dest: "{{ config_path }}"
    mode: "0644"
    owner: "root"
    group: "root"
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Copy executable scripts to the target destination
# ---------------------------------------------------------------------
- name: "Copy script {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.copy:
    src: "example.sh"
    dest: "{{ script_path }}"
    mode: "0755"
    owner: "root"
    group: "root"
  become: "{{ become_enabled }}"
