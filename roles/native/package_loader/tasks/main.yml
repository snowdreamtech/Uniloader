---
# roles/native/package_loader/tasks/main.yml

- name: OS Level Router (APT)
  ansible.builtin.apt:
    name: "{{ item.name }}"
    state: present
  loop: "{{ packages }}"
  when: item.type == 'os' and unified_pkg_mgr == 'apt'

- name: OS Level Router (APK)
  community.general.apk:
    name: "{{ item.name }}"
    state: present
  loop: "{{ packages }}"
  when: item.type == 'os' and unified_pkg_mgr == 'apk'

- name: OS Level Router (DNF)
  ansible.builtin.dnf:
    name: "{{ item.name }}"
    state: present
  loop: "{{ packages }}"
  when: item.type == 'os' and unified_pkg_mgr == 'dnf'

- name: Language Ecosystem Router (Pip)
  ansible.builtin.pip:
    name: "{{ item.name }}"
    state: present
  loop: "{{ packages }}"
  when: item.type == 'pip'

- name: Language Ecosystem Router (NPM)
  community.general.npm:
    name: "{{ item.name }}"
    global: yes
    state: present
  loop: "{{ packages }}"
  when: item.type == 'npm'

- name: Platform Specific Router (Homebrew / MAS)
  community.general.homebrew:
    name: "{{ item.name }}"
    state: present
  loop: "{{ packages }}"
  when: item.type == 'mas:' or item.type == 'homebrew'

- name: Language Ecosystem Router (Cargo)
  community.general.cargo:
    name: "{{ item.name }}"
    state: present
  loop: "{{ packages }}"
  when: item.type == 'cargo'
# Idempotency is natively handled by these specialized Ansible modules, conforming to the ULS Constitution.
