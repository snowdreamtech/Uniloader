---
# =====================================================================
# roles/native/tasks/package_clean/void.yml
#
# Purpose:
#   Void Linux specific package maintenance.
# =====================================================================

# ---------------------------------------------------------------------
# Pre-checks: Environment Integrity
# ---------------------------------------------------------------------

# WHY: We verify 'xbps-remove' is available before attempting maintenance.
- name: "Package Clean (Void): Verify xbps-remove existence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "which xbps-remove"
  register: _xbps_check
  failed_when: false
  changed_when: false
  become: false

- name: "Package Clean (Void): Fail if xbps-remove missing {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.fail:
    msg: "Void Linux detected but 'xbps-remove' binary was not found."
  when: _xbps_check.rc != 0

# ---------------------------------------------------------------------
# Execution
# ---------------------------------------------------------------------

# WHY: Cleans the xbps cache.
- name: "Package Clean (Void): Clean cache {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "xbps-remove -O"
  when:
    - package_clean_cache | bool
    - _xbps_check.rc == 0
  vars:
    fingerprint: "package_clean_void_cache_{{ package_name | default('unknown', true) }}"

# WHY: Removes orphaned packages.
- name: "Package Clean (Void): Autoremove {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "xbps-remove -o"
  when: package_autoremove | bool
  become: "{{ become_enabled }}"
  failed_when: false
  vars:
    fingerprint: "package_clean_void_auto_{{ package_name | default('unknown', true) }}"
