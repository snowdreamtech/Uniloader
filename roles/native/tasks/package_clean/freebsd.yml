---
# =====================================================================
# roles/native/tasks/package_clean/freebsd.yml
#
# Purpose:
#   FreeBSD specific package maintenance.
# =====================================================================

# ---------------------------------------------------------------------
# Pre-checks: Environment Integrity
# ---------------------------------------------------------------------

# WHY: We verify 'pkg' is available before attempting maintenance.
- name: "Package Clean (FreeBSD): Verify pkg existence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "which pkg"
  register: _pkg_check
  failed_when: false
  changed_when: false
  become: false

- name: "Package Clean (FreeBSD): Fail if pkg missing {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.fail:
    msg: "FreeBSD detected but 'pkg' binary was not found."
  when: _pkg_check.rc != 0

# ---------------------------------------------------------------------
# Execution
# ---------------------------------------------------------------------

# WHY: Cleans the pkg cache.
- name: "Package Clean (FreeBSD): Clean cache {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "pkg clean -y"
  when:
    - package_clean_cache | bool
    - _pkg_check.rc == 0
  vars:
    fingerprint: "package_clean_fbsd_cache_{{ package_name | default('unknown', true) }}"

# WHY: Removes unused dependencies.
- name: "Package Clean (FreeBSD): Autoremove {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "pkg autoremove -y"
  when: package_autoremove | bool
  become: "{{ become_enabled }}"
  failed_when: false
  vars:
    fingerprint: "package_clean_fbsd_auto_{{ package_name | default('unknown', true) }}"
