---
# =====================================================================
# roles/native/tasks/package_clean/redhat.yml
#
# Purpose:
#   RedHat-specific package maintenance (DNF/YUM).
# =====================================================================

# WHY: Verify environment integrity for RedHat maintenance.
- name: "Package Clean (RedHat): Verify package manager existence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "PATH={{ os_paths }} which dnf || which yum"
  register: _redhat_maint_check
  failed_when: false
  changed_when: false
  become: false

- name: "Package Clean (RedHat): Fail if binary missing {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.fail:
    msg: "RedHat environment detected but neither 'dnf' nor 'yum' was found."
  when: _redhat_maint_check.rc != 0

# WHY: Cleans the cached data from the enabled repositories.
- name: "Package Clean (RedHat): Clean cache {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "PATH={{ os_paths }} dnf clean all"
  when:
    - package_clean_cache | bool
    - os_pkg_mgr | default('', true) != 'rpm_ostree'
  become: "{{ become_enabled }}"
  changed_when: false
  vars:
    fingerprint: "package_clean_rh_cache_{{ package_name | default('unknown', true) }}"

# WHY: Removes packages installed as dependencies that are no longer
# required by any explicitly installed package.
- name: "Package Clean (RedHat): Autoremove {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.dnf:
    autoremove: true
  when:
    - package_autoremove | bool
    - os_pkg_mgr | default('', true) != 'rpm_ostree'
  become: "{{ become_enabled }}"
  vars:
    fingerprint: "package_clean_rh_auto_{{ package_name | default('unknown', true) }}"
