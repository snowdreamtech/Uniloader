---
# =====================================================================
# roles/native/tasks/package_clean/openwrt.yml
#
# Purpose:
#   OpenWrt specific package maintenance.
# =====================================================================

# ---------------------------------------------------------------------
# Pre-checks: Environment Integrity
# ---------------------------------------------------------------------

# WHY: We verify 'opkg' is available before attempting maintenance.
- name: "Package Clean (OpenWrt): Verify opkg existence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "which opkg"
  register: _opkg_check
  failed_when: false
  changed_when: false
  become: false

- name: "Package Clean (OpenWrt): Fail if opkg missing {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.fail:
    msg: "OpenWrt detected but 'opkg' binary was not found."
  when: _opkg_check.rc != 0

# ---------------------------------------------------------------------
# Execution
# ---------------------------------------------------------------------

# WHY: OpenWrt stores packages in /tmp typically, but we can clean lists.
- name: "Package Clean (OpenWrt): Clean cache {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "rm -rf /var/opkg-lists/*"
  when:
    - package_clean_cache | bool
    - _opkg_check.rc == 0
  vars:
    fingerprint: "package_clean_openwrt_cache_{{ package_name | default('unknown', true) }}"
