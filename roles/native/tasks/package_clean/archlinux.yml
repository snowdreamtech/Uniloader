---
# =====================================================================
# roles/native/tasks/package_clean/archlinux.yml
#
# Purpose:
#   Arch Linux specific package maintenance.
# =====================================================================

# WHY: Verify environment integrity for Arch Linux maintenance.
- name: "Package Clean (Arch): Verify pacman existence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "PATH={{ os_paths }} command -v pacman"
  register: _pacman_check
  failed_when: false
  changed_when: false
  become: false

- name: "Package Clean (Arch): Fail if binary missing {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.fail:
    msg: "Arch Linux environment detected but 'pacman' was not found."
  when: _pacman_check.rc != 0

# WHY: Cleans the package cache of pacman.
- name: "Package Clean (Arch): Clean cache {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "PATH={{ os_paths }} pacman -Sc --noconfirm"
  when: package_clean_cache | bool
  become: "{{ become_enabled }}"
  changed_when: false
  vars:
    fingerprint: "package_clean_arch_cache_{{ package_name | default('unknown', true) }}"

# WHY: Removes orphaned packages (dependencies not required).
- name: "Package Clean (Arch): Autoremove {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "PATH={{ os_paths }} pacman -Qtdq | xargs -r pacman -Rs --noconfirm"
  when: package_autoremove | bool
  become: "{{ become_enabled }}"
  failed_when: false
  vars:
    fingerprint: "package_clean_arch_auto_{{ package_name | default('unknown', true) }}"
