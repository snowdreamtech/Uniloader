---
# =====================================================================
# roles/native/tasks/package_loader/suse.yml
#
# Purpose:
#   SUSE/openSUSE-specific package management using Zypper.
# =====================================================================

# ---------------------------------------------------------------------
# Execution: Zypper Binary Branch
# ---------------------------------------------------------------------

# WHY: Zypper is the native package manager for SUSE. We handle
# repositories, local RPMs, and URLs.
- name: "Package (SUSE): Zypper execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.zypper:
    name: "{{ (pkg_repo_list + pkg_file_list + pkg_url_list) }}"
    state: "{{ package_state | default('present', true) }}"
    update_cache: >-
      {{
        package_force_update_cache | default(false, true)
        or
        (not (package_caches_updated.zypper | default(false, true)))
      }}
  register: package_result
  become: "{{ become_enabled }}"
  when: (pkg_repo_list + pkg_file_list + pkg_url_list) | length > 0
  vars:
    fingerprint: "package_suse_exec_{{ package_name | default('unknown', true) }}"

- name: "Package (SUSE): Mark zypper cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'zypper': true}) }}"
  when:
    - package_result is defined
    - not package_result.skipped | default(false)
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
