---
# =====================================================================
# roles/native/tasks/package_loader/windows.yml
#
# Purpose:
#   Windows-specific package installation orchestration.
#   Detects available package managers and dispatches packages accordingly.
#
# Supported Package Managers:
#   - Winget (winget:)       : Windows Package Manager (default)
#   - Chocolatey (choco:)    : Community package manager
#   - Scoop (scoop:)         : Command-line installer
#   - MS Store (msstore:)    : Microsoft Store via Winget
#
# Manager Priority:
#   1. Winget (default for unprefixed packages)
#   2. Chocolatey (if choco: prefix or package_manager='choco')
#   3. Scoop (if scoop: prefix or package_manager='scoop')
#
# Auto-Installation:
#   Set package_auto_install_managers: true to auto-install missing managers.
#
# Note: This file is called internally by package_loader/main.yml.
#       Users should call main.yml, not this file directly.
#
# Related Variables (passed from main.yml):
#   - pkg_winget_list        : Winget packages
#   - pkg_choco_list         : Chocolatey packages
#   - pkg_scoop_list         : Scoop packages
#   - pkg_msstore_list       : Microsoft Store apps
#   - package_manager        : Default manager for unprefixed packages
#
# =====================================================================

# ---------------------------------------------------------------------
# Environment Detection: Probe for available managers
# ---------------------------------------------------------------------

# WHY: We cache these facts to avoid redundant checks and gracefully
# handle missing managers for specific prefixes.
- name: "Package (Windows): Detect Winget availability {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.windows.win_command: "winget --version"
  register: _win_winget_check
  changed_when: false
  failed_when: false
  when: is_winget_installed is not defined

- name: "Package (Windows): Detect Chocolatey availability {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.windows.win_command: "choco --version"
  register: _win_choco_check
  changed_when: false
  failed_when: false
  when: is_choco_installed is not defined

- name: "Package (Windows): Detect Scoop availability {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.windows.win_command: "scoop --version"
  register: _win_scoop_check
  changed_when: false
  failed_when: false
  when: is_scoop_installed is not defined

- name: "Package (Windows): Set installation facts {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    is_winget_installed: "{{ _win_winget_check.rc == 0 if (_win_winget_check is defined and not _win_winget_check.skipped | default(false)) else (is_winget_installed | default(false)) }}"
    is_choco_installed: "{{ _win_choco_check.rc == 0 if (_win_choco_check is defined and not _win_choco_check.skipped | default(false)) else (is_choco_installed | default(false)) }}"
    is_scoop_installed: "{{ _win_scoop_check.rc == 0 if (_win_scoop_check is defined and not _win_scoop_check.skipped | default(false)) else (is_scoop_installed | default(false)) }}"
  tags: ["always"]

# ---------------------------------------------------------------------
# Lifecycle: Auto-install or Assert
# ---------------------------------------------------------------------

# 1. Winget Auto-install (usually pre-installed, but can be missing on Server versions)
- name: "Package (Windows): Auto-install Winget if requested {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.windows.win_shell: |
    Add-AppxPackage -RegisterByFamilyName -MainPackage Microsoft.DesktopAppInstaller_8wekyb3d8bbwe
  when:
    - pkg_winget_list | length > 0 or pkg_msstore_list | length > 0
    - not is_winget_installed | bool
    - package_auto_install_managers | default(false, true) | bool
  register: _winget_install_result
  failed_when: false # Winget installation is notoriously complex on Server, we try but don't hard fail here

# 2. Chocolatey Auto-install
- name: "Package (Windows): Auto-install Chocolatey if requested {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.windows.win_shell: |
    Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
  when:
    - pkg_choco_list | length > 0
    - not is_choco_installed | bool
    - package_auto_install_managers | default(false, true) | bool
  register: _choco_install_result

# 3. Scoop Auto-install
- name: "Package (Windows): Auto-install Scoop if requested {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.windows.win_shell: |
    Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; iwr -useb get.scoop.sh | iex
  when:
    - pkg_scoop_list | length > 0
    - not is_scoop_installed | bool
    - package_auto_install_managers | default(false, true) | bool
  register: _scoop_install_result

# Re-verify and update facts if installation was attempted
- name: "Package (Windows): Re-verify manager availability after installation {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.windows.win_command: "{{ item.cmd }}"
  loop:
    - { name: "winget", cmd: "winget --version" }
    - { name: "choco", cmd: "choco --version" }
    - { name: "scoop", cmd: "scoop --version" }
  register: _win_mgr_recheck
  changed_when: false
  failed_when: false
  when:
    - (_winget_install_result is defined and _winget_install_result is changed) or
      (_choco_install_result is defined and _choco_install_result is changed) or
      (_scoop_install_result is defined and _scoop_install_result is changed)
  loop_control:
    loop_var: item

- name: "Package (Windows): Update installation facts after attempts"
  ansible.builtin.set_fact:
    is_winget_installed: "{{ _win_mgr_recheck.results[0].rc == 0 }}"
    is_choco_installed: "{{ _win_mgr_recheck.results[1].rc == 0 }}"
    is_scoop_installed: "{{ _win_mgr_recheck.results[2].rc == 0 }}"
  when: _win_mgr_recheck is defined and not _win_mgr_recheck.skipped | default(false)

# Assertions for missing managers
- name: "Package (Windows): Verify Winget before action {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_winget_installed | bool"
    fail_msg: "Winget is required but not installed. Set 'package_auto_install_managers: true' to enable auto-installation."
  when: pkg_winget_list | length > 0 or pkg_msstore_list | length > 0

- name: "Package (Windows): Verify Chocolatey before action {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_choco_installed | bool"
    fail_msg: "Chocolatey is required but not installed. Set 'package_auto_install_managers: true' to enable auto-installation."
  when: pkg_choco_list | length > 0

- name: "Package (Windows): Verify Scoop before action {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_scoop_installed | bool"
    fail_msg: "Scoop is required but not installed. Set 'package_auto_install_managers: true' to enable auto-installation."
  when: pkg_scoop_list | length > 0

# ---------------------------------------------------------------------
# Resolver: Smart Manager Selection
# ---------------------------------------------------------------------

# WHY: If a package list has no prefix, we default to winget
# unless overridden by package_manager variable.
- name: "Package (Windows): Resolve default manager for raw repository list {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    _win_pkg_manager_default: "{{ package_manager | default('winget', true) }}"
  when: pkg_repo_list | length > 0
  tags: ["always"]

# Add raw packages to the resolved manager's list
- name: "Package (Windows): Merge raw packages into resolved manager list {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    pkg_winget_list: "{{ pkg_winget_list | default([], true) + pkg_repo_list }}"
  when:
    - pkg_repo_list | length > 0
    - _win_pkg_manager_default == 'winget'
  tags: ["always"]

- name: "Package (Windows): Merge raw packages into choco list {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    pkg_choco_list: "{{ pkg_choco_list | default([], true) + pkg_repo_list }}"
  when:
    - pkg_repo_list | length > 0
    - _win_pkg_manager_default == 'choco'
  tags: ["always"]

- name: "Package (Windows): Merge raw packages into scoop list {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    pkg_scoop_list: "{{ pkg_scoop_list | default([], true) + pkg_repo_list }}"
  when:
    - pkg_repo_list | length > 0
    - _win_pkg_manager_default == 'scoop'
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Manager-specific tasks
# ---------------------------------------------------------------------

# 1. Winget (Standard + MS Store)
- name: "Package (Windows): Update Winget sources {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.windows.win_command: "winget source update"
  when:
    - (pkg_winget_list | length > 0 or pkg_msstore_list | length > 0)
    - is_winget_installed | bool
    - package_force_update_cache | default(false, true) or not (package_caches_updated.winget | default(false, true))
  changed_when: false

- name: "Package (Windows): Mark Winget as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'winget': true}) }}"
  when:
    - (pkg_winget_list | length > 0 or pkg_msstore_list | length > 0)
    - is_winget_installed | bool

- name: "Package (Windows): Install/Uninstall via Winget {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.windows.win_winget:
    name: "{{ item }}"
    state: "{{ package_state | default('present', true) }}"
  loop: "{{ pkg_winget_list | default([], true) }}"
  when:
    - pkg_winget_list | length > 0
    - is_winget_installed | bool
  register: package_result

- name: "Package (Windows): Install/Uninstall via Winget (MS Store) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.windows.win_winget:
    name: "{{ item }}"
    state: "{{ package_state | default('present', true) }}"
    source: msstore
  loop: "{{ pkg_msstore_list | default([], true) }}"
  when:
    - pkg_msstore_list | length > 0
    - is_winget_installed | bool
  register: msstore_result

# 2. Chocolatey
- name: "Package (Windows): Verify Chocolatey before action {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_choco_installed | bool"
    fail_msg: "Chocolatey is required but not installed on the target host."
  when: pkg_choco_list | length > 0

- name: "Package (Windows): Install/Uninstall via Chocolatey {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  chocolatey.chocolatey.win_chocolatey:
    name: "{{ item }}"
    state: "{{ package_state | default('present', true) }}"
  loop: "{{ pkg_choco_list | default([], true) }}"
  when:
    - pkg_choco_list | length > 0
    - is_choco_installed | bool
  register: choco_result

- name: "Package (Windows): Mark Chocolatey as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'choco': true}) }}"
  when:
    - pkg_choco_list | length > 0
    - is_choco_installed | bool

# 3. Scoop
- name: "Package (Windows): Update Scoop buckets {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.windows.win_command: "scoop update"
  when:
    - pkg_scoop_list | length > 0
    - is_scoop_installed | bool
    - package_force_update_cache | default(false, true) or not (package_caches_updated.scoop | default(false, true))
  changed_when: false

- name: "Package (Windows): Mark Scoop as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'scoop': true}) }}"
  when:
    - pkg_scoop_list | length > 0
    - is_scoop_installed | bool

- name: "Package (Windows): Verify Scoop before action {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_scoop_installed | bool"
    fail_msg: "Scoop is required but not installed on the target host."
  when: pkg_scoop_list | length > 0

- name: "Package (Windows): Install/Uninstall via Scoop {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.windows.win_scoop:
    name: "{{ item }}"
    state: "{{ package_state | default('present', true) }}"
  loop: "{{ pkg_scoop_list | default([], true) }}"
  when:
    - pkg_scoop_list | length > 0
    - is_scoop_installed | bool
  register: scoop_result
