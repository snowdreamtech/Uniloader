---
# =====================================================================
# roles/native/tasks/package_loader/mgmt_dotnet.yml
# =====================================================================

# 1. Lifecycle: Assert
- name: "Package (.NET): Verify .NET presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_dotnet_installed | bool"
    fail_msg: ".NET SDK is required for 'dotnet tool install'. Please install .NET first."

# 2. Execution
- name: "Package (.NET): .NET tool installation {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "PATH={{ os_paths }} dotnet tool install -g {{ pkg_item }}"
  loop: "{{ pkg_dotnet_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result_dotnet
  become: false # .NET tools install to ~/.dotnet/tools
  vars:
    fingerprint: "package_dotnet_exec_{{ pkg_item }}"

# 3. Cache Marking
- name: "Package (.NET): Mark cache as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'dotnet': true}) }}"
  when:
    - package_result_dotnet is defined
    - not package_result_dotnet.skipped | default(false)
  tags: ["always"]
