---
# =====================================================================
# roles/native/tasks/package_loader/solus.yml
#
# Purpose:
#   Solus Linux specific package management.
#   Identifies use of EOPKG as the distribution's native engine.
# =====================================================================

# ---------------------------------------------------------------------
# Execution: Native Binary Branch
# ---------------------------------------------------------------------
- name: "Package (Solus): EOPKG execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.eopkg:
    name: "{{ pkg_repo_list }}"
    state: "{{ package_state | default('present', true) }}"
    update_cache: >-
      {{
        package_force_update_cache | default(false, true)
        or
        (not (package_caches_updated.eopkg | default(false, true)))
      }}
  register: package_result
  become: "{{ become_enabled }}"
  when: (pkg_repo_list | length) > 0
  vars:
    fingerprint: "package_solus_exec_{{ package_name | default('unknown', true) }}"

- name: "Package (Solus): Mark eopkg cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'eopkg': true}) }}"
  when:
    - package_result is defined
    - not package_result.skipped | default(false)
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
