---
# =====================================================================
# roles/native/tasks/package_loader/openwrt.yml
#
# Purpose:
#   OpenWrt specific package management for embedded systems.
#   Uses opkg for lightweight management.
# =====================================================================

# ---------------------------------------------------------------------
# Execution: Native OPKG Branch
# ---------------------------------------------------------------------

# WHY: OpenWrt is used in resource-constrained environments.
# opkg is the standard lightweight package manager.
- name: "Package (OpenWrt): opkg execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.opkg:
    name: "{{ pkg_repo_list }}"
    state: "{{ package_state | default('present', true) }}"
    update_cache: >-
      {{
        package_force_update_cache | default(false, true)
        or
        (not (package_caches_updated.opkg | default(false, true)))
      }}
  register: package_result
  become: "{{ become_enabled }}"
  when: (pkg_repo_list | length) > 0
  vars:
    fingerprint: "package_openwrt_exec_{{ package_name | default('unknown', true) }}"

- name: "Package (OpenWrt): Mark opkg cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'opkg': true}) }}"
  when:
    - package_result is defined
    - not package_result.skipped | default(false)
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
