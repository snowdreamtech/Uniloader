---
# =====================================================================
# roles/native/tasks/package_loader/debian.yml
#
# Purpose:
#   Debian/Ubuntu-specific package management via APT.
#   Handles repository packages, local .deb files, and remote URLs.
#
# Supported Installation Sources:
#   - Repository packages    : Standard apt install
#   - Local .deb files       : /path/to/package.deb
#   - Remote .deb URLs       : https://example.com/package.deb
#   - Source archives        : Delegated to source_builder.yml
#
# Note: This file is called internally by package_loader/main.yml.
#       Users should call main.yml, not this file directly.
#
# Related Variables (passed from main.yml):
#   - pkg_repo_list          : Standard package names
#   - pkg_file_list          : Local .deb file paths
#   - pkg_url_list           : Remote .deb URLs
#   - pkg_src_list           : Source archives for compilation
#   - package_state          : present|latest|absent|purged
#   - package_force_update_cache : Force apt update
#
# =====================================================================

# ---------------------------------------------------------------------
# Execution: Repository + URL + File Branch
# ---------------------------------------------------------------------

# WHY: We process standard repository packages first as they are
# the most stable source. Cache update is handled globally.
- name: "Package (Debian): Repository execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.apt:
    name: "{{ pkg_repo_list }}"
    state: "{{ (package_state == 'purged') | ternary('absent', package_state | default('present', true)) }}"
    purge: "{{ (package_state == 'purged') | bool }}"
    update_cache: >-
      {{
        package_force_update_cache | default(false, true)
        or
        (not (package_caches_updated.apt | default(false, true)))
      }}
  when: (pkg_repo_list | length) > 0
  register: package_repo_result
  become: "{{ become_enabled }}"

  vars:
    fingerprint: "package_deb_repo_exec_{{ package_name | default('unknown', true) }}"

# WHY: URL and local file based .deb packages are handled via the
# 'deb:' parameter which resolves dependencies automatically.
- name: "Package (Debian): Local/URL .deb installation {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.apt:
    deb: "{{ pkg_item }}"
    state: "{{ package_state | default('present', true) }}"
  loop: "{{ (pkg_file_list + pkg_url_list) }}"
  loop_control:
    loop_var: pkg_item
  when: (pkg_file_list + pkg_url_list) | length > 0
  register: package_deb_result
  become: "{{ become_enabled }}"
  vars:
    fingerprint: "package_deb_file_exec_{{ package_name | default('unknown', true) }}"

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------

# WHY: If source archives are detected, we dispatch to the common
# source builder for compilation.
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0

# ---------------------------------------------------------------------
# Registration: Set common result fact and cache status
# ---------------------------------------------------------------------
- name: "Package (Debian): Mark apt cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'apt': true}) }}"
  when:
    - package_repo_result is defined
    - not package_repo_result.skipped | default(false)
  tags: ["always"]

- name: "Package (Debian): Consolidate results {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_result: "{{ package_repo_result if (pkg_repo_list | length > 0) else package_deb_result }}"
  when: package_repo_result is defined or package_deb_result is defined
  tags: ["always"]
