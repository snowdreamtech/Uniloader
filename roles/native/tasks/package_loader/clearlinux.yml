---
# =====================================================================
# roles/native/tasks/package_loader/clearlinux.yml
#
# Purpose:
#   Clear Linux specific bundle management.
#   Uses swupd to manage system capabilities.
# =====================================================================

# ---------------------------------------------------------------------
# Execution: Native Bundle Branch
# ---------------------------------------------------------------------

# WHY: Clear Linux manages software as 'bundles' rather than
# individual packages for optimized performance.
- name: "Package (ClearLinux): swupd execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.swupd:
    name: "{{ pkg_item }}"
    state: "{{ package_state | default('present', true) }}"
  loop: "{{ pkg_repo_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result
  become: "{{ become_enabled }}"
  when: (pkg_repo_list | length) > 0
  vars:
    fingerprint: "package_clear_exec_{{ package_name | default('unknown', true) }}"

- name: "Package (ClearLinux): Mark swupd cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'swupd': true}) }}"
  when:
    - package_result is defined
    - not package_result.skipped | default(false)
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
