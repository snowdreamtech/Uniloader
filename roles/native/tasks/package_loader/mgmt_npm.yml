---
# =====================================================================
# roles/native/tasks/package_loader/mgmt_npm.yml
# =====================================================================

# 1. Lifecycle: Auto-install or Assert
- name: "Package (NPM): Auto-install NodeJS/NPM if requested {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.package:
    name: "nodejs"
    state: "present"
  become: true
  when:
    - not is_npm_installed | bool
    - package_auto_install_managers | default(false, true) | bool
  register: _npm_install_result

- name: "Package (NPM): Verify NPM presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_npm_installed | bool or (_npm_install_result is defined and not _npm_install_result.failed | default(false))"
    fail_msg: "NPM is required but not installed. Set 'package_auto_install_managers: true' to enable auto-installation."

# 2. Execution
- name: "Package (NPM): Global NPM execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.npm:
    name: "{{ pkg_item }}"
    global: true
    state: "{{ package_state | default('present', true) }}"
  loop: "{{ pkg_npm_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result_npm
  become: true # Global install requires root
  vars:
    fingerprint: "package_npm_exec_{{ pkg_item }}"

# 3. Cache Marking
- name: "Package (NPM): Mark cache as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'npm': true}) }}"
  when:
    - package_result_npm is defined
    - not package_result_npm.skipped | default(false)
  tags: ["always"]
