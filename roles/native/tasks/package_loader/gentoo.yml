---
# =====================================================================
# roles/native/tasks/package_loader/gentoo.yml
#
# Purpose:
#   Gentoo-specific package management using Portage (emerge).
# =====================================================================

# ---------------------------------------------------------------------
# Execution: Portage (Emerge) Binary Branch
# ---------------------------------------------------------------------

# WHY: Emerge is the core of Gentoo. We use the community-maintained
# portage module for reliable state management.
- name: "Package (Gentoo): Portage execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.portage:
    package: "{{ pkg_repo_list }}"
    state: "{{ package_state | default('present', true) }}"
    update_cache: >-
      {{
        package_force_update_cache | default(false, true)
        or
        (not (package_caches_updated.portage | default(false, true)))
      }}
  register: package_result
  become: "{{ become_enabled }}"
  when: (pkg_repo_list | length) > 0
  vars:
    fingerprint: "package_gentoo_exec_{{ package_name | default('unknown', true) }}"

- name: "Package (Gentoo): Mark portage cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'portage': true}) }}"
  when:
    - package_result is defined
    - not package_result.skipped | default(false)
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------

# WHY: While Gentoo is already source-based, we provide the manual
# source-builder to handle packages outside the official tree.
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
