---
# =====================================================================
# roles/native/tasks/package_loader/mgmt_bun.yml
# =====================================================================

# 1. Lifecycle: Assert
- name: "Package (Bun): Verify Bun presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_bun_installed | bool"
    fail_msg: "Bun is required for 'bun install -g'. Please install Bun first."

# 2. Execution
- name: "Package (Bun): Global Bun installation {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "PATH={{ os_paths }} bun install -g {{ pkg_item }}"
  loop: "{{ pkg_bun_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result_bun
  become: false # Bun usually installs to ~/.bun/bin
  vars:
    fingerprint: "package_bun_exec_{{ pkg_item }}"

# 3. Cache Marking
- name: "Package (Bun): Mark cache as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'bun': true}) }}"
  when:
    - package_result_bun is defined
    - not package_result_bun.skipped | default(false)
  tags: ["always"]
