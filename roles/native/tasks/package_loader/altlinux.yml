---
# =====================================================================
# roles/native/tasks/package_loader/altlinux.yml
#
# Purpose:
#   Alt Linux specific package management.
#   Uses the unique apt-rpm (Sisyphus) engine.
# =====================================================================

# WHY: Alt Linux is unique for using 'apt-get' style commands with RPMs.
- name: "Package (AltLinux): apt-rpm execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "apt-get install -y {{ pkg_item }}"
  loop: "{{ pkg_repo_list }}"
  loop_control:
    loop_var: pkg_item
  become: "{{ become_enabled }}"
  when: (pkg_repo_list | length) > 0
  vars:
    fingerprint: "package_alt_exec_{{ package_name | default('unknown', true) }}"

- name: "Package (AltLinux): Mark apt-rpm cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'apt_rpm': true}) }}"
  when: (pkg_repo_list | length) > 0
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
