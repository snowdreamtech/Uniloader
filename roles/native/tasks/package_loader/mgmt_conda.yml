---
# =====================================================================
# roles/native/tasks/package_loader/mgmt_conda.yml
#
# Purpose:
#   Conda package manager integration.
#   Scientific Python package and environment manager.
#
# Author: Native AI Team
#
# Requirements:
#   - Anaconda or Miniconda must be pre-installed
#   - Packages install to conda environments
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: "native"
#       tasks_from: "package_loader/main"
#     vars:
#       package_list: ["conda:numpy", "conda:pandas"]
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: "native"
#       tasks_from: "package_loader/main"
#     vars:
#       package_list:
#         - "conda:numpy"         # Numerical computing
#         - "conda:pandas"        # Data analysis
#         - "conda:scikit-learn"  # Machine learning
#       package_state: "present"
# =====================================================================

# 1. Lifecycle: Assert
- name: "Package (Conda): Verify Conda presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_conda_installed | bool"
    fail_msg: "Conda is required but not installed. Please install Anaconda or Miniconda first."

# 2. Execution
- name: "Package (Conda): Install packages {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "PATH={{ os_paths }} conda install -y {{ pkg_item }}"
  loop: "{{ pkg_conda_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result_conda
  become: false
  vars:
    fingerprint: "package_conda_exec_{{ pkg_item }}"

# 3. Cache Marking
- name: "Package (Conda): Mark cache as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'conda': true}) }}"
  when:
    - package_result_conda is defined
    - not package_result_conda.skipped | default(false)
  tags: ["always"]
