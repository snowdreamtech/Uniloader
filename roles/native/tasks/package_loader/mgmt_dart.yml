---
# =====================================================================
# roles/native/tasks/package_loader/mgmt_dart.yml
# =====================================================================

# 1. Lifecycle: Assert
- name: "Package (Dart): Verify Dart/Pub presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_dart_installed | bool"
    fail_msg: "Dart/Pub is required for 'dart pub global activate'. Please install Dart/Flutter first."

# 2. Execution
- name: "Package (Dart): Dart Pub global activation {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "PATH={{ os_paths }} dart pub global activate {{ pkg_item }}"
  loop: "{{ pkg_dart_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result_dart
  become: false
  vars:
    fingerprint: "package_dart_exec_{{ pkg_item }}"

# 3. Cache Marking
- name: "Package (Dart): Mark cache as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'dart': true}) }}"
  when:
    - package_result_dart is defined
    - not package_result_dart.skipped | default(false)
  tags: ["always"]
