---
# =====================================================================
# roles/native/tasks/package_loader/openindiana.yml
#
# Purpose:
#   OpenIndiana specific package management.
#   Uses IPS (pkg) as the distribution's native engine.
# =====================================================================

# WHY: OpenIndiana is the key successor to OpenSolaris.
- name: "Package (OpenIndiana): IPS execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.pkg5:
    name: "{{ pkg_repo_list }}"
    state: "{{ package_state | default('present', true) }}"
  register: package_result
  become: "{{ become_enabled }}"
  when: (pkg_repo_list | length) > 0
  vars:
    fingerprint: "package_openindiana_exec_{{ package_name | default('unknown', true) }}"

- name: "Package (OpenIndiana): Mark pkg5 cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'pkg5': true}) }}"
  when:
    - package_result is defined
    - not package_result.skipped | default(false)
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
