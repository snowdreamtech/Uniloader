---
# =====================================================================
# roles/native/tasks/package_loader/mgmt_deno.yml
# =====================================================================

# 1. Lifecycle: Assert
- name: "Package (Deno): Verify Deno presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_deno_installed | bool"
    fail_msg: "Deno is required for 'deno install'. Please install Deno first."

# 2. Execution
- name: "Package (Deno): Deno binary installation {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "PATH={{ os_paths }} deno install -A {{ pkg_item }}"
  loop: "{{ pkg_deno_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result_deno
  become: false # Deno installs to ~/.deno/bin by default
  vars:
    fingerprint: "package_deno_exec_{{ pkg_item }}"

# 3. Cache Marking
- name: "Package (Deno): Mark cache as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'deno': true}) }}"
  when:
    - package_result_deno is defined
    - not package_result_deno.skipped | default(false)
  tags: ["always"]
