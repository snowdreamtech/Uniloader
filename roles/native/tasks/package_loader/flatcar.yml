---
# =====================================================================
# roles/native/tasks/package_loader/flatcar.yml
#
# Purpose:
#   Flatcar Container Linux specific management.
#   Supports native toolchain and specialized updates.
# =====================================================================

# WHY: Flatcar is immutable and doesn't have a traditional package manager.
# However, it provides 'toolbox' or can build from source.
# We primarily support its source-building capability for custom tools.
- name: "Package (Flatcar): Identifying immutable environment {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.debug:
    msg: "Flatcar is an immutable system. Prefer containers for apps. Using source-builder for native tools."
  when: (pkg_src_list | length) > 0

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
