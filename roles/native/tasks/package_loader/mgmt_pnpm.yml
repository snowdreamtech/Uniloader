---
# =====================================================================
# roles/native/tasks/package_loader/mgmt_pnpm.yml
#
# Purpose:
#   PNPM (Performant NPM) package manager integration.
#   Fast, disk space efficient Node.js package manager.
#
# Author: Native AI Team
#
# Requirements:
#   - Node.js/NPM must be pre-installed
#   - PNPM can be auto-installed via NPM if enabled
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: "native"
#       tasks_from: "package_loader/main"
#     vars:
#       package_list: ["pnpm:typescript", "pnpm:vite"]
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: "native"
#       tasks_from: "package_loader/main"
#     vars:
#       package_list:
#         - "pnpm:typescript"     # TypeScript compiler
#         - "pnpm:@vue/cli"       # Vue CLI
#       package_auto_install_managers: true  # Auto-install PNPM
# =====================================================================

# 1. Lifecycle: Auto-install or Assert
- name: "Package (PNPM): Auto-install PNPM via NPM if requested {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.npm:
    name: "pnpm"
    global: true
    state: "present"
  become: true
  when:
    - not is_pnpm_installed | bool
    - is_npm_installed | bool
    - package_auto_install_managers | default(false, true) | bool
  register: _pnpm_install_result

- name: "Package (PNPM): Verify PNPM presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_pnpm_installed | bool or (_pnpm_install_result is defined and not _pnpm_install_result.failed | default(false))"
    fail_msg: "PNPM is required but not installed. Set 'package_auto_install_managers: true' to enable auto-installation via NPM."

# 2. Execution (Ansible doesn't have a native pnpm module yet, using shell fallback)
- name: "Package (PNPM): Global PNPM execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "PATH={{ os_paths }} pnpm add -g {{ pkg_item }}"
  loop: "{{ pkg_pnpm_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result_pnpm
  become: true
  changed_when: "'up to date' not in package_result_pnpm.stdout"
  when: package_state | default('present', true) == 'present'
  vars:
    fingerprint: "package_pnpm_exec_{{ pkg_item }}"

# 3. Cache Marking
- name: "Package (PNPM): Mark cache as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'pnpm': true}) }}"
  when:
    - package_result_pnpm is defined
    - not package_result_pnpm.skipped | default(false)
  tags: ["always"]
