---
# =====================================================================
# roles/native/tasks/package_loader/netbsd.yml
#
# Purpose:
#   NetBSD specific package management.
#   Uses pkgin as the distribution's preferred engine.
# =====================================================================

# ---------------------------------------------------------------------
# Execution: Native Binary Branch
# ---------------------------------------------------------------------

# WHY: NetBSD aims for portability. 'pkgin' is the binary manager.
- name: "Package (NetBSD): pkgin execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.pkgin:
    name: "{{ pkg_repo_list }}"
    state: "{{ package_state | default('present', true) }}"
    update_cache: >-
      {{
        package_force_update_cache | default(false, true)
        or
        (not (package_caches_updated.pkgin | default(false, true)))
      }}
  register: package_result
  become: "{{ become_enabled }}"
  when: (pkg_repo_list | length) > 0
  vars:
    fingerprint: "package_netbsd_exec_{{ package_name | default('unknown', true) }}"

- name: "Package (NetBSD): Mark pkgin cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'pkgin': true}) }}"
  when:
    - package_result is defined
    - not package_result.skipped | default(false)
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
