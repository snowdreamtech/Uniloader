---
# =====================================================================
# roles/native/tasks/package_loader/mageia.yml
#
# Purpose:
#   Mageia and OpenMandriva specific package management.
#   Uses urpmi as the distribution's native engine.
# =====================================================================

# ---------------------------------------------------------------------
# Execution: Native URPMI Branch
# ---------------------------------------------------------------------

# WHY: urpmi is the classic manager for Mandriva derivatives.
- name: "Package (Mageia): urpmi execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.urpmi:
    name: "{{ pkg_repo_list }}"
    state: "{{ package_state | default('present', true) }}"
    update_cache: >-
      {{
        package_force_update_cache | default(false, true)
        or
        (not (package_caches_updated.urpmi | default(false, true)))
      }}
  register: package_result
  become: "{{ become_enabled }}"
  when: (pkg_repo_list | length) > 0
  vars:
    fingerprint: "package_mageia_exec_{{ package_name | default('unknown', true) }}"

- name: "Package (Mageia): Mark urpmi cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'urpmi': true}) }}"
  when:
    - package_result is defined
    - not package_result.skipped | default(false)
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
