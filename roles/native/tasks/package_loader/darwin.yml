  when: (pkg_app_list | length) > 0
  block:
    - name: "Package (Darwin): Check APP existence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.stat:
        path: "/Applications/{{ package_bundle_name }}.app"
      register: _app_stat
      when: package_bundle_name is defined
      tags: ["always"]

    - name: "Package (Darwin): Install APP bundles {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.command: "cp -R {{ app_item }} /Applications/"
      loop: "{{ pkg_app_list }}"
      loop_control:
        loop_var: app_item
      when:
        - package_state | default('present', true) in ['present', 'latest']
        - package_bundle_name is defined
        - not (_app_stat.stat.exists | default(false, true))
      changed_when: true
      become: "{{ become_enabled }}"

    - name: "Package (Darwin): Uninstall APP bundles {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.file:
        path: "/Applications/{{ package_bundle_name }}.app"
        state: absent
      when:
        - package_state | default('present', true) in ['absent', 'purged']
        - package_bundle_name is defined
        - _app_stat.stat.exists | default(false, true)
      become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Execution: ZIP Archive Extraction
# ---------------------------------------------------------------------

# WHY: Some apps are distributed as .zip archives containing .app bundles.
# Extract and copy the .app to /Applications/.

- name: "Package (Darwin): Process ZIP archives {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  when: (pkg_zip_list | length) > 0
  block:
    - name: "Package (Darwin): Check ZIP app existence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.stat:
        path: "/Applications/{{ package_bundle_name }}.app"
      register: _zip_app_stat
      when: package_bundle_name is defined
      tags: ["always"]

    - name: "Package (Darwin): Install from ZIP {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      when:
        - package_state | default('present', true) in ['present', 'latest']
        - package_bundle_name is defined
        - not (_zip_app_stat.stat.exists | default(false, true))
      block:
        - name: "Package (Darwin): Create temp directory {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.tempfile:
            state: directory
            suffix: "_ansible_unzip"
          register: _temp_dir

        - name: "Package (Darwin): Unzip archive {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.unarchive:
            src: "{{ zip_item }}"
            dest: "{{ _temp_dir.path }}"
            remote_src: true
          loop: "{{ pkg_zip_list }}"
          loop_control:
            loop_var: zip_item

        - name: "Package (Darwin): Find APP in unzipped content {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.find:
            paths: "{{ _temp_dir.path }}"
            patterns: "{{ package_bundle_name }}.app"
            file_type: directory
            recurse: true
          register: _unzipped_app

        - name: "Package (Darwin): Copy APP to Applications {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.command: "cp -R {{ _unzipped_app.files[0].path }} /Applications/"
          when: _unzipped_app.matched > 0
          changed_when: true
          become: "{{ become_enabled }}"

      always:
        - name: "Package (Darwin): Cleanup temp directory {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.file:
            path: "{{ _temp_dir.path }}"
            state: absent
          when: _temp_dir is defined

    - name: "Package (Darwin): Uninstall ZIP app {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.file:
        path: "/Applications/{{ package_bundle_name }}.app"
        state: absent
      when:
        - package_state | default('present', true) in ['absent', 'purged']
        - package_bundle_name is defined
        - _zip_app_stat.stat.exists | default(false, true)
      become: "{{ become_enabled }}"

