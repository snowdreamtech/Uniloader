# ---------------------------------------------------------------------
# Execution: Kernel Extension Installation
# ---------------------------------------------------------------------

# WHY: Kexts require special handling with kextload/kextunload.
# WARNING: Requires SIP disabled or proper code signing.

- name: "Package (Darwin): Process Kernel Extensions {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  when: (pkg_kext_list | length) > 0
  block:
    - name: "Package (Darwin): Check Kext existence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.stat:
        path: "/Library/Extensions/{{ package_kext_name }}.kext"
      register: _kext_stat
      when: package_kext_name is defined
      tags: ["always"]

    - name: "Package (Darwin): Install Kernel Extensions {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      when:
        - package_state | default('present', true) in ['present', 'latest']
        - package_kext_name is defined
        - not (_kext_stat.stat.exists | default(false, true))
      block:
        - name: "Package (Darwin): Copy Kext to Extensions {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.command: "cp -R {{ kext_item }} /Library/Extensions/"
          loop: "{{ pkg_kext_list }}"
          loop_control:
            loop_var: kext_item
          changed_when: true
          become: "{{ become_enabled }}"

        - name: "Package (Darwin): Set Kext permissions {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.file:
            path: "/Library/Extensions/{{ package_kext_name }}.kext"
            owner: root
            group: wheel
            mode: "0755"
            recurse: true
          become: "{{ become_enabled }}"

        - name: "Package (Darwin): Load Kext {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.command: "kextload /Library/Extensions/{{ package_kext_name }}.kext"
          register: _kext_load
          failed_when: false
          changed_when: _kext_load.rc == 0
          become: "{{ become_enabled }}"

    - name: "Package (Darwin): Uninstall Kernel Extensions {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      when:
        - package_state | default('present', true) in ['absent', 'purged']
        - package_kext_name is defined
        - _kext_stat.stat.exists | default(false, true)
      block:
        - name: "Package (Darwin): Unload Kext {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.command: "kextunload /Library/Extensions/{{ package_kext_name }}.kext"
          register: _kext_unload
          failed_when: false
          changed_when: _kext_unload.rc == 0
          become: "{{ become_enabled }}"

        - name: "Package (Darwin): Remove Kext {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.file:
            path: "/Library/Extensions/{{ package_kext_name }}.kext"
            state: absent
          become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Execution: Mac App Store (MAS) Support
# ---------------------------------------------------------------------

# WHY: Install apps from Mac App Store using 'mas' CLI tool.
# Requires 'mas' to be installed via Homebrew or MacPorts.
# Format: mas:ID (recommended) or mas:Name

- name: "Package (Darwin): Fail if mas is used on unsupported macOS {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.fail:
    msg: "Error: 'mas' packages requested {{ pkg_mas_list }} but macOS version {{ ansible_distribution_major_version }} < 13. 'mas' is essentially unusable on this version. Please remove 'mas:' entries from your configuration or upgrade macOS."
  when:
    - (pkg_mas_list | length) > 0
    - ansible_distribution_major_version | int < 13
  tags: ["always"]

- name: "Package (Darwin): Process MAS apps {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  when:
    - (pkg_mas_list | length) > 0
    - ansible_distribution_major_version | int >= 13
  block:
    # 1. Check and Install Dependency: mas-cli
    - name: "Package (Darwin): Check for mas-cli {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.shell: "PATH={{ os_paths }} command -v mas"
      register: _mas_check
      failed_when: false
      changed_when: false
      check_mode: false
      tags: ["always"]

    - name: "Package (Darwin): Install mas-cli if missing {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      when: _mas_check.rc != 0
      block:
        - name: "Package (Darwin): Check for Homebrew {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.shell: "PATH={{ os_paths }} command -v brew"
          register: _brew_check
          failed_when: false
          changed_when: false
          check_mode: false
          tags: ["always"]

        - name: "Package (Darwin): Check for MacPorts {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.shell: "PATH={{ os_paths }} command -v port"
          register: _port_check
          failed_when: false
          changed_when: false
          check_mode: false
          tags: ["always"]

        - name: "Package (Darwin): Install mas via Homebrew {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.command: "brew install mas"
          when: _brew_check.rc == 0
          changed_when: true

        - name: "Package (Darwin): Install mas via MacPorts {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.command: "port install mas"
          when:
            - _brew_check.rc != 0
            - _port_check.rc == 0
          become: "{{ become_enabled }}"
          changed_when: true

        - name: "Package (Darwin): Fail if no package manager found for mas {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
          ansible.builtin.fail:
            msg: "Cannot install 'mas-cli'. Neither Homebrew nor MacPorts found. Please install one of them or install 'mas' manually."
          when:
            - _brew_check.rc != 0
            - _port_check.rc != 0

    # 2. Extract MAS IDs calling mas module
    - name: "Package (Darwin): Install MAS apps {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      community.general.mas:
        id: "{{ mas_item | regex_replace('^mas:', '') }}"
        state: "{{ package_state | default('present', true) }}"
      loop: "{{ pkg_mas_list }}"
      loop_control:
        loop_var: mas_item
      become: false
