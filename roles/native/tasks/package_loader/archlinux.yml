---
# =====================================================================
# roles/native/tasks/package_loader/archlinux.yml
#
# Purpose:
#   ArchLinux-specific package management using pacman.
# =====================================================================

# ---------------------------------------------------------------------
# Execution: Pacman Binary Branch
# ---------------------------------------------------------------------

# WHY: Standard pacman installation for repository packages.
- name: "Package (ArchLinux): Repository installation {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.pacman:
    name: "{{ (pkg_repo_list + pkg_file_list) }}"
    state: "{{ package_state | default('present', true) }}"
    update_cache: >-
      {{
        package_force_update_cache | default(false, true)
        or
        (not (package_caches_updated.pacman | default(false, true)))
      }}
  register: package_result
  become: "{{ become_enabled }}"
  when: (pkg_repo_list + pkg_file_list) | length > 0
  vars:
    fingerprint: "package_arch_exec_{{ package_name | default('unknown', true) }}"

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
- name: "Package (ArchLinux): Mark pacman cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'pacman': true}) }}"
  when:
    - package_result is defined
    - not package_result.skipped | default(false)
  tags: ["always"]
