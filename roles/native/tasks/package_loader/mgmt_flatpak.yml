---
# =====================================================================
# roles/native/tasks/package_loader/mgmt_flatpak.yml
# =====================================================================

# 1. Lifecycle: Auto-install or Assert
- name: "Package (Flatpak): Auto-install Flatpak if requested {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.package:
    name: "flatpak"
    state: "present"
  become: true
  when:
    - not is_flatpak_installed | bool
    - package_auto_install_managers | default(false, true) | bool
  register: _flatpak_install_result

- name: "Package (Flatpak): Verify Flatpak presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_flatpak_installed | bool or (_flatpak_install_result is defined and not _flatpak_install_result.failed | default(false))"
    fail_msg: "Flatpak is required but not installed. Set 'package_auto_install_managers: true' to enable auto-installation."

# 2. Execution
- name: "Package (Flatpak): Flatpak execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.flatpak:
    name: "{{ pkg_item }}"
    state: "{{ package_state | default('present', true) }}"
  loop: "{{ pkg_flatpak_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result_flatpak
  become: true
  vars:
    fingerprint: "package_flatpak_exec_{{ pkg_item }}"

# 3. Cache Marking
- name: "Package (Flatpak): Mark cache as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'flatpak': true}) }}"
  when:
    - package_result_flatpak is defined
    - not package_result_flatpak.skipped | default(false)
  tags: ["always"]
