---
# =====================================================================
# roles/native/tasks/package_loader/freebsd.yml
#
# Purpose:
#   FreeBSD-specific package management using pkg.
# =====================================================================

# ---------------------------------------------------------------------
# Execution: PKG Binary Branch
# ---------------------------------------------------------------------

# WHY: FreeBSD uses 'pkg' for binary management.
- name: "Package (FreeBSD): PKG execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.pkgng:
    name: "{{ pkg_repo_list }}"
    state: "{{ package_state | default('present', true) }}"
    update_cache: >-
      {{
        package_force_update_cache | default(false, true)
        or
        (not (package_caches_updated.pkgng | default(false, true)))
      }}
  register: package_result
  become: "{{ become_enabled }}"
  when: (pkg_repo_list | length) > 0
  vars:
    fingerprint: "package_freebsd_exec_{{ package_name | default('unknown', true) }}"

- name: "Package (FreeBSD): Mark pkgng cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'pkgng': true}) }}"
  when:
    - package_result is defined
    - not package_result.skipped | default(false)
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------

# WHY: FreeBSD is famous for its Ports system, but here we provide a
# generic source build capability compatible with our builder.
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
