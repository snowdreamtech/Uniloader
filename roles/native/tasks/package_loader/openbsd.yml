---
# =====================================================================
# roles/native/tasks/package_loader/openbsd.yml
#
# Purpose:
#   OpenBSD specific package management.
#   Uses pkg_add as the native engine.
# =====================================================================

# ---------------------------------------------------------------------
# Execution: Native Binary Branch
# ---------------------------------------------------------------------

# WHY: OpenBSD is renowned for security. Its package manager 'pkg_add'
# is handled by the openbsd_pkg module.
- name: "Package (OpenBSD): pkg_add execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.openbsd_pkg:
    name: "{{ pkg_item }}"
    state: "{{ package_state | default('present', true) }}"
  loop: "{{ pkg_repo_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result
  become: "{{ become_enabled }}"
  when: (pkg_repo_list | length) > 0
  vars:
    fingerprint: "package_openbsd_exec_{{ package_name | default('unknown', true) }}"

- name: "Package (OpenBSD): Mark pkg_add cache as updated {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'openbsd_pkg': true}) }}"
  when:
    - package_result is defined
    - not package_result.skipped | default(false)
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
