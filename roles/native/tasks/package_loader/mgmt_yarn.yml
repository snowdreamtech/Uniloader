---
# =====================================================================
# roles/native/tasks/package_loader/mgmt_yarn.yml
# =====================================================================

# 1. Lifecycle: Auto-install or Assert
- name: "Package (Yarn): Auto-install Yarn via NPM if requested {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.npm:
    name: "yarn"
    global: true
    state: "present"
  become: true
  when:
    - not is_yarn_installed | bool
    - is_npm_installed | bool
    - package_auto_install_managers | default(false, true) | bool
  register: _yarn_install_result

- name: "Package (Yarn): Verify Yarn presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_yarn_installed | bool or (_yarn_install_result is defined and not _yarn_install_result.failed | default(false))"
    fail_msg: "Yarn is required but not installed. Set 'package_auto_install_managers: true' to enable auto-installation via NPM."

# 2. Execution
- name: "Package (Yarn): Global Yarn execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.yarn:
    name: "{{ pkg_item }}"
    global: true
    state: "{{ package_state | default('present', true) }}"
  loop: "{{ pkg_yarn_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result_yarn
  become: true
  vars:
    fingerprint: "package_yarn_exec_{{ pkg_item }}"

# 3. Cache Marking
- name: "Package (Yarn): Mark cache as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'yarn': true}) }}"
  when:
    - package_result_yarn is defined
    - not package_result_yarn.skipped | default(false)
  tags: ["always"]
