---
# =====================================================================
# roles/native/tasks/package_loader/mgmt_composer.yml
# =====================================================================

# 1. Lifecycle: Auto-install or Assert
- name: "Package (Composer): Auto-install Composer if requested {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.package:
    name: "composer"
    state: "present"
  become: true
  when:
    - not is_composer_installed | bool
    - package_auto_install_managers | default(false, true) | bool
  register: _composer_install_result

- name: "Package (Composer): Verify Composer presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_composer_installed | bool or (_composer_install_result is defined and not _composer_install_result.failed | default(false))"
    fail_msg: "Composer is required but not installed. Set 'package_auto_install_managers: true' to enable auto-installation."

# 2. Execution
- name: "Package (Composer): Global Composer execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.composer:
    command: "require"
    global: true
    arguments: "{{ pkg_item }}"
  loop: "{{ pkg_composer_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result_composer
  become: false # Composer global installs to user home usually
  vars:
    fingerprint: "package_composer_exec_{{ pkg_item }}"

# 3. Cache Marking
- name: "Package (Composer): Mark cache as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'composer': true}) }}"
  when:
    - package_result_composer is defined
    - not package_result_composer.skipped | default(false)
  tags: ["always"]
