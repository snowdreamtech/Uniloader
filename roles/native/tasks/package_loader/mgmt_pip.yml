---
# =====================================================================
# roles/native/tasks/package_loader/mgmt_pip.yml
# =====================================================================

# 1. Lifecycle: Auto-install or Assert
- name: "Package (PIP): Auto-install PIP if requested {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.package:
    name: "python3-pip"
    state: "present"
  become: true
  when:
    - not is_pip_installed | bool
    - package_auto_install_managers | default(false, true) | bool
  register: _pip_install_result

- name: "Package (PIP): Verify PIP presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_pip_installed | bool or (_pip_install_result is defined and not _pip_install_result.failed | default(false))"
    fail_msg: "PIP is required but not installed. Set 'package_auto_install_managers: true' to enable auto-installation."

# 2. Execution
- name: "Package (PIP): PIP execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.pip:
    name: "{{ pkg_item }}"
    state: "{{ package_state | default('present', true) }}"
    executable: pip3
  loop: "{{ pkg_pip_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result_pip
  become: "{{ (ansible_system == 'Linux') | ternary(true, false) }}"
  vars:
    fingerprint: "package_pip_exec_{{ pkg_item }}"

# 3. Cache Marking
- name: "Package (PIP): Mark cache as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'pip': true}) }}"
  when:
    - package_result_pip is defined
    - not package_result_pip.skipped | default(false)
  tags: ["always"]
