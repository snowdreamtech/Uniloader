---
# =====================================================================
# roles/native/tasks/package_loader/mgmt_guix.yml
# =====================================================================

# 1. Lifecycle: Assert
- name: "Package (Guix): Verify Guix presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that: "is_guix_installed | bool"
    fail_msg: "Guix is required but not installed. Please install it manually from https://guix.gnu.org/manual/en/html_node/Binary-Installation.html"

# 2. Execution
- name: "Package (Guix): Guix execution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.guix:
    name: "{{ pkg_item }}"
    state: "{{ package_state | default('present', true) }}"
  loop: "{{ pkg_guix_list }}"
  loop_control:
    loop_var: pkg_item
  register: package_result_guix
  become: false
  vars:
    fingerprint: "package_guix_exec_{{ pkg_item }}"

# 3. Cache Marking
- name: "Package (Guix): Mark cache as updated"
  ansible.builtin.set_fact:
    package_caches_updated: "{{ package_caches_updated | combine({'guix': true}) }}"
  when:
    - package_result_guix is defined
    - not package_result_guix.skipped | default(false)
  tags: ["always"]
