---
# =====================================================================
# roles/native/tasks/user_loader/alpine.yml
#
# Purpose:
#   Alpine Linux (BusyBox) specific user management.
#   Uses BusyBox 'adduser' and 'deluser'.
# =====================================================================

# ---------------------------------------------------------------------
# Normalization: Resolve the user's home directory path.
# ---------------------------------------------------------------------
- name: "Resolve user home directory path {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    ansible_user_home: "{{ user_home | default('/home/' ~ user_name) }}"
  tags: ["always"]

# ---------------------------------------------------------------------
# Detection: Check if the user already exists.
# ---------------------------------------------------------------------

# WHY: BusyBox doesn't have 'getent' by default. 'id' is universal.
- name: "User (Alpine): Check if user exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "id {{ user_name }}"
  register: _user_exists_check
  failed_when: false
  changed_when: false
  become: "{{ become_enabled }}"
  tags: ["always"]

- name: "User (Alpine): Mark user as existing {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    user_already_exists: true
  when: _user_exists_check.rc == 0
  tags: ["always"]

# ---------------------------------------------------------------------
# Validation: Check for UID conflicts.
# ---------------------------------------------------------------------

# WHY: We scan /etc/passwd directly since 'getent' is missing.
- name: "User (Alpine): Check if UID {{ user_uid | default(omit) }} already exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "grep -q '^{{[^:]*}}:x:{{ user_uid }}:' /etc/passwd"
  register: _uid_conflict_check
  failed_when: false
  changed_when: false
  when: user_uid is defined
  become: "{{ become_enabled }}"
  tags: ["always"]

- name: "User (Alpine): Mark UID conflict {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    user_uid_conflict: true
  when:
    - user_uid is defined
    - _uid_conflict_check.rc == 0
  tags: ["always"]

- name: "User (Alpine): Skip user creation due to conflict {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    user_skip: true
  when: user_uid_conflict | default(false, true)
  tags: ["always"]

# ---------------------------------------------------------------------
# Group Management (Alpine)
# ---------------------------------------------------------------------

# WHY: BusyBox 'addgroup' creates groups.
- name: "User (Alpine): Ensure primary group exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.group:
    name: "{{ user_name }}"
    gid: "{{ user_gid | default(omit) }}"
    state: "present"
  when:
    - user_already_exists is not defined
    - user_skip is not defined
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# User Management (Alpine)
# ---------------------------------------------------------------------

# WHY: 'ansible.builtin.user' module handles BusyBox correctly if it finds 'adduser'.
- name: "User (Alpine): Ensure user {{ user_name }} exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.user:
    name: "{{ user_name }}"
    shell: "{{ user_shell | default('/bin/sh') }}"
    groups: "{{ user_groups | default([]) | join(',') }}"
    uid: "{{ user_uid | default(omit) }}"
    group: "{{ user_name }}"
    home: "{{ ansible_user_home }}"
    state: "present"
    create_home: "{{ user_create_home | default(true) }}"
  when: user_skip is not defined
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Configuration: SSH & Sudo (Shared Logic)
# ---------------------------------------------------------------------

# WHY: We reuse the exact configuration blocks for consistency.
- name: "User (Alpine): Include SSH configuration"
  ansible.builtin.include_tasks: "common_ssh.yml"
  when: user_skip is not defined

- name: "User (Alpine): Include Sudo configuration"
  ansible.builtin.include_tasks: "common_sudo.yml"
  when: user_skip is not defined
