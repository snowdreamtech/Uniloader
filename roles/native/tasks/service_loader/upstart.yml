---
# =====================================================================
# roles/native/tasks/service_loader/upstart.yml
#
# Purpose:
#   Upstart-specific service management.
#   Maintains support for legacy Ubuntu and Debian systems.
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/upstart"
#     vars:
#       service_name: "mysql"
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/upstart"
#     vars:
#       service_name: "mysql"
#       service_state: "started"
#       service_enabled: true
#
# =====================================================================

# WHY: Reset functional variables to prevent pollution.
- name: "Service (Upstart): Reset loader variables {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    _upstart_check: null
    _upstart_conf_check: null
    _upstart_result: null
  tags: ["always"]

# WHY: Upstart management relies on the 'initctl' utility.
- name: "Service (Upstart): Verify initctl binary {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "which initctl"
  register: _upstart_check
  failed_when: false
  changed_when: false
  become: false
  tags: ["always"]

# WHY: Check if the configuration file exists in /etc/init/
- name: "Service (Upstart): Verify config file {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.stat:
    path: "/etc/init/{{ service_name }}.conf"
  register: _upstart_conf_check
  tags: ["always"]

- name: "Service (Upstart): Fault if initctl missing {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.fail:
    msg: "Upstart environment detected but 'initctl' binary was not found."
  when: _upstart_check.rc | default(1) != 0
  tags: ["always"]

- name: "Service (Upstart): Fault if config missing {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.fail:
    msg: "Upstart config '/etc/init/{{ service_name }}.conf' not found. Cannot start/restart."
  when:
    - not _upstart_conf_check.stat.exists | default(false)
    - (service_state | default('started', true)) in ['started', 'restarted']
  tags: ["always"]

# ---------------------------------------------------------------------
# --- Execution ---
# ---------------------------------------------------------------------

# WHY: use universal service module with upstart as the backend.
- name: "Audit: AUDIT {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.debug:
    msg: "Status: Completed"
  when: _upstart_conf_check.stat.exists | default(false)
- name: "Audit: SERVICE_UPSTART {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.debug:
    msg: "Name: {{ service_name }} | State: {{ service_state | default('started', true) }} | Enabled: {{ service_enabled | default(true, true) }}"
