---
# =====================================================================
# roles/native/tasks/service_loader/archlinux.yml
#
# Purpose:
#   ArchLinux-specific service manager routing.
#   Proxies to the detected service manager logic.
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/archlinux"
#     vars:
#       service_name: "nginx"
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/archlinux"
#     vars:
#       service_name: "nginx"
#       service_state: "started"
#       service_enabled: true
#
# =====================================================================

# ---------------------------------------------------------------------
# --- Execution ---
# ---------------------------------------------------------------------

# WHY: Arch Linux is purely systemd-based in modern installations,
# but routing ensures consistency across the service_loader ecosystem.
- ansible.builtin.include_tasks: "{{ os_service_mgr | default('systemd', true) }}.yml"
  vars:
    fingerprint: "service_route_arch_{{ os_service_mgr | default('systemd', true) }}"
