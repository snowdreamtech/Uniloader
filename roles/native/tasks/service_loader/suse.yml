---
# =====================================================================
# roles/native/tasks/service_loader/suse.yml
#
# Purpose:
#   SUSE-specific service manager routing.
#   Routes to systemd logic.
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/suse"
#     vars:
#       service_name: "apache2"
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/suse"
#     vars:
#       service_name: "apache2"
#       service_state: "started"
#       service_enabled: true
#
# =====================================================================

# ---------------------------------------------------------------------
# --- Execution ---
# ---------------------------------------------------------------------

# WHY: SLES and openSUSE have converged on systemd. Using the router
# ensures consistent tracing and future-proofing.
- ansible.builtin.include_tasks: "{{ os_service_mgr | default('systemd', true) }}.yml"
  vars:
    fingerprint: "service_route_suse_{{ os_service_mgr | default('systemd', true) }}"
