---
# =====================================================================
# roles/native/tasks/service_loader/debian.yml
#
# Purpose:
#   Debian-specific service manager routing.
#   Dynamically routes to systemd, upstart, or sysvinit.
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/debian"
#     vars:
#       service_name: "nginx"
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/debian"
#     vars:
#       service_name: "nginx"
#       service_state: "started"
#       service_enabled: true
#
# =====================================================================

# ---------------------------------------------------------------------
# --- Execution ---
# ---------------------------------------------------------------------

# WHY: Handle complex evolution of Debian/Ubuntu service managers
# (SysV -> Upstart -> Systemd) by using the pre-detected os_service_mgr fact.
- ansible.builtin.include_tasks: "{{ os_service_mgr | default('systemd', true) }}.yml"
  vars:
    fingerprint: "service_route_debian_{{ os_service_mgr | default('systemd', true) }}"
