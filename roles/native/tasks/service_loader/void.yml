---
# =====================================================================
# roles/native/tasks/service_loader/void.yml
#
# Purpose:
#   Void Linux-specific service loader entry.
#   Proxies requests to the Runit implementation.
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/void"
#     vars:
#       service_name: "sshd"
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/void"
#     vars:
#       service_name: "sshd"
#       service_state: "started"
#       service_enabled: true
#
# =====================================================================

# ---------------------------------------------------------------------
# --- Execution ---
# ---------------------------------------------------------------------

# WHY: Void Linux uses the Runit service manager.
# We delegate to the specialized runit loader.
- ansible.builtin.include_tasks: "runit.yml"
