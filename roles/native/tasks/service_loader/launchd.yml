---
# =====================================================================
# roles/native/tasks/service_loader/launchd.yml
#
# Purpose:
#   Native Launchd Service Manager (macOS).
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/launchd"
#     vars:
#       service_name: "com.apple.syslogd"
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/launchd"
#     vars:
#       service_name: "com.apple.syslogd"
#       service_state: "started"
#       service_enabled: true
#
# =====================================================================

# ---------------------------------------------------------------------
# --- Validation ---
# ---------------------------------------------------------------------

# WHY: Ensure mandatory service identity is provided before proceeding.
- ansible.builtin.assert:
    that:
      - service_name is defined
      - service_name | length > 0
    fail_msg: "Launchd Service Error: service_name is mandatory."
  tags: ["always"]

# ---------------------------------------------------------------------
# --- Detection ---
# ---------------------------------------------------------------------

# WHY: Reset functional variables to prevent pollution.
- name: "Service (Launchd): Reset variables {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    _launchctl_check: null
    _service_exists_check: null
    _launchd_result: null
  tags: ["always"]

# WHY: Verify that the system actually supports launchctl.
- name: "Service (Launchd): Verify launchctl existence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "which launchctl"
  register: _launchctl_check
  failed_when: false
  changed_when: false
  become: false
  tags: ["always"]

- name: "Service (Launchd): Fault if launchctl missing {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.fail:
    msg: "Launchd environment expected but 'launchctl' binary was not found."
  when: _launchctl_check.rc | default(1) != 0
  tags: ["always"]

# WHY: Check if the service is registered in launchctl to prevent "plist not found" errors.
- name: "Service (Launchd): Probe service presence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "launchctl list {{ service_name }}"
  register: _service_exists_check
  failed_when: false
  changed_when: false
  become: false
  tags: ["always"]

# ---------------------------------------------------------------------
# --- Execution ---
# ---------------------------------------------------------------------

# WHY: Standard launchd module for state and enablement control on macOS.
# Robustness: Skip execution if service is missing and we intend to stop it.
- name: "Service (Launchd): Execute state change {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  community.general.launchd:
    name: "{{ service_name }}"
    state: "{{ service_state | default('started', true) }}"
    enabled: "{{ service_enabled | default(true, true) | bool }}"
  register: _launchd_result
  become: "{{ become_enabled | default(false, true) | bool }}"
  when:
    - (_service_exists_check.rc | default(1) == 0) or (service_state | default('started', true) not in ['stopped'])
  failed_when:
    - _launchd_result.failed | default(false)
    - name: "Audit: AUDIT {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.debug:
        msg: "Status: Completed"
- name: "Audit: SERVICE_LAUNCHD {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.debug:
    msg: "Name: {{ service_name }} | State: {{ service_state | default('started', true) }} | Enabled: {{ service_enabled | default(true, true) }}"
