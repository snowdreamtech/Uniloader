---
# =====================================================================
# roles/native/tasks/service_loader/default.yml
#
# Purpose:
#   Generic service management fallback.
#   Used when the specific OS/manager is not explicitly handled or
#   as a universal wrapper for simple service actions.
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/default"
#     vars:
#       service_name: "nginx"
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/default"
#     vars:
#       service_name: "nginx"
#       service_state: "started"
#       service_enabled: true
#
# =====================================================================

# ---------------------------------------------------------------------
# --- Execution ---
# ---------------------------------------------------------------------

# WHY: We attempts to dispatch to a more specific loader if os_service_mgr
# is available, ensuring specialized logic is used where possible.
- ansible.builtin.include_tasks: "{{ os_service_mgr | default('service', true) }}.yml"
  when:
    - os_service_mgr is defined
    - os_service_mgr | length > 0
    - os_service_mgr != 'service'
  register: _service_dispatch_result
  failed_when: false

# ---------------------------------------------------------------------
# --- Execution ---
# ---------------------------------------------------------------------

# WHY: Use the universal ansible.builtin.service module if no specific
# manager was found or if dispatch failed. This module auto-detects
# the underlying system manager.
- name: "Service (Default): Universal service fallback {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.service:
    name: "{{ service_name }}"
    state: "{{ service_state | default('started', true) }}"
    enabled: "{{ service_enabled | default(true, true) | bool }}"
  when:
    - _service_dispatch_result.skipped is defined
    - _service_dispatch_result.skipped

- name: "Audit: SERVICE_DEFAULT {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.debug:
    msg: "Name: {{ service_name }} | Action: {{ service_state | default('started', true) }} | Status: Resolved"
