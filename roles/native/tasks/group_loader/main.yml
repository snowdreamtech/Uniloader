---
# =====================================================================
# roles/native/tasks/group_loader/main.yml
#
# Purpose:
#   Entry point for group management tasks.
#   Delegates execution to the OS-specific loader.
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "group_loader/main"
#     vars:
#       group_name: "developers"
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "group_loader/main"
#     vars:
#       group_name: "devops"
#       group_gid: 1800
#       group_members: ["alice", "bob"]
#       group_remove_members: ["charlie"]
#
# =====================================================================

# ---------------------------------------------------------------------
# Invoke the os_loader to select the appropriate group configuration
# tasks (default/darwin) based on the target OS.
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "native"
    tasks_from: "os_loader"
  vars:
    module_name: "group_loader"
