---
# =====================================================================
# roles/native/tasks/group_loader/default.yml
#
# Purpose:
#   Generic Linux group management implementation.
#   Uses standard 'group' module and 'getent' for validation.
# =====================================================================

# ---------------------------------------------------------------------
# Pre-checks: Environment Integrity
# ---------------------------------------------------------------------

# WHY: We ensure 'getent' is available for group existence checks.
- name: "Group (Default): Verify getent existence {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "which getent"
  register: _getent_check
  failed_when: false
  changed_when: false
  become: false
  tags: ["always"]

- name: "Group (Default): Fail if getent missing {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.fail:
    msg: "Linux environment detected but 'getent' binary was not found. Environment might be corrupted."
  when: _getent_check.rc != 0
  tags: ["always"]

# ---------------------------------------------------------------------
# Detection: Check if the specified group already exists using getent.
# ---------------------------------------------------------------------
- name: "Group (Default): Check if group exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "getent group {{ group_name }}"
  register: group_exists_check_linux
  failed_when: false
  changed_when: false
  become: "{{ become_enabled }}"
  tags: ["always"]

- name: "Mark group as existing {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    group_already_exists: true
  when: group_exists_check_linux.rc | default(1) == 0
  tags: ["always"]

# ---------------------------------------------------------------------
# Validation: Check for GID availability using getent.
# ---------------------------------------------------------------------
- name: "Group (Default): Check if GID {{ group_gid | default(omit) }} already exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "getent group {{ group_gid }}"
  register: gid_conflict_check_linux
  failed_when: false
  changed_when: false
  become: "{{ become_enabled }}"
  when: group_gid is defined
  tags: ["always"]

- name: "Mark GID conflict {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    group_gid_conflict: true
  when:
    - group_gid is defined
    - gid_conflict_check_linux.stdout | default('') != ""
  tags: ["always"]

# ---------------------------------------------------------------------
# Safety Logic
# ---------------------------------------------------------------------
- name: "Skip group creation due to GID conflict {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    group_skip: true
  when: group_gid_conflict | default(false, true)
  tags: ["always"]

# ---------------------------------------------------------------------
# Execution: Create or manage group
# ---------------------------------------------------------------------
- name: "Ensure group {{ group_name }} exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.group:
    name: "{{ group_name }}"
    gid: "{{ group_gid | default(omit) }}"
    state: "present"
  register: group_result
  retries: 3
  delay: 2
  until: group_result is succeeded
  become: "{{ become_enabled }}"
  when: group_skip is not defined

# ---------------------------------------------------------------------
# Lifecycle: Manage Membership
# ---------------------------------------------------------------------
- name: "Add members to group {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.user:
    name: "{{ item }}"
    groups: "{{ group_name }}"
    append: true
  loop: "{{ group_members | default([], true) }}"
  become: "{{ become_enabled }}"
  when:
    - group_members is defined
    - group_skip is not defined
  changed_when: false

- name: "Group (Default): Remove members from group {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "gpasswd -d {{ item }} {{ group_name }}"
  register: remove_member_result_linux
  failed_when: false
  loop: "{{ group_remove_members | default([], true) }}"
  become: "{{ become_enabled }}"
  when:
    - group_remove_members is defined
    - group_skip is not defined
  changed_when: false
