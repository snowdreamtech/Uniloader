---
# =====================================================================
# roles/init/tasks/kubeadm/alpine.yml
#
# Purpose:
#   Install Kubeadm on Alpine Linux.
#   Note: Kubernetes on Alpine is advanced/experimental.
#
# Usage:
#   - ansible.builtin.include_tasks: "alpine.yml"
# =====================================================================

# ---------------------------------------------------------------------
# Validation
# ---------------------------------------------------------------------
- name: "Validate OS family for Kubeadm {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that:
      - os_family | default('', true) == 'alpine'
    fail_msg: "This loader only supports Alpine Linux."

# ---------------------------------------------------------------------
# Installation: Kubeadm packages
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "app"
  vars:
    app_name: "kubeadm"
    app_delivery_mode: "native"
    app_desc: "Kubeadm core packages"
    app_state: "present"
    app_packages:
      - kubelet
      - kubeadm
      - kubectl

# ---------------------------------------------------------------------
# Service: Enable Kubelet
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "native"
    tasks_from: "service_loader/main"
  vars:
    service_name: "kubelet"
    service_desc: "Kubelet Service"
    service_state: "started"
    service_enabled: true
