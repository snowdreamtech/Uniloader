---
# =====================================================================
# roles/init/tasks/podman/main.yml
#
# Purpose:
#   Entry point for Podman-specific setup.
#   Delegates to the OS-specific loader to handle distribution variations
#   (Debian/RedHat/Alpine) for Podman installation.
#
# Usage:
#   - import_tasks: "Podman/main.yml"
# =====================================================================

- ansible.builtin.include_role:
    name: "native"
    tasks_from: "os_loader"
  vars:
    module_name: "podman"
