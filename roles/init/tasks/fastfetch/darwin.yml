#           fastfetch --pipe false
#       fi
#     mode: "0644"
#   changed_when: false
#   become: "{{ become_enabled }}"

- name: "Configure local terminal Fastfetch for macOS {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.blockinfile:
    path: "{{ ansible_user_home }}/.zshrc"
    create: true
    marker: "# {mark} ANSIBLE MANAGED BLOCK: local terminal Fastfetch"
    block: |
      # ===== fastfetch for local Terminal/iTerm =====
      if [[ -t 1 ]] && command -v fastfetch >/dev/null 2>&1; then
          fastfetch --pipe false
      fi
    mode: "0644"
    owner: "{{ ansible_user_name }}"
  changed_when: false
  become: "{{ become_enabled }}"
