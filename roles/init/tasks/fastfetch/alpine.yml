---
# =====================================================================
# roles/init/tasks/fastfetch/alpine.yml
#
# Purpose:
#   Alpine-specific installation and configuration of Fastfetch.
#   Implements specialized repository detection and GitHub-based
#   fallback installation.
#
# Simple Usage:
#   - include_tasks: "alpine.yml"
#
# Comprehensive Usage:
#   - include_tasks: "alpine.yml"
#     vars:
#       fastfetch_packages: ["fastfetch"]
#       become_enabled: true
# =====================================================================

# ---------------------------------------------------------------------
# Validation: Check Repository Availability
# ---------------------------------------------------------------------

# WHY: We query the package manager first to determine if a native
# package exists. This allows us to prefer stable repository versions
# over manual binary management.
- name: "Check if fastfetch exists in APK repository {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  become: "{{ become_enabled }}"
  block:
    - name: "Check fastfetch availability in APK {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.command: "apk search -e fastfetch"
      register: fastfetch_apk_search
      failed_when: false
      changed_when: false
      check_mode: false

    # WHY: Persist detection result as a boolean fact for use in
    # conditional installation branches.
    - name: "Set fastfetch availability fact {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
      ansible.builtin.set_fact:
        fastfetch_available: "{{ fastfetch_apk_search.rc == 0 }}"

# ---------------------------------------------------------------------
# Installation: Native Repository Branch
# ---------------------------------------------------------------------

# WHY: If found in repository, we use the standard 'app' role to
# manage the installation, ensuring consistency across the platform.
- ansible.builtin.include_role:
    name: "app"
  vars:
    app_name: "fastfetch"
    app_delivery_mode: "native"
    app_packages: "{{ fastfetch_packages | default(['fastfetch'], true) }}"
    app_desc: "Fastfetch"
    app_state: "present"
  when: fastfetch_available | default(false, true)

# ---------------------------------------------------------------------
# Installation: GitHub Fallback Branch
# ---------------------------------------------------------------------

# WHY: When repositories (especially on older Alpine versions)
# lack Fastfetch, we pull the latest static binary archive from GitHub.

- name: "Query Fastfetch latest release metadata {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/fastfetch-cli/fastfetch/releases/latest"
    return_content: true
    status_code: 200
    headers:
      Accept: "application/vnd.github+json"
  register: fastfetch_latest_api
  changed_when: false
  when: not (fastfetch_available | default(false, true))

# WHY: Map Ansible architecture names to asset naming conventions
# used in Fastfetch release files.
- name: "Detect Linux architecture {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    fastfetch_linux_arch: >-
      {{
        'aarch64'
        if ansible_architecture in ['arm64', 'aarch64']
        else 'amd64'
      }}
  when: not (fastfetch_available | default(false, true))

# WHY: Select the correct .tar.gz archive based on the detected
# system architecture for manual deployment on Alpine.
- name: "Extract Fastfetch Linux asset URL {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    fastfetch_latest_url: >-
      {{
        fastfetch_latest_api.json.assets
        | selectattr('name', 'match', 'fastfetch-linux-' ~ fastfetch_linux_arch ~ '\\.tar\\.gz$')
        | map(attribute='browser_download_url')
        | first
      }}
  when: not (fastfetch_available | default(false, true))

- name: "Fail if no matching Linux asset found {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.fail:
    msg: "No matching Linux Fastfetch asset found for arch={{ fastfetch_linux_arch }}"
  when:
    - not (fastfetch_available | default(false, true))
    - fastfetch_latest_url is not defined or (fastfetch_latest_url | length == 0)

# WHY: Download the asset to a temporary path.
- name: "Download Fastfetch latest Linux release {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.get_url:
    url: "{{ fastfetch_latest_url }}"
    dest: "/tmp/fastfetch.tar.gz"
    mode: "0644"
  when: not (fastfetch_available | default(false, true))

# WHY: Extract the archive locally on the target system to access the binary.
- name: "Extract Fastfetch archive {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.unarchive:
    src: "/tmp/fastfetch.tar.gz"
    dest: "/tmp"
    remote_src: true
  when: not (fastfetch_available | default(false, true))

# WHY: Determine the folder name inside the archive to accurately path
# the source binary.
- name: "Compute extracted directory name {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    fastfetch_extract_dir: "{{ fastfetch_latest_url | basename | regex_replace('\\.tar\\.gz$', '') }}"
  when: not (fastfetch_available | default(false, true))

# WHY: Move the static binary to a standard system path accessible via PATH.
- name: "Install Fastfetch binary {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.copy:
    src: "/tmp/{{ fastfetch_extract_dir }}/usr/bin/fastfetch"
    dest: "/usr/local/bin/fastfetch"
    mode: "0755"
    remote_src: true
  become: "{{ become_enabled }}"
  when: not (fastfetch_available | default(false, true))

# WHY: Remove temporary files to keep the system clean as per Lean principles.
- name: "Clean up Fastfetch temporary archive {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.file:
    path: "/tmp/fastfetch.tar.gz"
    state: "absent"
  when: not (fastfetch_available | default(false, true))

- name: "Clean up Fastfetch extracted directory {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.file:
    path: "/tmp/{{ fastfetch_extract_dir }}"
    state: "absent"
  when: not (fastfetch_available | default(false, true))

# ---------------------------------------------------------------------
# Maintenance: Service Management
# ---------------------------------------------------------------------

# WHY: Alpine Docker containers usually don't run a service manager.
# We manually ensure crond (needed for MOTD) is running.
- name: "Start crond manually in container (Alpine Container) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: "pgrep crond || crond"
  changed_when: false
  when:
    - is_container | default(false, true)
  become: "{{ become_enabled }}"

# WHY: On standard hosts, we use the OpenRC manager to persist crond.
- name: "Enable crond on OpenRC systems (Alpine Host) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "rc-update add crond default"
  args:
    creates: "/etc/runlevels/default/crond"
  when:
    - not (is_container | default(false, true))
  become: "{{ become_enabled }}"

- name: "Start crond via OpenRC (Alpine Host) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "rc-service crond start"
  register: crond_start
  failed_when: crond_start.rc not in [0, 1]
  changed_when: false
  when:
    - not (is_container | default(false, true))
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Configuration: SSH MOTD Integration
# ---------------------------------------------------------------------

# WHY: Create the update-motd.d directory to store dynamic scripts.
- name: "Ensure directory /etc/update-motd.d/ exists (Alpine) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.file:
    path: "/etc/update-motd.d"
    state: "directory"
    owner: "root"
    group: "root"
    mode: "0755"
  become: "{{ become_enabled }}"

# WHY: This generator script aggregates output from update-motd.d
# into /run/motd.dynamic, which PAM then displays.
- name: "Install update-motd generator script (Alpine) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.copy:
    dest: "/usr/local/bin/update-motd"
    mode: "0755"
    content: |
      #!/bin/sh
      set -e

      OUT=/run/motd.dynamic
      mkdir -p /run
      : > "$OUT"

      if [ -d /etc/update-motd.d ]; then
          for script in /etc/update-motd.d/*; do
              [ -x "$script" ] || continue
              "$script" >> "$OUT"
          done
      fi
  become: "{{ become_enabled }}"

# WHY: Hook into PAM to display the dynamic MOTD file on login.
- name: "Insert pam_motd block into PAM sshd config (Alpine) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.blockinfile:
    path: "/etc/pam.d/sshd"
    insertafter: "^session\\s+include\\s+base-session"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: pam_motd"
    block: |
      session optional pam_motd.so motd=/etc/motd
      session optional pam_motd.so motd=/run/motd.dynamic
      session optional pam_motd.so motd=/dev/null noupdate
  become: "{{ become_enabled }}"

# WHY: Since Alpine doesn't have a native update-motd listener, we
# use a cron job to regenerate the MOTD every 15 minutes.
- name: "Install periodic update-motd hook (Alpine) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.copy:
    dest: "/etc/periodic/15min/update-motd"
    mode: "0755"
    content: |
      #!/bin/sh
      /usr/local/bin/update-motd
  become: "{{ become_enabled }}"

# WHY: Generate the first MOTD immediately so the user sees it on
# their next login without waiting for the cron job.
- name: "Generate MOTD immediately {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.command: "/usr/local/bin/update-motd"
  changed_when: false
  become: "{{ become_enabled }}"

# WHY: Deploy the execution hook into the update-motd.d framework.
- name: "Deploy 20-fastfetch script to /etc/update-motd.d/ (Alpine) {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.copy:
    src: "20-fastfetch"
    dest: "/etc/update-motd.d/20-fastfetch"
    owner: "root"
    group: "root"
    mode: "0755"
  become: "{{ become_enabled }}"
