---
# =====================================================================
# roles/init/tasks/fastfetch/default.yml
#
# Purpose:
#   Generic Fastfetch installation and configuration.
#   Provides a baseline configuration compatible with most POSIX
#   systems including macOS (Darwin).
# =====================================================================

# ---------------------------------------------------------------------
# Installation: Deploy Fastfetch using the common app API.
# ---------------------------------------------------------------------
- name: "Install Fastfetch packages {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.include_role:
    name: "app"
  vars:
    app_name: "fastfetch"
    app_delivery_mode: "native"
    app_packages: "{{ fastfetch_packages | default(['fastfetch'], true) }}"
    app_desc: "Fastfetch"
    app_state: "present"
