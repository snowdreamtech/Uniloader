---
# =====================================================================
# roles/init/tasks/k3s/main.yml
#
# Purpose:
#   Entry point for K3s-specific setup.
#   Delegates to the OS-specific loader to handle K3s installation.
#
# Usage:
#   - import_tasks: "K3s/main.yml"
# =====================================================================

- ansible.builtin.include_role:
    name: "native"
    tasks_from: "os_loader"
  vars:
    module_name: "k3s"
