---
# =====================================================================
# roles/init/tasks/docker/ubuntu.yml
#
# Purpose:
#   Installation and configuration of the Docker Engine on Ubuntu-based
#   distributions (22.04 LTS through 25.10).
#   Handles architecture detection, specialized keyring management,
#   and repository synchronization for Ubuntu.
#
# Simple Usage:
#   - ansible.builtin.include_tasks: "ubuntu.yml"
#
# Comprehensive Usage:
#   - ansible.builtin.include_tasks: "ubuntu.yml"
#     vars:
#       become_enabled: true
#       is_restricted_network: true
#
# =====================================================================

# ---------------------------------------------------------------------
# Validation: Ensure the host environment is compatible with the
# Docker installation requirements for Ubuntu.
# ---------------------------------------------------------------------
- name: "Validate OS family for Docker {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that:
      - os_family | default('', true) == 'debian'
    fail_msg: "This task file only supports Debian-family systems (Ubuntu)."

- name: "Validate distribution for Docker {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that:
      - os_distribution | default('', true) == 'ubuntu'
    fail_msg: "This task file only supports Ubuntu systems."

- name: "Validate Ubuntu version for Docker {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that:
      - os_version_full | default('', true) in ["22.04", "24.04", "25.04", "25.10"]
    fail_msg: "Docker Engine requires Ubuntu 22.04, 24.04, 25.04, or 25.10."

- name: "Validate CPU architecture for Docker {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that:
      - os_architecture | default('', true) in ["x86_64", "amd64", "armhf", "arm64", "s390x", "ppc64le", "ppc64el"]
    fail_msg: "Docker Engine requires a supported architecture: amd64, armhf, arm64, s390x, or ppc64le. Current architecture: {{ os_architecture | default('unknown', true) }}"

# ---------------------------------------------------------------------
# Preparation: Remove legacy Docker packages to avoid conflicts
# with the modern Docker Engine.
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "app"
  vars:
    app_delivery_mode: "native"
    app_name: "docker"
    app_packages:
      - "docker"
      - "docker.io"
      - "docker-engine"
      - "docker-doc"
      - "docker-compose"
      - "podman-docker"
      - "containerd"
      - "runc"
    app_desc: "legacy Docker packages"
    app_state: "absent"

# ---------------------------------------------------------------------
# Dependencies: Install the prerequisite tools required for
# secure APT repository management on Ubuntu.
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "app"
  vars:
    app_delivery_mode: "native"
    app_name: "docker"
    app_packages:
      - "ca-certificates"
      - "curl"
      - "gnupg"
      - "lsb-release"
    app_desc: "APT prerequisites for Docker repository"
    app_state: "present"

# ---------------------------------------------------------------------
# Repository: Configure the official Docker APT source and GPG keying.
# ---------------------------------------------------------------------
- name: "Ensure keyrings directory exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.file:
    path: "/etc/apt/keyrings"
    state: "directory"
    owner: "root"
    group: "root"
    mode: "0755"
  become: "{{ become_enabled }}"

- name: "Check for existing Docker GPG key {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.stat:
    path: "/etc/apt/keyrings/docker.gpg"
  register: docker_gpg_key_stat

- name: "Download and install Docker GPG key {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.shell: |
    set -eu
    curl -fsSL "{{ 'https://mirrors.aliyun.com/docker-ce/linux/ubuntu/gpg' if is_restricted_network | default(false, true) else 'https://download.docker.com/linux/ubuntu/gpg' }}" \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    executable: "/bin/bash"
  when:
    - docker_gpg_key_stat.stat.exists is defined
    - not (docker_gpg_key_stat.stat.exists | default(false, true))
  become: "{{ become_enabled }}"
  changed_when:
    - docker_gpg_key_stat.stat.exists is defined
    - not (docker_gpg_key_stat.stat.exists | default(false, true))

- name: "Provision Docker APT repository list {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.copy:
    dest: "/etc/apt/sources.list.d/docker.list"
    owner: "root"
    group: "root"
    mode: "0644"
    content: |
      deb [arch={{ os_architecture_oci }} signed-by=/etc/apt/keyrings/docker.gpg] {{ 'https://mirrors.aliyun.com/docker-ce/linux/ubuntu' if is_restricted_network | default(false, true) else 'https://download.docker.com/linux/ubuntu' }} {{ os_codename }} stable
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Execution: Install the main Docker Engine components.
# ---------------------------------------------------------------------
- name: "Install Docker Engine components {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.apt:
    name:
      - "docker-ce"
      - "docker-ce-cli"
      - "containerd.io"
      - "docker-buildx-plugin"
      - "docker-compose-plugin"
    state: "present"
    update_cache: true
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Permissions: Ensure account privileges for Docker interaction.
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "native"
    tasks_from: "group_loader/main"
  vars:
    group_name: "docker"
    group_members:
      - "{{ ansible_user_name }}"

# ---------------------------------------------------------------------
# Connection: Reset connection to pick up the new docker group membership.
# ---------------------------------------------------------------------
- name: "Reset connection to apply docker group changes {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.meta: reset_connection

# ---------------------------------------------------------------------
# Persistence: Enable and start the Docker daemon.
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "native"
    tasks_from: "service_loader/main"
  vars:
    service_name: "docker"
    service_desc: "Docker Daemon"
    service_state: "started"
    service_enabled: true
