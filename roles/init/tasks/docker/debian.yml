---
# =====================================================================
# roles/init/tasks/docker/debian.yml
#
# Purpose:
#   Install and configure Docker Engine on Debian-based systems
#   (Debian 11, 12, 13). This loader ensures:
#     - Version-driven repository format selection
#     - Keyring conflict resolution
#     - Repository conflict resolution
#     - Restricted-network mirror support
#     - Idempotent installation of Docker Engine components
#     - Proper group membership and service enablement
#
# Usage:
#   - ansible.builtin.include_tasks: "debian.yml"
#
# =====================================================================

# ---------------------------------------------------------------------
# Validation: ensure the host is a supported Debian system.
# ---------------------------------------------------------------------
# Verify the OS family is Debian to prevent execution on incompatible systems.
- name: "Validate OS family for Docker {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that:
      - os_family | default('', true) == 'debian'
    fail_msg: "This loader only supports Debian-based systems."

# Confirm the specific distribution is Debian.
- name: "Validate distribution for Docker {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that:
      - os_distribution | default('', true) == 'debian'
    fail_msg: "This loader only supports Debian systems."

# Ensure Debian major version is 11, 12, or 13.
- name: "Validate Debian major version for Docker {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that:
      - os_version_major | default(0, true) | int in [11, 12, 13]
    fail_msg: "Docker Engine requires Debian 11, 12, or 13."

# Verify that the CPU architecture is supported by Docker.
- name: "Validate CPU architecture for Docker {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that:
      - os_architecture_oci | default('', true) in ["x86_64", "amd64", "armhf", "arm64", "ppc64le", "ppc64el"]
    fail_msg: "Unsupported architecture for Docker Engine."

# ---------------------------------------------------------------------
# Remove legacy Docker packages to avoid conflicts.
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "app"
  vars:
    app_delivery_mode: "native"
    app_name: "docker"
    app_packages:
      - docker
      - docker.io
      - docker-engine
      - docker-doc
      - docker-compose
      - podman-docker
      - containerd
      - runc
    app_desc: "legacy Docker packages"
    app_state: "absent"

# ---------------------------------------------------------------------
# Install APT prerequisites required for secure repository management.
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "app"
  vars:
    app_delivery_mode: "native"
    app_name: "docker"
    app_packages:
      - ca-certificates
      - curl
      - gnupg
      - pinentry-tty
      - pinentry-curses
    app_desc: "APT prerequisites for Docker repository"
    app_state: "present"

# ---------------------------------------------------------------------
# Keyring conflict resolution: ensure only docker.gpg is used.
# ---------------------------------------------------------------------
# Create the base directory for APT trusted keyrings.
- name: "Ensure /etc/apt/keyrings directory exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.file:
    path: "/etc/apt/keyrings"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: "{{ become_enabled }}"

# Purge legacy .asc keys to avoid interference with modern gpg format.
- name: "Remove legacy docker.asc keyring if present {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.file:
    path: "/etc/apt/keyrings/docker.asc"
    state: absent
  become: "{{ become_enabled }}"

# Remove legacy keys from the overall system trusted path to avoid GPG conflicts.
- name: "Remove legacy docker.gpg from trusted.gpg.d {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.file:
    path: "/etc/apt/trusted.gpg.d/docker.gpg"
    state: absent
  become: "{{ become_enabled }}"

# Cleanup any remaining legacy ascii-armored keys.
- name: "Remove legacy docker.asc from trusted.gpg.d {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.file:
    path: "/etc/apt/trusted.gpg.d/docker.asc"
    state: absent
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Ensure docker.gpg exists and is readable.
# ---------------------------------------------------------------------
# Check for existing GPG key to avoid redundant download operations.
- name: "Check if docker.gpg key exists {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.stat:
    path: "/etc/apt/keyrings/docker.gpg"
  register: docker_gpg_key_stat

- name: "Install Docker GPG key"
  ansible.builtin.shell: |-
    PATH={{ os_paths }}
    PATH={{ os_paths }}
    set -euo pipefail
    curl -fsSL "{{ 'https://mirrors.aliyun.com/docker-ce/linux/debian/gpg' if is_restricted_network | default(false, true) else 'https://download.docker.com/linux/debian/gpg' }}" \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    executable: "/bin/bash"
  when:
    - docker_gpg_key_stat.stat.exists is defined
    - not (docker_gpg_key_stat.stat.exists | default(false, true))
  become: "{{ become_enabled }}"
  changed_when:
    - docker_gpg_key_stat.stat.exists is defined
    - not (docker_gpg_key_stat.stat.exists | default(false, true))

# ---------------------------------------------------------------------
# Repository conflict resolution and version-driven format selection.
# ---------------------------------------------------------------------
# Determine if the legacy repository list file exists.
- name: "Check for legacy docker.list {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.stat:
    path: "/etc/apt/sources.list.d/docker.list"
  register: docker_list_stat

# Determine if the modern deb822 sources file already exists.
- name: "Check for modern docker.sources {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.stat:
    path: "/etc/apt/sources.list.d/docker.sources"
  register: docker_sources_stat

# Select the repository format: 'list' for Debian 11, 'sources' for later.
- name: "Determine preferred repository format based on Debian version {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.set_fact:
    docker_repo_format: >-
      {{
        'list'
        if (os_version_major | int) == 11
        else 'sources'
      }}

# Prevent 'Signed-By' conflicts by ensuring only one repository format is active.
- name: "Remove docker.list if both formats exist to avoid Signed-By conflicts {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.file:
    path: "/etc/apt/sources.list.d/docker.list"
    state: absent
  when:
    - (docker_list_stat.stat.exists is defined) and (docker_list_stat.stat.exists | default(false, true))
    - (docker_sources_stat.stat.exists is defined) and (docker_sources_stat.stat.exists | default(false, true))
  become: "{{ become_enabled }}"

# Refresh state facts to ensure correct conditional execution for provisioning.
- name: "Re-check docker.list after conflict resolution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.stat:
    path: "/etc/apt/sources.list.d/docker.list"
  register: docker_list_stat_after

# Final check of the modern source file state.
- name: "Re-check docker.sources after conflict resolution {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.stat:
    path: "/etc/apt/sources.list.d/docker.sources"
  register: docker_sources_stat_after

# ---------------------------------------------------------------------
# Provision legacy list format (Debian 11).
# ---------------------------------------------------------------------
- name: "Provision Docker repository (legacy list format)"
  ansible.builtin.shell: |-
    PATH={{ os_paths }}
    set -euo pipefail
    codename="$(. /etc/os-release && echo "${VERSION_CODENAME}")"
    arch="$(dpkg --print-architecture)"
    repo_url="{{ 'https://mirrors.aliyun.com/docker-ce/linux/debian' if is_restricted_network | default(false, true) else 'https://download.docker.com/linux/debian' }}"
    cat > /etc/apt/sources.list.d/docker.list << 'EOF'
    deb [arch=${arch} signed-by=/etc/apt/keyrings/docker.gpg] ${repo_url} ${codename} stable
    EOF
  args:
    executable: "/bin/bash"
  when:
    - (docker_repo_format | default('', true) == 'list')
    - (docker_list_stat_after.stat.exists is defined) and (not (docker_list_stat_after.stat.exists | default(false, true)))
    - (docker_sources_stat_after.stat.exists is defined) and (not (docker_sources_stat_after.stat.exists | default(false, true)))
  become: "{{ become_enabled }}"
  changed_when: false

# ---------------------------------------------------------------------
# Provision modern deb822 format (Debian 12/13).
# ---------------------------------------------------------------------
- name: "Provision Docker repository (deb822 format)"
  ansible.builtin.copy:
    dest: "/etc/apt/sources.list.d/docker.sources"
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: {{ 'https://mirrors.aliyun.com/docker-ce/linux/debian' if is_restricted_network | default(false, true) else 'https://download.docker.com/linux/debian' }}
      Suites: {{ os_codename | default(ansible_facts.distribution_release, true) }}
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.gpg
  when:
    - (docker_repo_format | default('', true) == 'sources')
    - (docker_list_stat_after.stat.exists is defined) and (not (docker_list_stat_after.stat.exists | default(false, true)))
    - (docker_sources_stat_after.stat.exists is defined) and (not (docker_sources_stat_after.stat.exists | default(false, true)))
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Install Docker Engine components.
# ---------------------------------------------------------------------
# Deploy the essential Docker Engine, CLI, and plugins via APT.
- name: "Install Docker Engine packages {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Ensure docker group membership.
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "native"
    tasks_from: "group_loader/main"
  vars:
    group_name: "docker"
    group_members:
      - "{{ ansible_user_name }}"

# ---------------------------------------------------------------------
# Connection: Reset connection to pick up the new docker group membership.
# ---------------------------------------------------------------------
- name: "Reset connection to apply docker group changes {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.meta: reset_connection

# ---------------------------------------------------------------------
# Enable and start Docker daemon.
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "native"
    tasks_from: "service_loader/main"
  vars:
    service_name: "docker"
    service_desc: "Docker Daemon"
    service_state: "started"
    service_enabled: true
