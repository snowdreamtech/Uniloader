---
# =====================================================================
# roles/init/tasks/kubespray/redhat.yml
#
# Purpose:
#   Setup Kubespray Controller on RHEL-based systems.
#
# Usage:
#   - ansible.builtin.include_tasks: "redhat.yml"
# =====================================================================

# ---------------------------------------------------------------------
# Validation
# ---------------------------------------------------------------------
- name: "Validate OS family for Kubespray {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.assert:
    that:
      - os_family | default('', true) == 'redhat'
      - python_venv_path is defined
    fail_msg: "This loader only supports RHEL-based systems and requires a global virtual environment."

# ---------------------------------------------------------------------
# Dependencies: Install git, pip via App Role
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "app"
  vars:
    app_name: "kubespray"
    app_delivery_mode: "native"
    app_desc: "Kubespray controller dependencies"
    app_state: "present"
    app_packages:
      - git
      - pkgconfig
      # python3-pip is often part of python3 on RHEL8+, or platform-python-pip
      # We assume bootstrap handled basic python, we just need build headers if compiling

# ---------------------------------------------------------------------
# Repository: Clone Kubespray
# ---------------------------------------------------------------------
- name: "Clone Kubespray repository {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.git:
    repo: "https://github.com/kubernetes-sigs/kubespray.git"
    dest: "{{ kubespray_dir | default('/opt/kubespray', true) }}"
    version: "{{ kubespray_version | default('master', true) }}"
    update: true
  become: "{{ become_enabled }}"

- name: "Ensure ownership of Kubespray directory {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.file:
    path: "{{ kubespray_dir | default('/opt/kubespray', true) }}"
    owner: "{{ ansible_user_name }}"
    group: "{{ ansible_user_name }}"
    state: directory
    recurse: true
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# Python Dependencies: Install requirements.txt
# ---------------------------------------------------------------------
- name: "Install Kubespray Python requirements {{ '(' ~ os_fingerprint ~ ')' if os_fingerprint is defined else '' }}"
  ansible.builtin.pip:
    requirements: "{{ kubespray_dir | default('/opt/kubespray', true) }}/requirements.txt"
    virtualenv: "{{ python_venv_path }}"
