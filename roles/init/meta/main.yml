---
# =====================================================================
# roles/common/init/meta/main.yml
#
# Purpose:
#   Metadata and dependency configuration for the common/init role.
#   Specifies the supported platforms (Alpine, Debian, EL) and tags
#   for the cross-distribution initialization workflows.
#
# =====================================================================

galaxy_info:
  author: "snowdream"
  description: >-
    A cross-distribution role supporting Alpine, Debian, and RHEL families.
    Designed for reproducible, auditable, and modular automation workflows.
  license: "MIT"
  min_ansible_version: "2.14"

  platforms:
    - name: "Alpine"
      versions:
        - "all"
    - name: "Debian"
      versions:
        - "bookworm"
        - "trixie"
    - name: "EL"
      versions:
        - "9"
        - "10"

  galaxy_tags:
    - "alpine"
    - "debian"
    - "rhel"
    - "linux"
    - "automation"
    - "infrastructure"
    - "system"
    - "python"

dependencies: []
