# =====================================================================
# File: playbooks/foundation.yml
#
# Purpose:
#   Enterprise Server Initialization Playbook.
#   Prepares a brand-new server for its Ansible-managed lifecycle by:
#     - Installing Python (bootstrapping).
#     - Creating users and managing SSH keys.
#     - Setting up sudo and core security configurations.
#     - Tuning sysctl, limits, and timezones.
#
# Simple Usage:
#   ansible-playbook playbooks/foundation.yml
#
# Comprehensive Usage:
#   ansible-playbook -i inventory/prod.yml playbooks/foundation.yml --limit webservers --extra-vars "ansible_user=admin"
#
# Dependencies:
#   - common/bootstrap
#   - common/init
#   - common/base
# =====================================================================

- name: "Initialize new servers"
  hosts: all
  gather_facts: false   # Python may not exist yet; bootstrap role will handle discovery

  # ---------------------------------------------------------------------
  # Pre-tasks: Execution metrics initialization
  # ---------------------------------------------------------------------
  pre_tasks:
    # Start the execution timer for performance auditing
    - ansible.builtin.include_role:
        name: "native"
        tasks_from: "timer_loader"
      vars:
        timer_action: "start"
        timer_name: "playbook"
        module_name: "init"

  # ---------------------------------------------------------------------
  # Core Roles Pipeline
  # ---------------------------------------------------------------------
  roles:
    - role: "bootstrap"

    - role: "context"

    - role: "init"
    
    - role: "base"

  # ---------------------------------------------------------------------
  # Post-tasks: Cleanup and Reporting
  # ---------------------------------------------------------------------
  post_tasks:
    # Provide visual confirmation of successful initialization
    - ansible.builtin.include_role:
        name: "native"
        tasks_from: "log_loader"
      vars:
        label: "PLAYBOOK"
        msg: "Initialization completed successfully on {{ inventory_hostname }}"

    # End the execution timer and log total duration
    - ansible.builtin.include_role:
        name: "native"
        tasks_from: "timer_loader"
      vars:
        timer_action: "end"
        timer_name: "playbook"
        module_name: "init"
