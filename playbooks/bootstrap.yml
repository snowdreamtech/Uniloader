---
# =====================================================================
# File: playbooks/bootstrap.yml
#
# Purpose:
#   Enterprise Server Initialization Playbook.
#   Prepares a brand-new server for its Ansible-managed lifecycle by:
#     - Installing Python (bootstrapping).
#     - Creating users and managing SSH keys.
#     - Setting up sudo and core security configurations.
#     - Tuning sysctl, limits, and timezones.
#
# Simple Usage:
#   ansible-playbook playbooks/base/init.yml
#
# Comprehensive Usage:
#   ansible-playbook -i inventory/prod.yml playbooks/base/init.yml --limit webservers --extra-vars "ansible_user=admin"
#
# Dependencies:
#   - common/bootstrap
#   - common/init
#   - common/base
# =====================================================================

- name: "ULS Framework Bootstrap"
  hosts: all
  gather_facts: false # Python may not exist yet; bootstrap role will handle discovery

  # ---------------------------------------------------------------------
  # Core Roles Pipeline
  # ---------------------------------------------------------------------
  roles:
    # 1. Bootstrap: Install Python and fix minimal OS-level issues
    - role: "bootstrap"
