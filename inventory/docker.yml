---
# =====================================================================
# inventory/dev.yml
#
# Purpose:
#   Development environment inventory configuration.
#   Defines container-based development hosts using the Docker
#   connection plugin for local prototyping and CI/CD validation.
#
# Simple Usage:
#   ansible-playbook -i inventory/dev.yml site.yml
#
# Comprehensive Usage:
#   ansible-playbook -i inventory/dev.yml site.yml --limit alpine
#
# =====================================================================

all:
  vars:
    become_enabled: false
  hosts:
    alpine:
      ansible_host: uls_alpine
      ansible_connection: "docker"
      node_tags:
        - "open"
        - "container"
        - "docker_container"
    debian:
      ansible_host: uls_debian
      ansible_connection: "docker"
      node_tags:
        - "open"
        - "container"
        - "docker_container"
    rhel:
      ansible_host: uls_rhel
      ansible_connection: "docker"
      node_tags:
        - "open"
        - "container"
        - "docker_container"
