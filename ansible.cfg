[defaults]
# Enable callbacks
# timer: Measure task execution time
stdout_callback = default
callback_plugins = ./callback_plugins
callbacks_enabled = timer, profile_tasks, profile_roles, custom_audit_logger
force_color = True

# Specify the path for the log file
log_path = logs/ansible.log

# Default inventory location (can be overridden with -i)
inventory = ./inventory/localhost.yml

# Ansible Vault password file location
# vault_password_file = ~/.uniloader/.vault_pass

# Load vars plugins (including host_group_vars for inventory/group_vars) when the
# inventory source is imported. This avoids undefined variables during early
# task/when evaluation on ansible-core 2.19+.
run_vars_plugins = start

# Disable SSH host key checking to avoid interactive prompts on first connection
host_key_checking = False

# Use Python 3 explicitly to avoid interpreter warnings on Debian/Ubuntu
interpreter_python = auto_silent
# interpreter_python = /opt/venv/ansible/bin/python3

# Path where Ansible looks for roles (project-local roles)
roles_path = ./roles

# Disable creation of *.retry files (keeps project clean)
retry_files_enabled = False

# Increase parallelism (default is 5, too slow for large deployments)
forks = 50

# SSH connection timeout in seconds
timeout = 30

# Use YAML callback for clean multi-line output
# stdout_callback = default
# callback_result_format = yaml
# bin_ansible_callbacks = True

# # WHY:
# #   Set this callback plugin as the primary stdout handler.
# #   This ensures that only failure summaries appear in console output,
# #   eliminating noise from OK/changed/skipped tasks.
# stdout_callback = fail_only_ultimate

# # WHY:
# #   Ansible does not load custom callback plugins unless explicitly whitelisted.
# #   This prevents accidental or unauthorized plugin execution.
# callback_whitelist = fail_only_ultimate

# # WHY:
# #   Explicitly define the callback plugin search path.
# #   This guarantees deterministic behavior and avoids relying on system-wide paths,
# #   ensuring full auditability and project-level isolation.
# callback_plugins = ./callback_plugins



# Enable fact caching to speed up repeated runs
fact_caching = jsonfile
fact_caching_connection = ./facts
fact_caching_timeout = 86400

# Reduce noise from deprecated warnings
deprecation_warnings = False

# Enable useful Jinja2 extensions
jinja2_extensions = jinja2.ext.do,jinja2.ext.loopcontrols


[ssh_connection]
# Enable pipelining to reduce SSH round-trips (significant speed boost)
pipelining = True

# Reuse SSH connections for faster execution
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

# Path for SSH control sockets
control_path = ~/.ansible/cp/%%h-%%r
