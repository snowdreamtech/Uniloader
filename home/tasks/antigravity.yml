---
# roles/home/tasks/antigravity.yml

- name: Define Antigravity User directory relative path (macOS)
  ansible.builtin.set_fact:
    antigravity_user_rel_path: "Library/Application Support/Antigravity/User"
  when: ansible_os_family == 'Darwin'
  tags: ["always"]

- name: Define Antigravity User directory relative path (Linux)
  ansible.builtin.set_fact:
    antigravity_user_rel_path: ".config/Antigravity/User"
  when: ansible_system == 'Linux'
  tags: ["always"]

- name: Define Antigravity User directory relative path (Windows)
  ansible.builtin.set_fact:
    antigravity_user_rel_path: "AppData/Roaming/Antigravity/User"
  when: ansible_os_family == 'Windows'
  tags: ["always"]

- name: Define Antigravity config items to sync
  ansible.builtin.set_fact:
    antigravity_config_items:
      - "settings.json"
      - "keybindings.json"
      - "snippets"
  tags: ["always"]

- name: Check which Antigravity config items exist in source
  ansible.builtin.stat:
    path: "{{ home_src_path }}/.antigravity/{{ antigravity_item }}"
  loop: "{{ antigravity_config_items }}"
  loop_control:
    loop_var: antigravity_item
  register: antigravity_source_stats
  delegate_to: localhost
  run_once: true
  tags: ["always"]

- name: Ensure specific Antigravity User directories exist
  ansible.builtin.file:
    path: "{{ home_dest_path }}/{{ antigravity_user_rel_path }}/{{ antigravity_item.antigravity_item | dirname }}"
    state: directory
    mode: '0755'
  loop: "{{ antigravity_source_stats.results }}"
  loop_control:
    loop_var: antigravity_item
  when: 
    - ansible_os_family != 'Windows'
    - antigravity_item.antigravity_item | dirname != "."
  tags: ["always"]

- name: Sync Antigravity configuration files
  ansible.builtin.copy:
    src: "{{ home_src_path }}/.antigravity/{{ antigravity_item.antigravity_item }}"
    dest: "{{ home_dest_path }}/{{ antigravity_user_rel_path }}/{{ antigravity_item.antigravity_item }}"
    mode: '0644'
  loop: "{{ antigravity_source_stats.results }}"
  loop_control:
    loop_var: antigravity_item
  when: 
    - antigravity_item.stat.exists
    - antigravity_item.stat.isdir is defined and not antigravity_item.stat.isdir
  tags: ["always"]
  
- name: Sync Antigravity configuration directories (recursive)
  ansible.builtin.copy:
    src: "{{ home_src_path }}/.antigravity/{{ antigravity_item.antigravity_item }}/"
    dest: "{{ home_dest_path }}/{{ antigravity_user_rel_path }}/{{ antigravity_item.antigravity_item }}"
    mode: '0644'
  loop: "{{ antigravity_source_stats.results }}"
  loop_control:
    loop_var: antigravity_item
  when: 
    - antigravity_item.stat.exists
    - antigravity_item.stat.isdir is defined and antigravity_item.stat.isdir
  tags: ["always"]
